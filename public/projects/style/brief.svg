<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#08131f"/>
  <rect width="800" height="40" fill="#0d1b2b"/>
  <rect x="0" y="40" width="800" height="1" fill="#244763"/>
  <text x="20" y="26" fill="#00f5ff" font-size="14" font-weight="bold">Brand Brief · Style Extraction</text>
  <text x="570" y="26" fill="#5a8090" font-size="11">AI Brand Intelligence Platform</text>

  <!-- Left: Form -->
  <rect x="10" y="50" width="400" height="390" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="10" y="50" width="400" height="28" fill="#112338"/>
  <text x="24" y="69" fill="#c8e0f4" font-size="12" font-weight="bold">Brand Brief Form</text>

  <!-- Brand Name -->
  <text x="24" y="96" fill="#5a8090" font-size="10">BRAND NAME</text>
  <rect x="24" y="101" width="372" height="28" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="119" fill="#c8e0f4" font-size="12">NovaCraft Design Studio</text>

  <!-- Industry -->
  <text x="24" y="147" fill="#5a8090" font-size="10">INDUSTRY</text>
  <rect x="24" y="152" width="180" height="28" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="170" fill="#c8e0f4" font-size="12">Creative Agency</text>
  <text x="196" y="170" fill="#3a6080" font-size="10">▼</text>

  <!-- Tone -->
  <text x="24" y="200" fill="#5a8090" font-size="10">BRAND TONE</text>
  <rect x="24" y="205" width="372" height="28" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="223" fill="#c8e0f4" font-size="12">Modern · Bold · Minimal · Forward-thinking</text>

  <!-- Target Audience -->
  <text x="24" y="251" fill="#5a8090" font-size="10">TARGET AUDIENCE</text>
  <rect x="24" y="256" width="372" height="28" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="274" fill="#c8e0f4" font-size="12">B2B SaaS companies, Series A–C startups</text>

  <!-- Color Palette Input -->
  <text x="24" y="302" fill="#5a8090" font-size="10">BRAND COLORS (HEX or DESCRIPTION)</text>
  <rect x="24" y="307" width="372" height="28" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="325" fill="#c8e0f4" font-size="12">Deep navy, electric cyan, crisp white</text>

  <!-- Reference Brands -->
  <text x="24" y="353" fill="#5a8090" font-size="10">REFERENCE BRANDS / INSPIRATIONS</text>
  <rect x="24" y="358" width="372" height="42" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="34" y="374" fill="#c8e0f4" font-size="11">Linear, Vercel, Framer — clean dark-mode</text>
  <text x="34" y="390" fill="#c8e0f4" font-size="11">aesthetics with strong typographic presence</text>

  <!-- Extract button -->
  <rect x="24" y="410" width="372" height="24" rx="4" fill="#00f5ff"/>
  <text x="210" y="426" fill="#08131f" font-size="12" font-weight="bold" text-anchor="middle">Extract Brand Style →</text>

  <!-- Right: Preview panel -->
  <rect x="420" y="50" width="370" height="390" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="420" y="50" width="370" height="28" fill="#112338"/>
  <text x="434" y="69" fill="#c8e0f4" font-size="12" font-weight="bold">Style Extraction Preview</text>
  <circle cx="764" cy="64" r="6" fill="#00ff88"/>

  <!-- Extracted palette -->
  <text x="434" y="96" fill="#5a8090" font-size="10">EXTRACTED PALETTE</text>
  <rect x="434" y="101" width="44" height="28" rx="2" fill="#0a0f1e"/>
  <rect x="484" y="101" width="44" height="28" rx="2" fill="#00d4ff"/>
  <rect x="534" y="101" width="44" height="28" rx="2" fill="#f8faff"/>
  <rect x="584" y="101" width="44" height="28" rx="2" fill="#1a3a5c"/>
  <rect x="634" y="101" width="44" height="28" rx="2" fill="#ff4b6e"/>
  <text x="434" y="143" fill="#3a6080" font-size="9">#0a0f1e</text>
  <text x="484" y="143" fill="#3a6080" font-size="9">#00d4ff</text>
  <text x="534" y="143" fill="#3a6080" font-size="9">#f8faff</text>
  <text x="584" y="143" fill="#3a6080" font-size="9">#1a3a5c</text>
  <text x="634" y="143" fill="#3a6080" font-size="9">#ff4b6e</text>

  <!-- Typography -->
  <text x="434" y="165" fill="#5a8090" font-size="10">TYPOGRAPHY SUGGESTION</text>
  <rect x="434" y="170" width="344" height="50" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="444" y="188" fill="#c8e0f4" font-size="16" font-weight="bold">Display: Neue Haas Grotesk</text>
  <text x="444" y="207" fill="#5a8090" font-size="11">Body: Inter · Code: JetBrains Mono</text>

  <!-- Tone analysis -->
  <text x="434" y="236" fill="#5a8090" font-size="10">TONE ANALYSIS</text>
  <rect x="434" y="241" width="344" height="80" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="444" y="258" fill="#5a8090" font-size="9">Innovative</text>
  <rect x="514" y="252" width="120" height="8" rx="2" fill="#244763"/>
  <rect x="514" y="252" width="102" height="8" rx="2" fill="#00f5ff"/>
  <text x="638" y="260" fill="#00f5ff" font-size="9">85%</text>
  <text x="444" y="278" fill="#5a8090" font-size="9">Professional</text>
  <rect x="514" y="272" width="120" height="8" rx="2" fill="#244763"/>
  <rect x="514" y="272" width="90" height="8" rx="2" fill="#00f5ff"/>
  <text x="638" y="280" fill="#00f5ff" font-size="9">75%</text>
  <text x="444" y="298" fill="#5a8090" font-size="9">Minimalist</text>
  <rect x="514" y="292" width="120" height="8" rx="2" fill="#244763"/>
  <rect x="514" y="292" width="108" height="8" rx="2" fill="#9d00ff"/>
  <text x="638" y="300" fill="#9d00ff" font-size="9">90%</text>
  <text x="444" y="316" fill="#5a8090" font-size="9">Warm</text>
  <rect x="514" y="310" width="120" height="8" rx="2" fill="#244763"/>
  <rect x="514" y="310" width="30" height="8" rx="2" fill="#ffe000"/>
  <text x="638" y="318" fill="#ffe000" font-size="9">25%</text>

  <!-- Competitor diff -->
  <text x="434" y="342" fill="#5a8090" font-size="10">DIFFERENTIATION SCORE vs REFERENCES</text>
  <rect x="434" y="347" width="344" height="44" rx="3" fill="#08131f" stroke="#244763" stroke-width="1"/>
  <text x="444" y="364" fill="#c8e0f4" font-size="10">Distinctiveness vs Linear:</text>
  <text x="620" y="364" fill="#ffe000" font-size="10">42% similar</text>
  <text x="444" y="382" fill="#c8e0f4" font-size="10">Distinctiveness vs Vercel:</text>
  <text x="620" y="382" fill="#00ff88" font-size="10">71% unique</text>

  <!-- Style tokens preview -->
  <rect x="434" y="400" width="344" height="34" rx="3" fill="#112338"/>
  <text x="444" y="413" fill="#5a8090" font-size="9">EXPORT READY</text>
  <text x="444" y="427" fill="#00f5ff" font-size="9">→ Design Tokens  → Figma Variables  → Tailwind Config</text>
</svg>
