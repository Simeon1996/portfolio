  <rect x="28" y="178" width="404" height="36" rx="2" fill="#112338"/>
  <text x="36" y="193" fill="#c8e0f4" font-size="11">"...and our platform integrates directly with your existing</text>
  <text x="36" y="208" fill="#c8e0f4" font-size="11">CRM so there's no data migration required at all."</text>

  <rect x="28" y="220" width="404" height="36" rx="2" fill="#0d1b2b"/>
  <text x="36" y="235" fill="#5a8090" font-size="11">"That sounds promising. What about the onboarding</text>
  <text x="36" y="250" fill="#5a8090" font-size="11">timeline — how quickly can we get started?"</text>

  <rect x="28" y="262" width="404" height="36" rx="2" fill="#112338"/>
  <text x="36" y="277" fill="#c8e0f4" font-size="11">"Typically two weeks from contract signing. We assign a</text>
  <text x="36" y="292" fill="#c8e0f4" font-size="11">dedicated success manager to your account from day one."</text>

  <rect x="28" y="304" width="404" height="36" rx="2" fill="#0d1b2b"/>
  <text x="36" y="319" fill="#5a8090" font-size="11">"And the pricing — is it per seat or usage-based? Because</text>
  <text x="36" y="334" fill="#5a8090" font-size="11">our team size fluctuates quite a bit seasonally."</text>

