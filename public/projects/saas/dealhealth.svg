<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#08131f"/>
  <rect width="800" height="40" fill="#0d1b2b"/>
  <rect x="0" y="40" width="800" height="1" fill="#244763"/>
  <text x="20" y="26" fill="#00f5ff" font-size="14" font-weight="bold">Deal Health Dashboard</text>
  <text x="560" y="26" fill="#5a8090" font-size="11">Acme Corp · ACV $142,000 · Stage: Negotiation</text>

  <!-- Deal health gauge (circular) -->
  <rect x="10" y="50" width="240" height="230" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <text x="130" y="72" fill="#c8e0f4" font-size="12" font-weight="bold" text-anchor="middle">Deal Health Score</text>

  <!-- Outer ring background -->
  <circle cx="130" cy="155" r="72" fill="none" stroke="#244763" stroke-width="12"/>
  <!-- Score arc: 74% = 266 degrees of 360 -->
  <circle cx="130" cy="155" r="72" fill="none" stroke="#00ff88" stroke-width="12"
    stroke-dasharray="336 94" stroke-dashoffset="94" stroke-linecap="round"
    transform="rotate(-90 130 155)"/>
  <!-- Inner rings -->
  <circle cx="130" cy="155" r="56" fill="none" stroke="#112338" stroke-width="2"/>
  <text x="130" y="148" fill="#00ff88" font-size="28" font-weight="bold" text-anchor="middle">74</text>
  <text x="130" y="166" fill="#5a8090" font-size="12" text-anchor="middle">/ 100</text>
  <text x="130" y="182" fill="#00ff88" font-size="10" text-anchor="middle">HEALTHY</text>
  <text x="130" y="250" fill="#5a8090" font-size="10" text-anchor="middle">Updated 2 min ago</text>
  <text x="130" y="265" fill="#3a6080" font-size="9" text-anchor="middle">↑ +8 pts from last week</text>

  <!-- Metric cards row -->
  <rect x="260" y="50" width="170" height="110" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <text x="274" y="72" fill="#5a8090" font-size="10">SENTIMENT SCORE</text>
  <text x="274" y="104" fill="#00ff88" font-size="26" font-weight="bold">0.82</text>
  <text x="274" y="124" fill="#5a8090" font-size="10">Positive · +0.11 this week</text>
  <text x="274" y="140" fill="#3a6080" font-size="9">Based on last 3 interactions</text>
  <!-- Sentiment bar -->
  <rect x="274" y="145" width="140" height="6" rx="2" fill="#244763"/>
  <rect x="274" y="145" width="115" height="6" rx="2" fill="#00ff88"/>

  <rect x="440" y="50" width="170" height="110" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <text x="454" y="72" fill="#5a8090" font-size="10">CLOSE PROBABILITY</text>
  <text x="454" y="104" fill="#00f5ff" font-size="26" font-weight="bold">67%</text>
  <text x="454" y="124" fill="#5a8090" font-size="10">↑ +12% from last stage</text>
  <text x="454" y="140" fill="#3a6080" font-size="9">ML model: XGBoost v3</text>
  <rect x="454" y="145" width="140" height="6" rx="2" fill="#244763"/>
  <rect x="454" y="145" width="94" height="6" rx="2" fill="#00f5ff"/>

  <rect x="620" y="50" width="170" height="110" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <text x="634" y="72" fill="#5a8090" font-size="10">NEXT STEP</text>
  <text x="634" y="96" fill="#ffe000" font-size="12" font-weight="bold">Technical Review</text>
  <text x="634" y="112" fill="#c8e0f4" font-size="11">Scheduled: Mar 24</text>
  <text x="634" y="128" fill="#5a8090" font-size="10">4 days from now</text>
  <text x="634" y="144" fill="#3a6080" font-size="9">Owner: Alex Johnson</text>

  <!-- CRM Sync Status -->
  <rect x="10" y="290" width="240" height="150" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="10" y="290" width="240" height="28" fill="#112338"/>
  <text x="24" y="309" fill="#c8e0f4" font-size="12" font-weight="bold">CRM Sync Status</text>
  <circle cx="226" cy="304" r="6" fill="#00ff88"/>

  <rect x="22" y="326" width="216" height="24" rx="2" fill="#08131f"/>
  <text x="30" y="341" fill="#5a8090" font-size="10">Salesforce</text>
  <circle cx="190" cy="338" r="5" fill="#00ff88"/>
  <text x="200" y="342" fill="#00ff88" font-size="9">Synced</text>

  <rect x="22" y="356" width="216" height="24" rx="2" fill="#08131f"/>
  <text x="30" y="371" fill="#5a8090" font-size="10">HubSpot</text>
  <circle cx="190" cy="368" r="5" fill="#00ff88"/>
  <text x="200" y="372" fill="#00ff88" font-size="9">Synced</text>

  <rect x="22" y="386" width="216" height="24" rx="2" fill="#08131f"/>
  <text x="30" y="401" fill="#5a8090" font-size="10">Gong.io</text>
  <circle cx="190" cy="398" r="5" fill="#ffe000"/>
  <text x="200" y="402" fill="#ffe000" font-size="9">Pending</text>

  <text x="22" y="428" fill="#3a6080" font-size="9">Last sync: 2 min ago · auto-sync every 5m</text>

  <!-- Activity timeline -->
  <rect x="260" y="170" width="530" height="270" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="260" y="170" width="530" height="28" fill="#112338"/>
  <text x="274" y="189" fill="#c8e0f4" font-size="12" font-weight="bold">Key Metrics &amp; Activity</text>

  <!-- Metrics row -->
  <rect x="274" y="208" width="100" height="52" rx="3" fill="#08131f"/>
  <text x="284" y="222" fill="#5a8090" font-size="9">EMAILS</text>
  <text x="284" y="242" fill="#c8e0f4" font-size="18" font-weight="bold">14</text>
  <text x="284" y="256" fill="#3a6080" font-size="8">exchanged</text>

  <rect x="384" y="208" width="100" height="52" rx="3" fill="#08131f"/>
  <text x="394" y="222" fill="#5a8090" font-size="9">CALLS</text>
  <text x="394" y="242" fill="#c8e0f4" font-size="18" font-weight="bold">6</text>
  <text x="394" y="256" fill="#3a6080" font-size="8">completed</text>

  <rect x="494" y="208" width="100" height="52" rx="3" fill="#08131f"/>
  <text x="504" y="222" fill="#5a8090" font-size="9">MEETINGS</text>
  <text x="504" y="242" fill="#c8e0f4" font-size="18" font-weight="bold">3</text>
  <text x="504" y="256" fill="#3a6080" font-size="8">held</text>

  <rect x="604" y="208" width="100" height="52" rx="3" fill="#08131f"/>
  <text x="614" y="222" fill="#5a8090" font-size="9">STAGE AGE</text>
  <text x="614" y="242" fill="#ffe000" font-size="18" font-weight="bold">12d</text>
  <text x="614" y="256" fill="#3a6080" font-size="8">in negotiation</text>

  <rect x="714" y="208" width="62" height="52" rx="3" fill="#08131f"/>
  <text x="724" y="222" fill="#5a8090" font-size="9">SCORE</text>
  <text x="724" y="242" fill="#00ff88" font-size="18" font-weight="bold">A-</text>
  <text x="724" y="256" fill="#3a6080" font-size="8">tier</text>

  <!-- Risk factors -->
  <text x="274" y="282" fill="#5a8090" font-size="10">RISK FACTORS</text>
  <rect x="274" y="288" width="500" height="24" rx="2" fill="#08131f"/>
  <circle cx="282" cy="300" r="4" fill="#ffe000"/>
  <text x="292" y="304" fill="#ffe000" font-size="10">Champion last contacted 8 days ago — engagement risk</text>
  <rect x="274" y="318" width="500" height="24" rx="2" fill="#08131f"/>
  <circle cx="282" cy="330" r="4" fill="#ffe000"/>
  <text x="292" y="334" fill="#ffe000" font-size="10">Legal review not yet initiated — timeline risk</text>
  <rect x="274" y="348" width="500" height="24" rx="2" fill="#08131f"/>
  <circle cx="282" cy="360" r="4" fill="#00ff88"/>
  <text x="292" y="364" fill="#00ff88" font-size="10">Economic buyer confirmed and engaged</text>
  <rect x="274" y="378" width="500" height="24" rx="2" fill="#08131f"/>
  <circle cx="282" cy="390" r="4" fill="#00ff88"/>
  <text x="292" y="394" fill="#00ff88" font-size="10">Budget confirmed Q1 2025 — $150K approved</text>
  <rect x="274" y="408" width="500" height="24" rx="2" fill="#08131f"/>
  <circle cx="282" cy="420" r="4" fill="#3a6080"/>
  <text x="292" y="424" fill="#5a8090" font-size="10">Technical POC: passed 8/10 criteria</text>
</svg>
