  <rect x="725" y="525" width="640" height="24" rx="12" fill="#174560"/>
  <rect x="725" y="525" width="520" height="24" rx="12" fill="#00ff88"/>
  <text x="725" y="600" fill="#d5f8e9" font-family="Arial, sans-serif" font-size="22">Index coverage: 81%</text>

  <text x="120" y="845" fill="#3f6a86" font-family="Arial, sans-serif" font-size="20">Feature Snapshot • Upload Flow</text>
