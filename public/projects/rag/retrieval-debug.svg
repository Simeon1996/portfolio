<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Retrieval Debug</title>
  <desc id="desc">Example screenshot style panel for retrieval diagnostics and reranking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061320"/>
      <stop offset="100%" stop-color="#122a3d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="80" y="80" width="1440" height="740" rx="18" fill="#0c2031" stroke="#1d3953"/>
  <rect x="80" y="80" width="1440" height="3" fill="#00f5ff"/>

  <text x="130" y="150" fill="#9fc4de" font-family="Arial, sans-serif" font-size="30">Retrieval Debugger</text>

  <rect x="130" y="190" width="1340" height="130" rx="12" fill="#10293e"/>
  <text x="170" y="245" fill="#dff7ff" font-family="Arial, sans-serif" font-size="24">Query: "Summarize penalties for delayed shipping notifications"</text>
  <text x="170" y="285" fill="#b6d5e8" font-family="Arial, sans-serif" font-size="20">hybrid score: BM25 0.44 + dense 0.56 • topK=12 • rerank=true</text>

  <rect x="130" y="350" width="640" height="430" rx="12" fill="#0f283d"/>
  <text x="165" y="400" fill="#9fc4de" font-family="Arial, sans-serif" font-size="26">Top Chunks</text>
  <rect x="165" y="430" width="570" height="86" rx="10" fill="#124261"/>
  <text x="195" y="482" fill="#e8fbff" font-family="Arial, sans-serif" font-size="20">#1 Contract_2024.pdf p18 • score 0.92</text>
  <rect x="165" y="530" width="570" height="86" rx="10" fill="#103857"/>
  <text x="195" y="582" fill="#e8fbff" font-family="Arial, sans-serif" font-size="20">#2 Carrier_SLA.pdf p6 • score 0.87</text>
  <rect x="165" y="630" width="570" height="86" rx="10" fill="#103857"/>
  <text x="195" y="682" fill="#e8fbff" font-family="Arial, sans-serif" font-size="20">#3 Logistics_Addendum.pdf p11 • score 0.81</text>

  <rect x="830" y="350" width="640" height="430" rx="12" fill="#0f283d"/>
  <text x="865" y="400" fill="#9fc4de" font-family="Arial, sans-serif" font-size="26">Rerank Signals</text>
  <line x1="900" y1="470" x2="1370" y2="470" stroke="#214f6c" stroke-width="3"/>
  <rect x="900" y="450" width="330" height="40" rx="20" fill="#00f5ff"/>
  <text x="900" y="535" fill="#b8d8ea" font-family="Arial, sans-serif" font-size="20">Semantic match</text>
  <line x1="900" y1="590" x2="1370" y2="590" stroke="#214f6c" stroke-width="3"/>
  <rect x="900" y="570" width="280" height="40" rx="20" fill="#00ff88"/>
  <text x="900" y="655" fill="#b8d8ea" font-family="Arial, sans-serif" font-size="20">Keyword coverage</text>
  <line x1="900" y1="710" x2="1370" y2="710" stroke="#214f6c" stroke-width="3"/>
  <rect x="900" y="690" width="240" height="40" rx="20" fill="#9d00ff"/>
  <text x="900" y="775" fill="#b8d8ea" font-family="Arial, sans-serif" font-size="20">Source freshness</text>

  <text x="120" y="845" fill="#3f6a86" font-family="Arial, sans-serif" font-size="20">Feature Snapshot • Retrieval Debug</text>
</svg>
