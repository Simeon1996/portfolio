  <text x="610" y="455" fill="#b6d2e6" font-family="Arial, sans-serif" font-size="20">"Regulatory headwinds remain in the shipping vertical..."</text>

  <rect x="580" y="520" width="860" height="210" rx="10" fill="#0e3048"/>
  <text x="610" y="570" fill="#e7f7ff" font-family="Arial, sans-serif" font-size="22">Quality Scores</text>
  <rect x="610" y="600" width="760" height="22" rx="11" fill="#1d4864"/>
  <rect x="610" y="600" width="706" height="22" rx="11" fill="#00f5ff"/>
  <text x="610" y="655" fill="#b7d7ea" font-family="Arial, sans-serif" font-size="20">Semantic coherence: 93%</text>
  <text x="610" y="690" fill="#b7d7ea" font-family="Arial, sans-serif" font-size="20">Entity retention: 89%</text>

  <text x="120" y="845" fill="#3f6a86" font-family="Arial, sans-serif" font-size="20">Feature Snapshot • Chunk Preview</text>
</svg>
