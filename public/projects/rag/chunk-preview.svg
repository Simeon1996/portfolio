<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Chunk Preview</title>
  <desc id="desc">Example screenshot style panel for chunking and document segmentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071523"/>
      <stop offset="100%" stop-color="#102233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#9d00ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="760" rx="20" fill="#0c1e30" stroke="#1b3750"/>
  <rect x="70" y="70" width="1460" height="3" fill="url(#accent)"/>

  <rect x="120" y="130" width="380" height="640" rx="12" fill="#10263a" stroke="#234560"/>
  <text x="150" y="180" fill="#97c0dc" font-family="Arial, sans-serif" font-size="28">Sections</text>
  <rect x="150" y="220" width="320" height="80" rx="9" fill="#12405f"/>
