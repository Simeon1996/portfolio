  <rect x="150" y="420" width="320" height="80" rx="9" fill="#103654"/>
  <text x="178" y="468" fill="#dff9ff" font-family="Arial, sans-serif" font-size="24">Revenue Metrics</text>

  <rect x="540" y="130" width="940" height="640" rx="12" fill="#0f273b" stroke="#22445f"/>
  <text x="580" y="180" fill="#97c0dc" font-family="Arial, sans-serif" font-size="28">Chunking Inspector</text>

  <rect x="580" y="220" width="860" height="120" rx="10" fill="#12324b"/>
  <text x="610" y="265" fill="#d5ecfa" font-family="Arial, sans-serif" font-size="22">Chunk #17 • 512 tokens • overlap 80</text>
  <text x="610" y="305" fill="#b6d2e6" font-family="Arial, sans-serif" font-size="20">"Revenue increased 31% YoY with margin expansion in EMEA..."</text>

  <rect x="580" y="370" width="860" height="120" rx="10" fill="#12324b"/>
