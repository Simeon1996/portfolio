<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Citation Panel</title>
  <desc id="desc">Example screenshot style panel showing traceable citations and source links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071320"/>
      <stop offset="100%" stop-color="#12293d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="760" rx="20" fill="#0c1f31" stroke="#1f3b54"/>
  <rect x="70" y="70" width="1460" height="3" fill="#00f5ff"/>

  <rect x="120" y="130" width="900" height="640" rx="12" fill="#0f273b"/>
  <text x="160" y="180" fill="#9bc3dd" font-family="Arial, sans-serif" font-size="28">Answer With Citations</text>
  <rect x="160" y="220" width="820" height="500" rx="10" fill="#12324b"/>
  <text x="190" y="275" fill="#e6f8ff" font-family="Arial, sans-serif" font-size="22">Response includes 5 linked statements and confidence score.</text>
  <text x="190" y="320" fill="#c6e0f0" font-family="Arial, sans-serif" font-size="20">1) SLA penalties apply after 2 missed response windows.</text>
  <text x="190" y="360" fill="#c6e0f0" font-family="Arial, sans-serif" font-size="20">2) Penalty cap is 10% of monthly fees in enterprise tier.</text>
  <text x="190" y="400" fill="#c6e0f0" font-family="Arial, sans-serif" font-size="20">3) Force-majeure exclusions include cloud region outages.</text>

  <rect x="1060" y="130" width="420" height="640" rx="12" fill="#10253a"/>
  <text x="1095" y="180" fill="#9bc3dd" font-family="Arial, sans-serif" font-size="28">Source Trace</text>
  <rect x="1095" y="220" width="350" height="140" rx="10" fill="#124261"/>
  <text x="1120" y="270" fill="#e8fbff" font-family="Arial, sans-serif" font-size="20">Master_Service_Agreement.pdf</text>
  <text x="1120" y="305" fill="#c8e2f2" font-family="Arial, sans-serif" font-size="18">Section 7.2 • Page 18</text>
  <rect x="1095" y="380" width="350" height="140" rx="10" fill="#103957"/>
  <text x="1120" y="430" fill="#e8fbff" font-family="Arial, sans-serif" font-size="20">Enterprise_Addendum.pdf</text>
  <text x="1120" y="465" fill="#c8e2f2" font-family="Arial, sans-serif" font-size="18">Section 2.4 • Page 6</text>
  <rect x="1095" y="540" width="350" height="180" rx="10" fill="#0f314a"/>
  <text x="1120" y="590" fill="#def5ff" font-family="Arial, sans-serif" font-size="20">Confidence</text>
  <rect x="1120" y="615" width="280" height="20" rx="10" fill="#1e4b67"/>
  <rect x="1120" y="615" width="232" height="20" rx="10" fill="#00ff88"/>
  <text x="1120" y="670" fill="#bcd9eb" font-family="Arial, sans-serif" font-size="18">82% evidence alignment</text>

  <text x="120" y="845" fill="#3f6a86" font-family="Arial, sans-serif" font-size="20">Feature Snapshot • Citation Panel</text>
</svg>
