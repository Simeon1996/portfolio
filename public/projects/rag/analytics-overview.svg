<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Analytics Overview</title>
  <desc id="desc">Example screenshot style panel for RAG usage analytics and quality metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061321"/>
      <stop offset="100%" stop-color="#13283b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="70" width="1460" height="760" rx="20" fill="#0d2032" stroke="#1d3852"/>
  <rect x="70" y="70" width="1460" height="3" fill="#00f5ff"/>

  <text x="120" y="145" fill="#9dc4de" font-family="Arial, sans-serif" font-size="30">Analytics Overview</text>

  <rect x="120" y="180" width="330" height="160" rx="12" fill="#11344f"/>
  <text x="155" y="235" fill="#d6effd" font-family="Arial, sans-serif" font-size="22">Avg Retrieval</text>
  <text x="155" y="295" fill="#00f5ff" font-family="Arial, sans-serif" font-size="48">168ms</text>

  <rect x="480" y="180" width="330" height="160" rx="12" fill="#11344f"/>
  <text x="515" y="235" fill="#d6effd" font-family="Arial, sans-serif" font-size="22">Citation Rate</text>
  <text x="515" y="295" fill="#00ff88" font-family="Arial, sans-serif" font-size="48">97.2%</text>

  <rect x="840" y="180" width="330" height="160" rx="12" fill="#11344f"/>
  <text x="875" y="235" fill="#d6effd" font-family="Arial, sans-serif" font-size="22">Topical Recall</text>
  <text x="875" y="295" fill="#ffe000" font-family="Arial, sans-serif" font-size="48">91%</text>

  <rect x="1200" y="180" width="280" height="160" rx="12" fill="#11344f"/>
  <text x="1235" y="235" fill="#d6effd" font-family="Arial, sans-serif" font-size="22">Errors</text>
  <text x="1235" y="295" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="48">0.8%</text>

  <rect x="120" y="380" width="920" height="380" rx="12" fill="#10273c"/>
  <text x="155" y="430" fill="#9dc4de" font-family="Arial, sans-serif" font-size="26">Requests by Day</text>
  <line x1="170" y1="700" x2="990" y2="700" stroke="#244d68" stroke-width="3"/>
  <polyline points="170,670 290,630 410,650 530,560 650,590 770,520 890,470 990,500" fill="none" stroke="#00f5ff" stroke-width="6"/>
  <circle cx="530" cy="560" r="8" fill="#00ff88"/>
  <circle cx="770" cy="520" r="8" fill="#00ff88"/>
  <circle cx="890" cy="470" r="8" fill="#00ff88"/>

  <rect x="1080" y="380" width="400" height="380" rx="12" fill="#10273c"/>
  <text x="1115" y="430" fill="#9dc4de" font-family="Arial, sans-serif" font-size="26">Failure Modes</text>
  <text x="1120" y="490" fill="#d6effd" font-family="Arial, sans-serif" font-size="21">Low confidence answers</text>
  <rect x="1120" y="508" width="300" height="18" rx="9" fill="#1f4d68"/>
  <rect x="1120" y="508" width="92" height="18" rx="9" fill="#ff6b6b"/>
  <text x="1120" y="570" fill="#d6effd" font-family="Arial, sans-serif" font-size="21">Stale source references</text>
  <rect x="1120" y="588" width="300" height="18" rx="9" fill="#1f4d68"/>
  <rect x="1120" y="588" width="66" height="18" rx="9" fill="#fb923c"/>
  <text x="1120" y="650" fill="#d6effd" font-family="Arial, sans-serif" font-size="21">Timeouts</text>
  <rect x="1120" y="668" width="300" height="18" rx="9" fill="#1f4d68"/>
  <rect x="1120" y="668" width="24" height="18" rx="9" fill="#ffe000"/>

  <text x="120" y="845" fill="#3f6a86" font-family="Arial, sans-serif" font-size="20">Feature Snapshot • Analytics Overview</text>
</svg>
