<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#08131f"/>
  <rect width="800" height="40" fill="#0d1b2b"/>
  <rect x="0" y="40" width="800" height="1" fill="#244763"/>
  <text x="20" y="26" fill="#00f5ff" font-size="14" font-weight="bold">Email RAG · Ingestion Pipeline</text>
  <text x="560" y="26" fill="#5a8090" font-size="11">Real-time processing · IMAP source</text>

  <!-- Pipeline diagram -->
  <!-- Stage 1: Email Inbox -->
  <rect x="20" y="90" width="110" height="80" rx="4" fill="#0d1b2b" stroke="#00f5ff" stroke-width="1.5"/>
  <text x="75" y="118" fill="#00f5ff" font-size="10" text-anchor="middle" font-weight="bold">Email</text>
  <text x="75" y="132" fill="#00f5ff" font-size="10" text-anchor="middle" font-weight="bold">Inbox</text>
  <text x="75" y="152" fill="#3a6080" font-size="9" text-anchor="middle">IMAP/OAuth</text>
  <text x="75" y="164" fill="#3a6080" font-size="9" text-anchor="middle">Gmail/O365</text>
  <!-- Counter -->
  <rect x="20" y="176" width="110" height="22" rx="0" fill="#00f5ff" opacity="0.1"/>
  <text x="75" y="192" fill="#00f5ff" font-size="11" text-anchor="middle" font-weight="bold">1,842 /hr</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="130" x2="158" y2="130" stroke="#244763" stroke-width="2"/>
  <polygon points="158,130 150,125 150,135" fill="#244763"/>
  <text x="144" y="124" fill="#3a6080" font-size="8" text-anchor="middle">fetch</text>

  <!-- Stage 2: Parser -->
  <rect x="160" y="90" width="110" height="80" rx="4" fill="#0d1b2b" stroke="#9d00ff" stroke-width="1.5"/>
  <text x="215" y="118" fill="#9d00ff" font-size="10" text-anchor="middle" font-weight="bold">Parser</text>
  <text x="215" y="134" fill="#3a6080" font-size="9" text-anchor="middle">HTML → text</text>
  <text x="215" y="148" fill="#3a6080" font-size="9" text-anchor="middle">Thread extract</text>
  <text x="215" y="162" fill="#3a6080" font-size="9" text-anchor="middle">Attach detect</text>
  <rect x="160" y="176" width="110" height="22" rx="0" fill="#9d00ff" opacity="0.1"/>
  <text x="215" y="192" fill="#9d00ff" font-size="11" text-anchor="middle" font-weight="bold">1,801 /hr</text>

  <!-- Arrow 2 -->
  <line x1="270" y1="130" x2="298" y2="130" stroke="#244763" stroke-width="2"/>
  <polygon points="298,130 290,125 290,135" fill="#244763"/>

  <!-- Stage 3: Chunker -->
  <rect x="300" y="90" width="110" height="80" rx="4" fill="#0d1b2b" stroke="#00ff88" stroke-width="1.5"/>
  <text x="355" y="118" fill="#00ff88" font-size="10" text-anchor="middle" font-weight="bold">Chunker</text>
  <text x="355" y="134" fill="#3a6080" font-size="9" text-anchor="middle">Semantic split</text>
  <text x="355" y="148" fill="#3a6080" font-size="9" text-anchor="middle">512 tok window</text>
  <text x="355" y="162" fill="#3a6080" font-size="9" text-anchor="middle">64 tok overlap</text>
  <rect x="300" y="176" width="110" height="22" rx="0" fill="#00ff88" opacity="0.1"/>
  <text x="355" y="192" fill="#00ff88" font-size="11" text-anchor="middle" font-weight="bold">5,642 /hr</text>

  <!-- Arrow 3 -->
  <line x1="410" y1="130" x2="438" y2="130" stroke="#244763" stroke-width="2"/>
  <polygon points="438,130 430,125 430,135" fill="#244763"/>

  <!-- Stage 4: Embedder -->
  <rect x="440" y="90" width="110" height="80" rx="4" fill="#0d1b2b" stroke="#ffe000" stroke-width="1.5"/>
  <text x="495" y="118" fill="#ffe000" font-size="10" text-anchor="middle" font-weight="bold">Embedder</text>
  <text x="495" y="134" fill="#3a6080" font-size="9" text-anchor="middle">text-emb-3</text>
  <text x="495" y="148" fill="#3a6080" font-size="9" text-anchor="middle">1536 dims</text>
  <text x="495" y="162" fill="#3a6080" font-size="9" text-anchor="middle">batch: 64</text>
  <rect x="440" y="176" width="110" height="22" rx="0" fill="#ffe000" opacity="0.1"/>
  <text x="495" y="192" fill="#ffe000" font-size="11" text-anchor="middle" font-weight="bold">5,602 /hr</text>

  <!-- Arrow 4: splits into two -->
  <line x1="550" y1="130" x2="580" y2="130" stroke="#244763" stroke-width="2"/>
  <line x1="580" y1="130" x2="580" y2="110" stroke="#244763" stroke-width="1.5"/>
  <line x1="580" y1="130" x2="580" y2="160" stroke="#244763" stroke-width="1.5"/>
  <line x1="580" y1="110" x2="608" y2="110" stroke="#244763" stroke-width="1.5"/>
  <line x1="580" y1="160" x2="608" y2="160" stroke="#244763" stroke-width="1.5"/>
  <polygon points="608,110 600,105 600,115" fill="#244763"/>
  <polygon points="608,160 600,155 600,165" fill="#244763"/>

  <!-- Stage 5a: OpenSearch -->
  <rect x="610" y="78" width="130" height="60" rx="4" fill="#0d1b2b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="675" y="100" fill="#fb923c" font-size="10" text-anchor="middle" font-weight="bold">OpenSearch</text>
  <text x="675" y="116" fill="#3a6080" font-size="9" text-anchor="middle">BM25 Index</text>
  <text x="675" y="128" fill="#3a6080" font-size="9" text-anchor="middle">Full-text search</text>
  <rect x="610" y="144" width="130" height="16" rx="0" fill="#fb923c" opacity="0.1"/>
  <text x="675" y="156" fill="#fb923c" font-size="9" text-anchor="middle">4,881 docs indexed</text>

  <!-- Stage 5b: Qdrant -->
  <rect x="610" y="148" width="130" height="60" rx="4" fill="#0d1b2b" stroke="#00f5ff" stroke-width="1.5"/>
  <text x="675" y="170" fill="#00f5ff" font-size="10" text-anchor="middle" font-weight="bold">Qdrant</text>
  <text x="675" y="186" fill="#3a6080" font-size="9" text-anchor="middle">Vector store</text>
  <text x="675" y="198" fill="#3a6080" font-size="9" text-anchor="middle">Dense search</text>
  <rect x="610" y="214" width="130" height="16" rx="0" fill="#00f5ff" opacity="0.1"/>
  <text x="675" y="226" fill="#00f5ff" font-size="9" text-anchor="middle">4,881 vectors stored</text>

  <!-- Throughput / status panel -->
  <rect x="10" y="240" width="590" height="70" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="10" y="240" width="590" height="24" fill="#112338"/>
  <text x="24" y="258" fill="#c8e0f4" font-size="11" font-weight="bold">Pipeline Throughput Counters</text>

  <text x="24" y="284" fill="#5a8090" font-size="9">EMAILS/HR</text>
  <text x="24" y="300" fill="#00f5ff" font-size="16" font-weight="bold">1,842</text>

  <text x="130" y="284" fill="#5a8090" font-size="9">CHUNKS/HR</text>
  <text x="130" y="300" fill="#00ff88" font-size="16" font-weight="bold">5,642</text>

  <text x="250" y="284" fill="#5a8090" font-size="9">EMBED LATENCY</text>
  <text x="250" y="300" fill="#ffe000" font-size="16" font-weight="bold">12ms</text>

  <text x="370" y="284" fill="#5a8090" font-size="9">INDEX LATENCY</text>
  <text x="370" y="300" fill="#fb923c" font-size="16" font-weight="bold">8ms</text>

  <text x="480" y="284" fill="#5a8090" font-size="9">QUEUE DEPTH</text>
  <text x="480" y="300" fill="#c8e0f4" font-size="16" font-weight="bold">142</text>

  <!-- Log panel -->
  <rect x="10" y="320" width="590" height="120" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="10" y="320" width="590" height="24" fill="#112338"/>
  <text x="24" y="338" fill="#c8e0f4" font-size="11" font-weight="bold">Live Ingestion Log</text>
  <text x="22" y="360" fill="#3a6080" font-size="9" font-family="monospace">14:32:18.441 INBOX     fetched 42 new emails (thread_id: 8a3f..)</text>
  <text x="22" y="374" fill="#3a6080" font-size="9" font-family="monospace">14:32:18.502 PARSER    stripped HTML · 42 emails → 38 text bodies</text>
  <text x="22" y="388" fill="#00ff88" font-size="9" font-family="monospace">14:32:18.580 CHUNKER   produced 124 chunks (avg 492 tokens)</text>
  <text x="22" y="402" fill="#ffe000" font-size="9" font-family="monospace">14:32:18.712 EMBEDDER  batch 64/124 embedded · 12ms</text>
  <text x="22" y="416" fill="#00f5ff" font-size="9" font-family="monospace">14:32:18.720 QDRANT    upserted 124 vectors · collection: email_v3</text>
  <text x="22" y="430" fill="#fb923c" font-size="9" font-family="monospace">14:32:18.724 OPENSRCH  indexed 124 docs · BM25 refresh queued</text>

  <!-- Status sidebar -->
  <rect x="610" y="240" width="180" height="200" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="610" y="240" width="180" height="24" fill="#112338"/>
  <text x="624" y="258" fill="#c8e0f4" font-size="11" font-weight="bold">System Health</text>

  <rect x="622" y="270" width="156" height="22" rx="2" fill="#08131f"/>
  <circle cx="634" cy="281" r="5" fill="#00ff88"/>
  <text x="644" y="285" fill="#c8e0f4" font-size="10">IMAP connector</text>
  <text x="748" y="285" fill="#00ff88" font-size="9">OK</text>

  <rect x="622" y="298" width="156" height="22" rx="2" fill="#08131f"/>
  <circle cx="634" cy="309" r="5" fill="#00ff88"/>
  <text x="644" y="313" fill="#c8e0f4" font-size="10">Embedder API</text>
  <text x="748" y="313" fill="#00ff88" font-size="9">OK</text>

  <rect x="622" y="326" width="156" height="22" rx="2" fill="#08131f"/>
  <circle cx="634" cy="337" r="5" fill="#00ff88"/>
  <text x="644" y="341" fill="#c8e0f4" font-size="10">Qdrant cluster</text>
  <text x="748" y="341" fill="#00ff88" font-size="9">OK</text>

  <rect x="622" y="354" width="156" height="22" rx="2" fill="#08131f"/>
  <circle cx="634" cy="365" r="5" fill="#ffe000"/>
  <text x="644" y="369" fill="#c8e0f4" font-size="10">OpenSearch</text>
  <text x="736" y="369" fill="#ffe000" font-size="9">LAG</text>

  <text x="622" y="398" fill="#5a8090" font-size="9">Total indexed: 4.88M chunks</text>
  <text x="622" y="412" fill="#3a6080" font-size="9">Since: Jan 1 2025</text>
  <text x="622" y="426" fill="#3a6080" font-size="9">Storage: 18.4 GB</text>
</svg>
