<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#f0f4fa"/>
  <rect width="800" height="40" fill="#f8fafd"/>
  <rect x="0" y="40" width="800" height="1" fill="#c8d6e8"/>
  <text x="20" y="26" fill="#ff0080" font-size="14" font-weight="bold">Causal Impact Graph</text>
  <text x="580" y="26" fill="#5878a0" font-size="11">Incident INC-2847 · payment-service</text>

  <!-- Legend -->
  <rect x="620" y="50" width="170" height="120" rx="3" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <text x="632" y="67" fill="#5878a0" font-size="10">IMPACT LEVEL</text>
  <circle cx="640" cy="82" r="6" fill="#ff0080"/>
  <text x="652" y="86" fill="#1a2535" font-size="10">Critical (root cause)</text>
  <circle cx="640" cy="100" r="6" fill="#ffe000"/>
  <text x="652" y="104" fill="#1a2535" font-size="10">High impact</text>
  <circle cx="640" cy="118" r="6" fill="#fb923c"/>
  <text x="652" y="122" fill="#1a2535" font-size="10">Medium impact</text>
  <circle cx="640" cy="136" r="6" fill="#00ff88"/>
  <text x="652" y="140" fill="#1a2535" font-size="10">Healthy</text>
  <text x="632" y="158" fill="#5878a0" font-size="10">Arrow = dependency</text>

  <!-- Edges (arrows) -->
  <!-- payment-svc → billing-api -->
  <line x1="220" y1="200" x2="360" y2="160" stroke="#ff0080" stroke-width="2" opacity="0.7"/>
  <polygon points="360,160 350,152 352,163" fill="#ff0080"/>
  <!-- payment-svc → order-svc -->
  <line x1="220" y1="210" x2="360" y2="270" stroke="#ffe000" stroke-width="2" opacity="0.7"/>
  <polygon points="360,270 349,263 352,274" fill="#ffe000"/>
  <!-- billing-api → notification-svc -->
  <line x1="430" y1="148" x2="540" y2="120" stroke="#ffe000" stroke-width="1.5" opacity="0.6"/>
  <polygon points="540,120 530,114 532,124" fill="#ffe000"/>
  <!-- order-svc → inventory-svc -->
  <line x1="430" y1="280" x2="540" y2="300" stroke="#fb923c" stroke-width="1.5" opacity="0.6"/>
  <polygon points="540,300 529,293 531,304" fill="#fb923c"/>
  <!-- db-primary → payment-svc -->
  <line x1="130" y1="310" x2="185" y2="230" stroke="#ff0080" stroke-width="2.5" opacity="0.8"/>
  <polygon points="185,230 176,237 179,227" fill="#ff0080"/>
  <!-- redis → payment-svc -->
  <line x1="100" y1="140" x2="178" y2="185" stroke="#ffe000" stroke-width="1.5" opacity="0.6"/>
  <polygon points="178,185 169,178 171,188" fill="#ffe000"/>
  <!-- api-gateway → payment-svc -->
  <line x1="100" y1="240" x2="178" y2="208" stroke="#fb923c" stroke-width="1.5" opacity="0.6"/>
  <polygon points="178,208 168,204 171,214" fill="#fb923c"/>
  <!-- billing-api → payment-svc (feedback) -->
  <line x1="360" y1="165" x2="225" y2="195" stroke="#ff0080" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Node: db-primary (root cause) -->
  <circle cx="130" cy="320" r="34" fill="#ff0080" opacity="0.15" stroke="#ff0080" stroke-width="2"/>
  <circle cx="130" cy="320" r="26" fill="#f8fafd" stroke="#ff0080" stroke-width="2"/>
  <text x="130" y="316" fill="#ff0080" font-size="9" text-anchor="middle" font-weight="bold">db-primary</text>
  <text x="130" y="328" fill="#ff0080" font-size="8" text-anchor="middle">OOM</text>
  <rect x="96" y="340" width="68" height="14" rx="3" fill="#ff0080"/>
  <text x="130" y="351" fill="#f0f4fa" font-size="8" font-weight="bold" text-anchor="middle">ROOT CAUSE</text>

  <!-- Node: payment-svc (critical) -->
  <circle cx="200" cy="210" r="38" fill="#ff0080" opacity="0.1" stroke="#ff0080" stroke-width="2"/>
  <circle cx="200" cy="210" r="30" fill="#f8fafd" stroke="#ff0080" stroke-width="2"/>
  <text x="200" y="206" fill="#ff0080" font-size="9" text-anchor="middle" font-weight="bold">payment-svc</text>
  <text x="200" y="218" fill="#ff0080" font-size="8" text-anchor="middle">CRITICAL</text>

  <!-- Node: redis -->
  <circle cx="90" cy="132" r="24" fill="#ffe000" opacity="0.1" stroke="#ffe000" stroke-width="1.5"/>
  <circle cx="90" cy="132" r="18" fill="#f8fafd" stroke="#ffe000" stroke-width="1.5"/>
  <text x="90" y="128" fill="#ffe000" font-size="8" text-anchor="middle">redis</text>
  <text x="90" y="140" fill="#ffe000" font-size="7" text-anchor="middle">HIGH</text>

  <!-- Node: api-gateway -->
  <circle cx="90" cy="248" r="26" fill="#fb923c" opacity="0.1" stroke="#fb923c" stroke-width="1.5"/>
  <circle cx="90" cy="248" r="20" fill="#f8fafd" stroke="#fb923c" stroke-width="1.5"/>
  <text x="90" y="244" fill="#fb923c" font-size="8" text-anchor="middle">api-gw</text>
  <text x="90" y="256" fill="#fb923c" font-size="7" text-anchor="middle">MED</text>

  <!-- Node: billing-api (high) -->
  <circle cx="395" cy="148" r="30" fill="#ffe000" opacity="0.1" stroke="#ffe000" stroke-width="1.5"/>
  <circle cx="395" cy="148" r="22" fill="#f8fafd" stroke="#ffe000" stroke-width="1.5"/>
  <text x="395" y="144" fill="#ffe000" font-size="9" text-anchor="middle">billing-api</text>
  <text x="395" y="156" fill="#ffe000" font-size="7" text-anchor="middle">HIGH</text>

  <!-- Node: order-svc (high) -->
  <circle cx="395" cy="278" r="28" fill="#ffe000" opacity="0.1" stroke="#ffe000" stroke-width="1.5"/>
  <circle cx="395" cy="278" r="22" fill="#f8fafd" stroke="#ffe000" stroke-width="1.5"/>
  <text x="395" y="274" fill="#ffe000" font-size="9" text-anchor="middle">order-svc</text>
  <text x="395" y="286" fill="#ffe000" font-size="7" text-anchor="middle">HIGH</text>

  <!-- Node: notification-svc -->
  <circle cx="570" cy="112" r="26" fill="#fb923c" opacity="0.1" stroke="#fb923c" stroke-width="1.5"/>
  <circle cx="570" cy="112" r="20" fill="#f8fafd" stroke="#fb923c" stroke-width="1.5"/>
  <text x="570" y="108" fill="#fb923c" font-size="8" text-anchor="middle">notif-svc</text>
  <text x="570" y="120" fill="#fb923c" font-size="7" text-anchor="middle">MED</text>

  <!-- Node: inventory-svc -->
  <circle cx="570" cy="308" r="26" fill="#fb923c" opacity="0.1" stroke="#fb923c" stroke-width="1.5"/>
  <circle cx="570" cy="308" r="20" fill="#f8fafd" stroke="#fb923c" stroke-width="1.5"/>
  <text x="570" y="304" fill="#fb923c" font-size="8" text-anchor="middle">invent-svc</text>
  <text x="570" y="316" fill="#fb923c" font-size="7" text-anchor="middle">MED</text>

  <!-- Node: email-svc (healthy) -->
  <line x1="570" y1="118" x2="680" y2="160" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <polygon points="680,160 670,154 672,164" fill="#00ff88"/>
  <circle cx="700" cy="168" r="22" fill="#00ff88" opacity="0.08" stroke="#00ff88" stroke-width="1"/>
  <circle cx="700" cy="168" r="16" fill="#f8fafd" stroke="#00ff88" stroke-width="1"/>
  <text x="700" y="164" fill="#00ff88" font-size="8" text-anchor="middle">email-svc</text>
  <text x="700" y="175" fill="#00ff88" font-size="7" text-anchor="middle">OK</text>

  <!-- Node: analytics (healthy) -->
  <line x1="570" y1="314" x2="680" y2="330" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <polygon points="680,330 669,325 672,335" fill="#00ff88"/>
  <circle cx="700" cy="338" r="22" fill="#00ff88" opacity="0.08" stroke="#00ff88" stroke-width="1"/>
  <circle cx="700" cy="338" r="16" fill="#f8fafd" stroke="#00ff88" stroke-width="1"/>
  <text x="700" y="334" fill="#00ff88" font-size="8" text-anchor="middle">analytics</text>
  <text x="700" y="345" fill="#00ff88" font-size="7" text-anchor="middle">OK</text>

  <!-- Info panel bottom -->
  <rect x="10" y="400" width="600" height="40" rx="3" fill="#edf1f8"/>
  <text x="24" y="417" fill="#5878a0" font-size="10">PROPAGATION PATH</text>
  <text x="24" y="432" fill="#1a2535" font-size="10">db-primary (OOM)  →  payment-svc (crash)  →  billing-api (timeout)  →  notification-svc (backlog)</text>
</svg>
