<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#f0f4fa"/>
  <rect width="800" height="40" fill="#f8fafd"/>
  <rect x="0" y="40" width="800" height="1" fill="#c8d6e8"/>
  <text x="20" y="26" fill="#ff0080" font-size="14" font-weight="bold">Incident Detection Dashboard</text>
  <rect x="620" y="10" width="80" height="22" rx="3" fill="#ff0080" opacity="0.2" stroke="#ff0080" stroke-width="1"/>
  <text x="660" y="25" fill="#ff0080" font-size="11" font-weight="bold" text-anchor="middle">2 CRITICAL</text>
  <circle cx="760" cy="20" r="6" fill="#ff0080"/>
  <text x="770" y="25" fill="#ff0080" font-size="11">ALERT</text>

  <!-- Timeline chart -->
  <rect x="10" y="50" width="530" height="180" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <rect x="10" y="50" width="530" height="28" fill="#edf1f8"/>
  <text x="24" y="69" fill="#1a2535" font-size="12" font-weight="bold">Severity Timeline — Last 6h</text>
  <text x="460" y="69" fill="#7a9ab8" font-size="10">Live · 30s refresh</text>

  <!-- Chart axes -->
  <line x1="50" y1="88" x2="50" y2="215" stroke="#c8d6e8" stroke-width="1"/>
  <line x1="50" y1="215" x2="525" y2="215" stroke="#c8d6e8" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="42" y="93" fill="#7a9ab8" font-size="9" text-anchor="end">CRIT</text>
  <text x="42" y="128" fill="#7a9ab8" font-size="9" text-anchor="end">WARN</text>
  <text x="42" y="163" fill="#7a9ab8" font-size="9" text-anchor="end">INFO</text>
  <text x="42" y="215" fill="#7a9ab8" font-size="9" text-anchor="end">OK</text>
  <!-- Grid lines -->
  <line x1="50" y1="93" x2="525" y2="93" stroke="#c8d6e8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="50" y1="128" x2="525" y2="128" stroke="#c8d6e8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="50" y1="163" x2="525" y2="163" stroke="#c8d6e8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <!-- X axis labels -->
  <text x="75" y="228" fill="#7a9ab8" font-size="9">-6h</text>
  <text x="155" y="228" fill="#7a9ab8" font-size="9">-5h</text>
  <text x="235" y="228" fill="#7a9ab8" font-size="9">-4h</text>
  <text x="315" y="228" fill="#7a9ab8" font-size="9">-3h</text>
  <text x="395" y="228" fill="#7a9ab8" font-size="9">-2h</text>
  <text x="475" y="228" fill="#7a9ab8" font-size="9">-1h</text>
  <!-- Severity bars -->
  <rect x="60" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="80" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="100" y="204" width="12" height="11" fill="#ffe000"/>
  <rect x="120" y="200" width="12" height="15" fill="#ffe000"/>
  <rect x="140" y="204" width="12" height="11" fill="#ffe000"/>
  <rect x="160" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="180" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="200" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="220" y="200" width="12" height="15" fill="#ffe000"/>
  <rect x="240" y="188" width="12" height="27" fill="#ff0080"/>
  <rect x="260" y="184" width="12" height="31" fill="#ff0080"/>
  <rect x="280" y="188" width="12" height="27" fill="#ff0080"/>
  <rect x="300" y="196" width="12" height="19" fill="#ffe000"/>
  <rect x="320" y="200" width="12" height="15" fill="#ffe000"/>
  <rect x="340" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="360" y="208" width="12" height="7" fill="#00ff88"/>
  <rect x="380" y="204" width="12" height="11" fill="#ffe000"/>
  <rect x="400" y="184" width="12" height="31" fill="#ff0080"/>
  <rect x="420" y="180" width="12" height="35" fill="#ff0080"/>
  <rect x="440" y="184" width="12" height="31" fill="#ff0080"/>
  <rect x="460" y="192" width="12" height="23" fill="#ffe000"/>
  <rect x="480" y="196" width="12" height="19" fill="#ffe000"/>
  <rect x="500" y="184" width="12" height="31" fill="#ff0080"/>

  <!-- Metric graphs row -->
  <rect x="10" y="242" width="170" height="80" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <text x="22" y="260" fill="#5878a0" font-size="10">CPU USAGE</text>
  <text x="22" y="282" fill="#ff0080" font-size="20" font-weight="bold">94%</text>
  <text x="22" y="300" fill="#ff0080" font-size="9">↑ +42% from baseline</text>
  <polyline points="22,316 50,310 78,312 106,295 134,280 162,270" fill="none" stroke="#ff0080" stroke-width="2"/>

  <rect x="190" y="242" width="170" height="80" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <text x="202" y="260" fill="#5878a0" font-size="10">MEMORY</text>
  <text x="202" y="282" fill="#ffe000" font-size="20" font-weight="bold">87%</text>
  <text x="202" y="300" fill="#ffe000" font-size="9">↑ +28% from baseline</text>
  <polyline points="202,316 230,314 258,310 286,305 314,295 342,288" fill="none" stroke="#ffe000" stroke-width="2"/>

  <rect x="370" y="242" width="170" height="80" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <text x="382" y="260" fill="#5878a0" font-size="10">ERROR RATE</text>
  <text x="382" y="282" fill="#ff0080" font-size="20" font-weight="bold">12.4%</text>
  <text x="382" y="300" fill="#ff0080" font-size="9">↑ +11.1% from baseline</text>
  <polyline points="382,316 410,315 438,314 466,308 494,290 522,275" fill="none" stroke="#ff0080" stroke-width="2"/>

  <!-- Active Incidents panel -->
  <rect x="548" y="50" width="242" height="380" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <rect x="548" y="50" width="242" height="28" fill="#edf1f8"/>
  <text x="562" y="69" fill="#1a2535" font-size="12" font-weight="bold">Active Incidents</text>

  <!-- Incident 1: Critical -->
  <rect x="558" y="88" width="222" height="90" rx="3" fill="#f0f4fa" stroke="#ff0080" stroke-width="1"/>
  <rect x="558" y="88" width="222" height="22" rx="3" fill="#ff0080" opacity="0.2"/>
  <rect x="562" y="91" width="52" height="16" rx="2" fill="#ff0080"/>
  <text x="588" y="103" fill="#f0f4fa" font-size="9" font-weight="bold" text-anchor="middle">CRITICAL</text>
  <text x="624" y="103" fill="#1a2535" font-size="10">INC-2847</text>
  <text x="562" y="124" fill="#1a2535" font-size="11">payment-service OOM crash</text>
  <text x="562" y="139" fill="#5878a0" font-size="10">Services: payment-svc, billing-api</text>
  <text x="562" y="153" fill="#ff0080" font-size="10">Duration: 14m 22s</text>
  <text x="562" y="170" fill="#7a9ab8" font-size="10">Agent: investigating root cause</text>

  <!-- Incident 2: Critical -->
  <rect x="558" y="188" width="222" height="90" rx="3" fill="#f0f4fa" stroke="#ff0080" stroke-width="1"/>
  <rect x="558" y="188" width="222" height="22" rx="3" fill="#ff0080" opacity="0.2"/>
  <rect x="562" y="191" width="52" height="16" rx="2" fill="#ff0080"/>
  <text x="588" y="203" fill="#f0f4fa" font-size="9" font-weight="bold" text-anchor="middle">CRITICAL</text>
  <text x="624" y="203" fill="#1a2535" font-size="10">INC-2848</text>
  <text x="562" y="224" fill="#1a2535" font-size="11">DB connection pool exhausted</text>
  <text x="562" y="239" fill="#5878a0" font-size="10">Services: auth-svc, user-api</text>
  <text x="562" y="253" fill="#ff0080" font-size="10">Duration: 8m 05s</text>
  <text x="562" y="270" fill="#7a9ab8" font-size="10">Agent: executing runbook step 3</text>

  <!-- Incident 3: Warning -->
  <rect x="558" y="288" width="222" height="90" rx="3" fill="#f0f4fa" stroke="#ffe000" stroke-width="1"/>
  <rect x="558" y="288" width="222" height="22" rx="3" fill="#ffe000" opacity="0.15"/>
  <rect x="562" y="291" width="52" height="16" rx="2" fill="#ffe000"/>
  <text x="588" y="303" fill="#f0f4fa" font-size="9" font-weight="bold" text-anchor="middle">WARNING</text>
  <text x="624" y="303" fill="#1a2535" font-size="10">INC-2849</text>
  <text x="562" y="324" fill="#1a2535" font-size="11">API latency p99 &gt; 2s threshold</text>
  <text x="562" y="339" fill="#5878a0" font-size="10">Services: api-gateway</text>
  <text x="562" y="353" fill="#ffe000" font-size="10">Duration: 3m 41s</text>
  <text x="562" y="370" fill="#7a9ab8" font-size="10">Agent: monitoring, no action yet</text>

  <!-- Bottom -->
  <rect x="558" y="388" width="222" height="32" rx="3" fill="#edf1f8"/>
  <text x="562" y="405" fill="#5878a0" font-size="10">MTTR today: 18m 34s</text>
  <text x="562" y="418" fill="#7a9ab8" font-size="10">12 incidents resolved in 24h</text>

  <!-- Bottom chart area continuation -->
  <rect x="10" y="334" width="530" height="96" rx="4" fill="#f8fafd" stroke="#c8d6e8" stroke-width="1"/>
  <text x="24" y="352" fill="#5878a0" font-size="10">THROUGHPUT (req/s)</text>
  <text x="22" y="378" fill="#00ff88" font-size="18" font-weight="bold">1,247</text>
  <text x="22" y="395" fill="#5878a0" font-size="9">req/s current</text>
  <polyline points="100,420 140,415 180,418 220,390 260,370 300,375 340,360 380,365 420,340 460,345 520,330" fill="none" stroke="#0099bb" stroke-width="1.5"/>
  <text x="400" y="352" fill="#5878a0" font-size="10">Baseline: 2,100 req/s</text>
  <line x1="100" y1="360" x2="520" y2="360" stroke="#c8d6e8" stroke-width="0.5" stroke-dasharray="4,3"/>
</svg>
