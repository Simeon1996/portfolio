<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="800" height="450" fill="#08131f"/>
  <rect width="800" height="40" fill="#0d1b2b"/>
  <rect x="0" y="40" width="800" height="1" fill="#244763"/>
  <text x="20" y="26" fill="#00f5ff" font-size="14" font-weight="bold">LangChain Platform · LCEL Pipeline</text>
  <text x="560" y="26" fill="#5a8090" font-size="11">RAG Q&amp;A Chain · gpt-4o</text>

  <!-- Pipeline visual: horizontal chain -->
  <!-- Stage 1: Retriever -->
  <rect x="20" y="80" width="130" height="120" rx="6" fill="#0d1b2b" stroke="#00f5ff" stroke-width="2"/>
  <rect x="20" y="80" width="130" height="28" rx="6" fill="#00f5ff" opacity="0.15"/>
  <text x="85" y="99" fill="#00f5ff" font-size="10" text-anchor="middle" font-weight="bold">Retriever</text>
  <rect x="32" y="115" width="106" height="12" rx="2" fill="#08131f"/>
  <text x="85" y="125" fill="#3a6080" font-size="8" text-anchor="middle">VectorStoreRetriever</text>
  <rect x="32" y="133" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="85" y="147" fill="#5a8090" font-size="9" text-anchor="middle">k=5 · similarity</text>
  <rect x="32" y="159" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="85" y="173" fill="#5a8090" font-size="9" text-anchor="middle">Qdrant store</text>
  <text x="85" y="194" fill="#00f5ff" font-size="9" text-anchor="middle">List[Document]</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="140" x2="178" y2="140" stroke="#244763" stroke-width="2"/>
  <polygon points="178,140 170,135 170,145" fill="#244763"/>
  <text x="164" y="133" fill="#3a6080" font-size="8" text-anchor="middle">→</text>

  <!-- Stage 2: ContextFormatter -->
  <rect x="180" y="80" width="130" height="120" rx="6" fill="#0d1b2b" stroke="#9d00ff" stroke-width="2"/>
  <rect x="180" y="80" width="130" height="28" rx="6" fill="#9d00ff" opacity="0.15"/>
  <text x="245" y="99" fill="#9d00ff" font-size="10" text-anchor="middle" font-weight="bold">ContextFormatter</text>
  <rect x="192" y="115" width="106" height="12" rx="2" fill="#08131f"/>
  <text x="245" y="125" fill="#3a6080" font-size="8" text-anchor="middle">RunnableLambda</text>
  <rect x="192" y="133" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="245" y="147" fill="#5a8090" font-size="9" text-anchor="middle">join docs</text>
  <rect x="192" y="159" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="245" y="173" fill="#5a8090" font-size="9" text-anchor="middle">add metadata</text>
  <text x="245" y="194" fill="#9d00ff" font-size="9" text-anchor="middle">str</text>

  <!-- Arrow 2 -->
  <line x1="310" y1="140" x2="338" y2="140" stroke="#244763" stroke-width="2"/>
  <polygon points="338,140 330,135 330,145" fill="#244763"/>

  <!-- Stage 3: ChatPrompt -->
  <rect x="340" y="80" width="130" height="120" rx="6" fill="#0d1b2b" stroke="#00ff88" stroke-width="2"/>
  <rect x="340" y="80" width="130" height="28" rx="6" fill="#00ff88" opacity="0.15"/>
  <text x="405" y="99" fill="#00ff88" font-size="10" text-anchor="middle" font-weight="bold">ChatPromptTemplate</text>
  <rect x="352" y="115" width="106" height="12" rx="2" fill="#08131f"/>
  <text x="405" y="125" fill="#3a6080" font-size="8" text-anchor="middle">system + user msgs</text>
  <rect x="352" y="133" width="106" height="36" rx="2" fill="#08131f"/>
  <text x="405" y="147" fill="#5a8090" font-size="9" text-anchor="middle">{context}</text>
  <text x="405" y="161" fill="#5a8090" font-size="9" text-anchor="middle">{question}</text>
  <text x="405" y="194" fill="#00ff88" font-size="9" text-anchor="middle">ChatMessages</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="140" x2="498" y2="140" stroke="#244763" stroke-width="2"/>
  <polygon points="498,140 490,135 490,145" fill="#244763"/>

  <!-- Stage 4: LLM -->
  <rect x="500" y="80" width="130" height="120" rx="6" fill="#0d1b2b" stroke="#ff0080" stroke-width="2"/>
  <rect x="500" y="80" width="130" height="28" rx="6" fill="#ff0080" opacity="0.15"/>
  <text x="565" y="99" fill="#ff0080" font-size="10" text-anchor="middle" font-weight="bold">ChatOpenAI</text>
  <rect x="512" y="115" width="106" height="12" rx="2" fill="#08131f"/>
  <text x="565" y="125" fill="#3a6080" font-size="8" text-anchor="middle">gpt-4o</text>
  <rect x="512" y="133" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="565" y="147" fill="#5a8090" font-size="9" text-anchor="middle">temp: 0.1</text>
  <rect x="512" y="159" width="106" height="20" rx="2" fill="#08131f"/>
  <text x="565" y="173" fill="#5a8090" font-size="9" text-anchor="middle">max_tokens: 2048</text>
  <text x="565" y="194" fill="#ff0080" font-size="9" text-anchor="middle">AIMessage</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="140" x2="658" y2="140" stroke="#244763" stroke-width="2"/>
  <polygon points="658,140 650,135 650,145" fill="#244763"/>

  <!-- Stage 5: OutputParser -->
  <rect x="660" y="80" width="120" height="120" rx="6" fill="#0d1b2b" stroke="#ffe000" stroke-width="2"/>
  <rect x="660" y="80" width="120" height="28" rx="6" fill="#ffe000" opacity="0.15"/>
  <text x="720" y="99" fill="#ffe000" font-size="10" text-anchor="middle" font-weight="bold">OutputParser</text>
  <rect x="672" y="115" width="96" height="12" rx="2" fill="#08131f"/>
  <text x="720" y="125" fill="#3a6080" font-size="8" text-anchor="middle">StrOutputParser</text>
  <rect x="672" y="133" width="96" height="20" rx="2" fill="#08131f"/>
  <text x="720" y="147" fill="#5a8090" font-size="9" text-anchor="middle">.content</text>
  <rect x="672" y="159" width="96" height="20" rx="2" fill="#08131f"/>
  <text x="720" y="173" fill="#5a8090" font-size="9" text-anchor="middle">strip whitespace</text>
  <text x="720" y="194" fill="#ffe000" font-size="9" text-anchor="middle">str</text>

  <!-- LCEL code block -->
  <rect x="20" y="220" width="760" height="90" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="20" y="220" width="760" height="22" fill="#112338"/>
  <text x="34" y="236" fill="#5a8090" font-size="10">LCEL CHAIN DEFINITION</text>
  <text x="30" y="258" fill="#3a6080" font-size="11" font-family="monospace">chain = (</text>
  <text x="30" y="272" fill="#9d00ff" font-size="11" font-family="monospace">    RunnableParallel(context=retriever, question=RunnablePassthrough())</text>
  <text x="30" y="286" fill="#c8e0f4" font-size="11" font-family="monospace">    | context_formatter | prompt | llm | output_parser</text>
  <text x="30" y="300" fill="#3a6080" font-size="11" font-family="monospace">)</text>

  <!-- Stats row -->
  <rect x="20" y="320" width="760" height="120" rx="4" fill="#0d1b2b" stroke="#244763" stroke-width="1"/>
  <rect x="20" y="320" width="760" height="22" fill="#112338"/>
  <text x="34" y="336" fill="#c8e0f4" font-size="11" font-weight="bold">Live Execution Stats</text>

  <rect x="34" y="350" width="140" height="50" rx="3" fill="#08131f"/>
  <text x="44" y="366" fill="#5a8090" font-size="9">LAST INVOCATION</text>
  <text x="44" y="385" fill="#00f5ff" font-size="14" font-weight="bold">1.84s</text>
  <text x="44" y="398" fill="#3a6080" font-size="9">total latency</text>

  <rect x="184" y="350" width="140" height="50" rx="3" fill="#08131f"/>
  <text x="194" y="366" fill="#5a8090" font-size="9">RETRIEVAL</text>
  <text x="194" y="385" fill="#9d00ff" font-size="14" font-weight="bold">142ms</text>
  <text x="194" y="398" fill="#3a6080" font-size="9">p50 latency</text>

  <rect x="334" y="350" width="140" height="50" rx="3" fill="#08131f"/>
  <text x="344" y="366" fill="#5a8090" font-size="9">LLM TOKENS</text>
  <text x="344" y="385" fill="#ff0080" font-size="14" font-weight="bold">1,842</text>
  <text x="344" y="398" fill="#3a6080" font-size="9">in + out tokens</text>

  <rect x="484" y="350" width="140" height="50" rx="3" fill="#08131f"/>
  <text x="494" y="366" fill="#5a8090" font-size="9">THROUGHPUT</text>
  <text x="494" y="385" fill="#00ff88" font-size="14" font-weight="bold">8.4 rps</text>
  <text x="494" y="398" fill="#3a6080" font-size="9">requests/second</text>

  <rect x="634" y="350" width="136" height="50" rx="3" fill="#08131f"/>
  <text x="644" y="366" fill="#5a8090" font-size="9">SUCCESS RATE</text>
  <text x="644" y="385" fill="#00ff88" font-size="14" font-weight="bold">99.8%</text>
  <text x="644" y="398" fill="#3a6080" font-size="9">last 1000 calls</text>
</svg>
