  <rect x="710" y="54" width="28" height="16" rx="5" fill="#dcfce7"/>
  <text x="724" y="65" font-size="8.5" fill="#10b981" font-weight="700" text-anchor="middle">12</text>

  <!-- PR Card 1 -->
  <rect x="640" y="76" width="236" height="56" rx="4" fill="#f7f9fc" filter="url(#rs1)"/>
  <rect x="640" y="76" width="3" height="56" rx="2" fill="#10b981"/>
  <text x="652" y="90" font-size="7.5" fill="#1a2535" font-weight="700">Downsize i3.2xlarge → i3.xlarge</text>
  <text x="652" y="103" font-size="7" fill="#8aa0b8">prod-worker-01 · us-east-1</text>
  <text x="652" y="116" font-size="7" fill="#4a6080">vCPU 8→4  RAM 61GB→30GB</text>
  <text x="652" y="127" font-size="8" fill="#10b981" font-weight="700">$840/mo</text>
  <rect x="822" y="122" width="46" height="12" rx="4" fill="#dcfce7"/>
  <text x="845" y="131" font-size="6.5" fill="#10b981" text-anchor="middle" font-weight="700">Open</text>

  <!-- PR Card 2 -->
