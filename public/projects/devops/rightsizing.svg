<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'SF Mono','Fira Mono','Consolas',monospace">
  <defs>
    <filter id="rs1"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1a2535" flood-opacity="0.08"/></filter>
    <filter id="rs2"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a2535" flood-opacity="0.07"/></filter>
    <pattern id="rdots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#d0daea"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#f7f9fc"/>
  <rect width="900" height="500" fill="url(#rdots)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="34" fill="#eef2f8"/>
  <rect x="0" y="33" width="900" height="1" fill="#e4eaf3"/>
  <text x="16" y="21" font-size="11" font-weight="700" fill="#1a2535" letter-spacing="1.2">INFRASTRUCTURE RIGHT-SIZING</text>
  <text x="884" y="21" font-size="10" fill="#8aa0b8" text-anchor="end">47 recommendations · Est. savings $38K/mo</text>

  <!-- ── MAIN SCATTER CHART ── -->
  <rect x="18" y="44" width="606" height="384" rx="6" fill="white" filter="url(#rs2)"/>

  <!-- Quadrant fills -->
  <!-- Chart plot area: x=70→610, y=54→390 -->
  <!-- Midpoint: x=340 (cost $500), y=222 (util 50%) -->
  <!-- Top-left: underutilized (high util, low cost) -->
  <rect x="70" y="54" width="270" height="168" rx="2" fill="#fefce8" opacity="0.7"/>
  <!-- Top-right: optimized (high util, high cost) -->
  <rect x="340" y="54" width="270" height="168" rx="2" fill="#eff6ff" opacity="0.7"/>
  <!-- Bottom-left: terminate candidates (low util, low cost) -->
  <rect x="70" y="222" width="270" height="168" rx="2" fill="#f0fdf4" opacity="0.7"/>
  <!-- Bottom-right: overprovisioned (low util, high cost) -->
  <rect x="340" y="222" width="270" height="168" rx="2" fill="#fef2f2" opacity="0.7"/>

  <!-- Quadrant labels -->
  <text x="82" y="72" font-size="8" fill="#b45309" font-weight="700" letter-spacing="0.5">UNDERUTILIZED</text>
  <text x="82" y="83" font-size="7.5" fill="#b45309" opacity="0.8">(resize)</text>
  <text x="352" y="72" font-size="8" fill="#1d4ed8" font-weight="700" letter-spacing="0.5">OPTIMIZED</text>
  <text x="82" y="238" font-size="8" fill="#15803d" font-weight="700" letter-spacing="0.5">TERMINATE</text>
  <text x="82" y="249" font-size="7.5" fill="#15803d" opacity="0.8">(candidates)</text>
  <text x="352" y="238" font-size="8" fill="#b91c1c" font-weight="700" letter-spacing="0.5">OVERPROVISIONED</text>
  <text x="352" y="249" font-size="7.5" fill="#b91c1c" opacity="0.8">(downsize)</text>

  <!-- Grid lines -->
  <!-- Vertical at x=70,152,234,340,422,510,610 -->
  <line x1="70"  y1="54"  x2="70"  y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="152" y1="54"  x2="152" y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="234" y1="54"  x2="234" y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="340" y1="54"  x2="340" y2="390" stroke="#e4eaf3" stroke-width="1"/>
  <line x1="422" y1="54"  x2="422" y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="510" y1="54"  x2="510" y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="610" y1="54"  x2="610" y2="390" stroke="#e4eaf3" stroke-width="0.8"/>
  <!-- Horizontal at y=54,96,138,222,264,306,390 -->
  <line x1="70" y1="96"  x2="610" y2="96"  stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="70" y1="138" x2="610" y2="138" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="70" y1="222" x2="610" y2="222" stroke="#e4eaf3" stroke-width="1"/>
  <line x1="70" y1="264" x2="610" y2="264" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="70" y1="306" x2="610" y2="306" stroke="#e4eaf3" stroke-width="0.8"/>
  <line x1="70" y1="390" x2="610" y2="390" stroke="#e4eaf3" stroke-width="0.9"/>

  <!-- Axis labels -->
  <!-- X-axis: cost 0→1000 mapped to x=70→610 (540px/1000=$0.54/unit) -->
  <text x="70"  y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$0</text>
  <text x="152" y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$200</text>
  <text x="234" y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$400</text>
  <text x="340" y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$600</text>
  <text x="422" y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$800</text>
  <text x="510" y="402" font-size="7.5" fill="#8aa0b8" text-anchor="middle">$1,000</text>
  <text x="340" y="416" font-size="8" fill="#4a6080" text-anchor="middle" letter-spacing="0.5">Monthly Cost ($)</text>

  <!-- Y-axis: util 0→100 mapped to y=390→54 (336px/100=3.36/unit) -->
  <text x="64" y="393" font-size="7.5" fill="#8aa0b8" text-anchor="end">0</text>
  <text x="64" y="309" font-size="7.5" fill="#8aa0b8" text-anchor="end">25</text>
  <text x="64" y="225" font-size="7.5" fill="#8aa0b8" text-anchor="end">50</text>
  <text x="64" y="141" font-size="7.5" fill="#8aa0b8" text-anchor="end">75</text>
  <text x="64" y="57"  font-size="7.5" fill="#8aa0b8" text-anchor="end">100</text>
  <text x="26" y="222" font-size="8" fill="#4a6080" text-anchor="middle" transform="rotate(-90,26,222)" letter-spacing="0.5">CPU Utilization (%)</text>

  <!-- Crosshair "sweet spot" at x=300($430→x=302), y=60%util(y=54+40*3.36=54+134=188) -->
  <!-- Actually target: x=300 cost=$426→x=70+426*0.54=70+230=300; y=60%→y=390-60*3.36=390-202=188 -->
  <line x1="300" y1="54" x2="300" y2="390" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="70" y1="188" x2="610" y2="188" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <circle cx="300" cy="188" r="10" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="188" r="3" fill="#2563eb" opacity="0.3"/>

  <!-- ── SCATTER BUBBLES ── -->
  <!-- Format: cx=70+(cost*0.54), cy=390-(util*3.36) -->
  <!-- Colors: EC2=#2563eb, RDS=#8b5cf6, Lambda=#10b981, ElastiCache=#f59e0b -->
  <!-- Sizes: small r=5 (2GB), med r=8 (8GB), large r=12 (32GB) -->

  <!-- OPTIMIZED quadrant (top-right: high util, high cost) -->
  <circle cx="380" cy="104" r="8" fill="#2563eb" opacity="0.75"/>
  <circle cx="440" cy="88" r="12" fill="#2563eb" opacity="0.75"/>
  <circle cx="510" cy="118" r="8" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="560" cy="96" r="5" fill="#10b981" opacity="0.75"/>
  <circle cx="480" cy="142" r="5" fill="#2563eb" opacity="0.75"/>
  <circle cx="590" cy="132" r="10" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="420" cy="162" r="6" fill="#10b981" opacity="0.75"/>

  <!-- UNDERUTILIZED quadrant (top-left: high util, low cost) -->
  <circle cx="100" cy="90" r="7" fill="#f59e0b" opacity="0.75"/>
  <circle cx="160" cy="106" r="5" fill="#2563eb" opacity="0.75"/>
  <circle cx="200" cy="78" r="9" fill="#8b5cf6" opacity="0.75"/>
  <circle cx="130" cy="140" r="5" fill="#10b981" opacity="0.75"/>
  <circle cx="240" cy="122" r="6" fill="#f59e0b" opacity="0.75"/>
  <circle cx="280" cy="100" r="8" fill="#2563eb" opacity="0.75"/>

  <!-- TERMINATE quadrant (bottom-left: low util, low cost) -->
  <circle cx="88" cy="300" r="5" fill="#10b981" opacity="0.65"/>
  <circle cx="130" cy="328" r="5" fill="#f59e0b" opacity="0.65"/>
  <circle cx="170" cy="350" r="4" fill="#10b981" opacity="0.65"/>
  <circle cx="100" cy="370" r="5" fill="#2563eb" opacity="0.65"/>
  <circle cx="200" cy="340" r="6" fill="#8b5cf6" opacity="0.65"/>
  <circle cx="230" cy="370" r="4" fill="#f59e0b" opacity="0.65"/>

  <!-- OVERPROVISIONED quadrant (bottom-right: low util, high cost) — highlighted with red ring -->
  <circle cx="400" cy="340" r="12" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="400" cy="340" r="9" fill="#2563eb" opacity="0.7"/>

  <circle cx="460" cy="310" r="15" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="460" cy="310" r="12" fill="#2563eb" opacity="0.7"/>

  <circle cx="530" cy="356" r="8" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="530" cy="356" r="5" fill="#8b5cf6" opacity="0.7"/>

  <circle cx="570" cy="300" r="11" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="570" cy="300" r="8" fill="#2563eb" opacity="0.7"/>

  <circle cx="490" cy="368" r="7" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="490" cy="368" r="4" fill="#8b5cf6" opacity="0.7"/>

  <circle cx="600" cy="330" r="10" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="600" cy="330" r="7" fill="#2563eb" opacity="0.7"/>

  <!-- Legend box -->
  <rect x="74" y="422" width="220" height="14" rx="3" fill="white" filter="url(#rs1)"/>
  <circle cx="86" cy="429" r="5" fill="#2563eb" opacity="0.8"/>
  <text x="95" y="433" font-size="7" fill="#4a6080">EC2</text>
  <circle cx="124" cy="429" r="5" fill="#8b5cf6" opacity="0.8"/>
  <text x="133" y="433" font-size="7" fill="#4a6080">RDS</text>
  <circle cx="160" cy="429" r="5" fill="#10b981" opacity="0.8"/>
  <text x="169" y="433" font-size="7" fill="#4a6080">Lambda</text>
  <circle cx="212" cy="429" r="5" fill="#f59e0b" opacity="0.8"/>
  <text x="221" y="433" font-size="7" fill="#4a6080">ElastiCache</text>
  <text x="300" y="433" font-size="7" fill="#8aa0b8">bubble size = memory</text>

