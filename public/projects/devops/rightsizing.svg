  <rect x="640" y="140" width="3" height="56" rx="2" fill="#10b981"/>
  <text x="652" y="154" font-size="7.5" fill="#1a2535" font-weight="700">Terminate idle r5.xlarge ×3</text>
  <text x="652" y="167" font-size="7" fill="#8aa0b8">staging cluster · us-west-2</text>
  <text x="652" y="180" font-size="7" fill="#4a6080">4 vCPU  32GB  avg util 3%</text>
  <text x="652" y="191" font-size="8" fill="#10b981" font-weight="700">$1,260/mo</text>
  <rect x="820" y="186" width="52" height="12" rx="4" fill="#bbf7d0"/>
  <text x="846" y="195" font-size="6.5" fill="#166534" text-anchor="middle" font-weight="700">Merged</text>

  <!-- PR Card 3 -->
