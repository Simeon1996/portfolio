  <rect x="640" y="204" width="3" height="56" rx="2" fill="#10b981"/>
  <text x="652" y="218" font-size="7.5" fill="#1a2535" font-weight="700">RDS db.r6g.4xlarge → 2xlarge</text>
  <text x="652" y="231" font-size="7" fill="#8aa0b8">analytics-db · eu-west-1</text>
  <text x="652" y="244" font-size="7" fill="#4a6080">16 vCPU→8  RAM 128→64GB</text>
  <text x="652" y="255" font-size="8" fill="#10b981" font-weight="700">$2,100/mo</text>
  <rect x="822" y="250" width="46" height="12" rx="4" fill="#dcfce7"/>
  <text x="845" y="259" font-size="6.5" fill="#10b981" text-anchor="middle" font-weight="700">Open</text>

  <!-- PR Card 4 -->
  <rect x="640" y="268" width="236" height="56" rx="4" fill="#f7f9fc" filter="url(#rs1)"/>
  <rect x="640" y="268" width="3" height="56" rx="2" fill="#f59e0b"/>
  <text x="652" y="282" font-size="7.5" fill="#1a2535" font-weight="700">ElastiCache r6g.large → medium</text>
  <text x="652" y="295" font-size="7" fill="#8aa0b8">cache-cluster-05 · us-east-1</text>
  <text x="652" y="308" font-size="7" fill="#4a6080">2 vCPU→1  RAM 6.4→3.2GB</text>
  <text x="652" y="319" font-size="8" fill="#f59e0b" font-weight="700">$380/mo</text>
  <rect x="822" y="314" width="46" height="12" rx="4" fill="#dcfce7"/>
  <text x="845" y="323" font-size="6.5" fill="#10b981" text-anchor="middle" font-weight="700">Open</text>

  <!-- PR Card 5 -->
  <rect x="640" y="332" width="236" height="56" rx="4" fill="#f7f9fc" filter="url(#rs1)"/>
  <rect x="640" y="332" width="3" height="56" rx="2" fill="#10b981"/>
  <text x="652" y="346" font-size="7.5" fill="#1a2535" font-weight="700">Lambda 3008MB → 512MB ×18</text>
  <text x="652" y="359" font-size="7" fill="#8aa0b8">event-processors · multi-region</text>
  <text x="652" y="372" font-size="7" fill="#4a6080">mem 3008→512  p99 lat ok</text>
  <text x="652" y="383" font-size="8" fill="#10b981" font-weight="700">$640/mo</text>
  <rect x="822" y="378" width="46" height="12" rx="4" fill="#dcfce7"/>
  <text x="845" y="387" font-size="6.5" fill="#10b981" text-anchor="middle" font-weight="700">Open</text>

  <!-- Total savings callout -->
  <rect x="632" y="436" width="252" height="0" rx="4" fill="none"/>
  <line x1="640" y1="435" x2="876" y2="435" stroke="#e4eaf3" stroke-width="1"/>
  <text x="648" y="450" font-size="8" fill="#4a6080">Total estimated savings</text>
  <text x="870" y="450" font-size="14" fill="#10b981" font-weight="700" text-anchor="end">$38,200/mo</text>

  <!-- ── BOTTOM METRIC CHIPS ── -->
  <rect x="0" y="460" width="900" height="40" fill="#eef2f8"/>
  <rect x="0" y="460" width="900" height="1" fill="#e4eaf3"/>

  <rect x="18" y="469" width="182" height="22" rx="11" fill="white" filter="url(#rs1)"/>
  <circle cx="34" cy="480" r="4" fill="#2563eb"/>
  <text x="44" y="484" font-size="9" fill="#1a2535" font-weight="600">Analyzed</text>
  <text x="116" y="484" font-size="9" fill="#2563eb" font-weight="700">284 resources</text>

  <rect x="212" y="469" width="174" height="22" rx="11" fill="white" filter="url(#rs1)"/>
  <circle cx="228" cy="480" r="4" fill="#f59e0b"/>
  <text x="238" y="484" font-size="9" fill="#1a2535" font-weight="600">Recommendations</text>
  <text x="362" y="484" font-size="9" fill="#f59e0b" font-weight="700">47</text>

  <rect x="398" y="469" width="136" height="22" rx="11" fill="white" filter="url(#rs1)"/>
  <circle cx="414" cy="480" r="4" fill="#10b981"/>
  <text x="424" y="484" font-size="9" fill="#1a2535" font-weight="600">PRs Open</text>
  <text x="494" y="484" font-size="9" fill="#10b981" font-weight="700">12</text>

  <rect x="546" y="469" width="184" height="22" rx="11" fill="white" filter="url(#rs1)"/>
  <circle cx="562" cy="480" r="4" fill="#8b5cf6"/>
  <text x="572" y="484" font-size="9" fill="#1a2535" font-weight="600">Avg Utilization</text>
  <text x="682" y="484" font-size="9" fill="#8b5cf6" font-weight="700">34%</text>
</svg>
