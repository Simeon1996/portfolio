  <text x="1016" y="622" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">💡 Tip</text>
  <text x="1016" y="642" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#64748b">For best accuracy, provide at least 200 words.</text>
  <text x="1016" y="660" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#64748b">Short paragraphs may return lower confidence scores</text>
  <text x="1016" y="678" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#64748b">due to limited signal for the detection model.</text>
