  <text x="942" y="160" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#374151" text-anchor="end">1,247 / 10,000 words</text>

  <!-- Simulated text content (lines of placeholder text) -->
  <g font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13.5" fill="#94a3b8">
    <text x="272" y="188">In recent years, the rapid advancement of artificial intelligence has transformed</text>
    <text x="272" y="208">numerous industries, from healthcare and finance to education and creative arts.</text>
    <text x="272" y="228">Machine learning models, particularly large language models, have demonstrated</text>
    <text x="272" y="248">remarkable capabilities in generating coherent and contextually appropriate text,</text>
    <text x="272" y="268">raising both opportunities and concerns about the authenticity of digital content.</text>
    <text x="272" y="296">The ability to distinguish between human-written and AI-generated text has become</text>
    <text x="272" y="316">increasingly important for educators seeking to maintain academic integrity, as well</text>
    <text x="272" y="336">as for publishers and content platforms striving to deliver genuine human perspectives.</text>
    <text x="272" y="356">Various detection approaches have been proposed, ranging from statistical analysis</text>
    <text x="272" y="376">of token probabilities to more sophisticated ensemble methods that examine writing</text>
    <text x="272" y="396">style, sentence structure, and semantic coherence across multiple dimensions.</text>
    <text x="272" y="424">These tools, however, face the ongoing challenge of keeping pace with rapidly</text>
    <text x="272" y="444">evolving generative models that continuously improve in mimicking human writing</text>
    <text x="272" y="464">patterns, making the detection task a dynamic and technically demanding problem</text>
    <text x="272" y="484">that requires constant adaptation and retraining of detection systems.</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="272" y="500" width="2" height="16" fill="#6366f1" opacity="0.9"/>

