    <line x1="0" y1="420" x2="1440" y2="420" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="480" x2="1440" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="540" x2="1440" y2="540" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="600" x2="1440" y2="600" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="660" x2="1440" y2="660" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="720" x2="1440" y2="720" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="780" x2="1440" y2="780" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="840" x2="1440" y2="840" stroke="#6366f1" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="1260" y1="0" x2="1260" y2="900" stroke="#6366f1" stroke-width="1"/>
    <line x1="1380" y1="0" x2="1380" y2="900" stroke="#6366f1" stroke-width="1"/>
