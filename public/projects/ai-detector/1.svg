  <text x="720" y="126" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">v2.0 — Now with GPT-4o detection</text>

  <!-- Hero headline -->
  <text x="720" y="210" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle">Detect AI-Generated</text>
  <text x="720" y="275" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="800" fill="url(#accentGrad)" text-anchor="middle">Text in Seconds</text>

