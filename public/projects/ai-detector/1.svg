  <text x="615" y="492" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#f59e0b">★★★★★</text>
  <text x="720" y="492" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#475569" text-anchor="middle">4.9 / 5 average rating</text>

  <!-- Feature cards row -->
  <rect x="80" y="540" width="380" height="130" rx="12" fill="url(#cardGrad)" stroke="#1e2235" stroke-width="1"/>
  <!-- Card 1 icon -->
  <rect x="104" y="564" width="36" height="36" rx="8" fill="#6366f1" fill-opacity="0.15"/>
  <text x="122" y="588" font-family="monospace" font-size="18" fill="#6366f1" text-anchor="middle">⚡</text>
  <text x="160" y="578" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="white">Sub-second Analysis</text>
  <text x="104" y="610" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">Processes up to 10,000 words in</text>
  <text x="104" y="628" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">under 800ms with 97.4% accuracy.</text>
  <text x="104" y="654" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#6366f1">Learn more →</text>

  <rect x="530" y="540" width="380" height="130" rx="12" fill="url(#cardGrad)" stroke="#1e2235" stroke-width="1"/>
  <rect x="554" y="564" width="36" height="36" rx="8" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="572" y="588" font-family="monospace" font-size="18" fill="#8b5cf6" text-anchor="middle">🔍</text>
  <text x="610" y="578" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="white">Sentence-Level Highlights</text>
  <text x="554" y="610" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">Visual heatmap pinpoints exactly</text>
  <text x="554" y="628" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">which sentences are AI-generated.</text>
  <text x="554" y="654" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8b5cf6">Learn more →</text>

  <rect x="980" y="540" width="380" height="130" rx="12" fill="url(#cardGrad)" stroke="#1e2235" stroke-width="1"/>
  <rect x="1004" y="564" width="36" height="36" rx="8" fill="#06b6d4" fill-opacity="0.15"/>
  <text x="1022" y="588" font-family="monospace" font-size="18" fill="#06b6d4" text-anchor="middle">🔗</text>
  <text x="1060" y="578" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="white">REST API + Webhooks</text>
  <text x="1004" y="610" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">Integrate into any platform with</text>
  <text x="1004" y="628" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#64748b">a single API key. SDKs available.</text>
  <text x="1004" y="654" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#06b6d4">Learn more →</text>

  <!-- Bottom stats bar -->
  <rect x="0" y="790" width="1440" height="110" fill="#0d0f1a"/>
  <line x1="0" y1="790" x2="1440" y2="790" stroke="#1e2235" stroke-width="1"/>

  <text x="240" y="838" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">97.4%</text>
  <text x="240" y="862" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Detection Accuracy</text>

  <line x1="480" y1="810" x2="480" y2="870" stroke="#1e2235" stroke-width="1"/>
  <text x="600" y="838" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">8</text>
  <text x="600" y="862" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#475569" text-anchor="middle">AI Models Supported</text>

  <line x1="760" y1="810" x2="760" y2="870" stroke="#1e2235" stroke-width="1"/>
  <text x="900" y="838" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">2.4B+</text>
  <text x="900" y="862" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Sentences Analyzed</text>

  <line x1="1060" y1="810" x2="1060" y2="870" stroke="#1e2235" stroke-width="1"/>
  <text x="1200" y="838" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">&#60;800ms</text>
  <text x="1200" y="862" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Avg. Response Time</text>
</svg>
