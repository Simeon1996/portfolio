  <text x="54" y="37" font-family="monospace" font-size="14" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="80" y="37" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="700" fill="white">DetectAI</text>

  <!-- Nav links -->
  <text x="220" y="37" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94a3b8">Features</text>
  <text x="310" y="37" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94a3b8">API</text>
  <text x="370" y="37" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94a3b8">Pricing</text>
  <text x="440" y="37" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" fill="#94a3b8">Docs</text>

