  <text x="720" y="330" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">Instantly identify content generated by ChatGPT, Claude, Gemini, and more.</text>
  <text x="720" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">Built for educators, publishers, and content teams.</text>

