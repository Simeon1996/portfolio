  <!-- Navbar -->
  <rect x="0" y="0" width="1440" height="64" fill="#0d0f1a" opacity="0.95"/>
  <line x1="0" y1="64" x2="1440" y2="64" stroke="#1e2235" stroke-width="1"/>

  <!-- Logo -->
