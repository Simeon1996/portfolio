<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="lccs-title lccs-desc">
  <title id="lccs-title">LangChain Component Map</title>
  <desc id="lccs-desc">Six component cards covering prompts llms output parsers memory retrievers and agents with LCEL pipe banner.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 20px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .tagText { font: 700 11px 'Space Mono', monospace; fill: #7df5f2; letter-spacing: 1.4px; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .lcel { font: 700 22px 'Space Mono', monospace; fill: #e9f6ff; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">LangChain Component Map</text>
  <text class="sub" x="80" y="118">Six components, one pipe operator · LCEL composes them into chains</text>

  <rect x="80" y="150" width="1240" height="60" rx="14" fill="rgba(14, 34, 48, 0.88)" stroke="rgba(126, 230, 240, 0.7)" stroke-width="1.4" filter="url(#glow)"/>
  <text class="lcel" x="700" y="190" text-anchor="middle">prompt | llm | output_parser</text>

  <rect class="card" x="80" y="260" width="400" height="220"/>
  <rect x="100" y="278" width="90" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="108" y="294" class="tagText">I/O</text>
  <text class="stepTitle" x="100" y="340">Prompts</text>
  <text class="stepText" x="100" y="370">· ChatPromptTemplate for roles</text>
  <text class="stepText" x="100" y="392">· PromptTemplate with variables</text>
  <text class="stepText" x="100" y="414">· Few-shot helpers, partial fills</text>
  <text class="stepText" x="100" y="444">Inputs go in, formatted messages come out</text>

  <rect class="card" x="500" y="260" width="400" height="220"/>
  <rect x="520" y="278" width="90" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="528" y="294" class="tagText">MODEL</text>
  <text class="stepTitle" x="520" y="340">LLMs</text>
  <text class="stepText" x="520" y="370">· ChatOpenAI, ChatAnthropic, etc.</text>
  <text class="stepText" x="520" y="392">· Streaming, structured output, tools</text>
  <text class="stepText" x="520" y="414">· Provider-agnostic interface</text>
  <text class="stepText" x="520" y="444">Runnable that takes messages, returns AIMessage</text>

  <rect class="card" x="920" y="260" width="400" height="220"/>
  <rect x="940" y="278" width="120" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="948" y="294" class="tagText">I/O</text>
  <text class="stepTitle" x="940" y="340">Output Parsers</text>
  <text class="stepText" x="940" y="370">· StrOutputParser, JsonOutputParser</text>
  <text class="stepText" x="940" y="392">· PydanticOutputParser for typed data</text>
  <text class="stepText" x="940" y="414">· Retries on malformed output</text>
  <text class="stepText" x="940" y="444">Turns raw model output into usable types</text>

  <rect class="card" x="80" y="520" width="400" height="220"/>
  <rect x="100" y="538" width="110" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="108" y="554" class="tagText">STATE</text>
  <text class="stepTitle" x="100" y="600">Memory</text>
  <text class="stepText" x="100" y="630">· ConversationBufferMemory</text>
  <text class="stepText" x="100" y="652">· Summary + windowed variants</text>
  <text class="stepText" x="100" y="674">· Pluggable backends (Redis, SQL)</text>
  <text class="stepText" x="100" y="704">Threads context across calls in a session</text>

  <rect class="card" x="500" y="520" width="400" height="220"/>
  <rect x="520" y="538" width="140" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="528" y="554" class="tagText">CONTEXT</text>
  <text class="stepTitle" x="520" y="600">Retrievers</text>
  <text class="stepText" x="520" y="630">· Vector stores: Chroma, FAISS, PGVector</text>
  <text class="stepText" x="520" y="652">· BM25, hybrid, multi-query</text>
  <text class="stepText" x="520" y="674">· Rerankers for precision</text>
  <text class="stepText" x="520" y="704">Fetches relevant context for RAG chains</text>

  <rect class="card" x="920" y="520" width="400" height="220"/>
  <rect x="940" y="538" width="110" height="22" rx="11" fill="rgba(126,230,240,0.18)" stroke="rgba(126,230,240,0.5)"/>
  <text x="948" y="554" class="tagText">EXEC</text>
  <text class="stepTitle" x="940" y="600">Agents</text>
  <text class="stepText" x="940" y="630">· Tool-calling loop with planner</text>
  <text class="stepText" x="940" y="652">· ReAct, OpenAI tools, LangGraph</text>
  <text class="stepText" x="940" y="674">· Custom tools via @tool decorator</text>
  <text class="stepText" x="940" y="704">Wraps LLM + tools + control flow</text>

  <g fill="none" stroke-width="2" stroke-dasharray="6 6" stroke="rgba(126, 230, 240, 0.5)">
    <path d="M480 370 H500"/>
    <path d="M900 370 H920"/>
  </g>
  <g fill="none" stroke-width="2" stroke-dasharray="6 6" stroke="rgba(178, 146, 240, 0.55)">
    <path d="M480 630 H500"/>
    <path d="M900 630 H920"/>
  </g>

  <text class="sub" x="80" y="790">Think in Runnables · every component is a small unit that composes with | into a chain.</text>
</svg>
