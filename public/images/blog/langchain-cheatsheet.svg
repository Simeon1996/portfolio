<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="lccs-title lccs-desc">
  <title id="lccs-title">LangChain Cheatsheet</title>
  <desc id="lccs-desc">LangChain component map — prompts, LLMs, LCEL chains, memory, retrievers, and agents.</desc>
  <defs>
    <linearGradient id="lccs-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="lccs-cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="lccs-pink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <filter id="lccs-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lccs-title { font: 700 34px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .lccs-sub   { font: 500 14px 'Space Mono', monospace; fill: #9bc0d8; }
      .lccs-node  { font: 700 16px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .lccs-small { font: 500 11px 'Space Mono', monospace; fill: #7ab0cc; }
      .lccs-tag   { font: 600 11px 'Space Mono', monospace; letter-spacing: 1.5px; }
      .lccs-pipe  { font: 700 20px 'Space Mono', monospace; fill: #7df5f2; }
    </style>
  </defs>
  <rect width="1200" height="640" fill="url(#lccs-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/><line x1="1000" y1="0" x2="1000" y2="640"/>
  </g>

  <text class="lccs-title" x="50" y="62">LangChain Component Map</text>
  <text class="lccs-sub" x="50" y="90">Six building blocks — compose with LCEL pipe operator</text>

  <!-- LCEL chain visualization (top) -->
  <text class="lccs-tag" x="600" y="140" text-anchor="middle" fill="#4ecbff">LCEL CHAIN — prompt | llm | output_parser</text>

  <!-- Component 1: Prompts -->
  <rect x="50" y="175" width="190" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.5)" stroke-width="1.5"/>
  <text class="lccs-tag" x="145" y="200" text-anchor="middle" fill="#4ecbff">PROMPTS</text>
  <text class="lccs-node" x="145" y="228" text-anchor="middle">PromptTemplate</text>
  <text class="lccs-small" x="145" y="252" text-anchor="middle">ChatPromptTemplate</text>
  <text class="lccs-small" x="145" y="272" text-anchor="middle">FewShotPrompt</text>
  <text class="lccs-small" x="145" y="292" text-anchor="middle">MessagesPlaceholder</text>

  <!-- Pipe -->
  <text class="lccs-pipe" x="248" y="248" text-anchor="middle">|</text>

  <!-- Component 2: LLMs -->
  <rect x="260" y="175" width="190" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.5)" stroke-width="1.5"/>
  <text class="lccs-tag" x="355" y="200" text-anchor="middle" fill="#4ecbff">LLMs</text>
  <text class="lccs-node" x="355" y="228" text-anchor="middle">ChatOpenAI</text>
  <text class="lccs-small" x="355" y="252" text-anchor="middle">ChatAnthropic</text>
  <text class="lccs-small" x="355" y="272" text-anchor="middle">ChatOllama</text>
  <text class="lccs-small" x="355" y="292" text-anchor="middle">streaming / async</text>

  <!-- Pipe -->
  <text class="lccs-pipe" x="458" y="248" text-anchor="middle">|</text>

  <!-- Component 3: Output Parsers -->
  <rect x="470" y="175" width="200" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.5)" stroke-width="1.5"/>
  <text class="lccs-tag" x="570" y="200" text-anchor="middle" fill="#4ecbff">OUTPUT PARSERS</text>
  <text class="lccs-node" x="570" y="228" text-anchor="middle">StrOutputParser</text>
  <text class="lccs-small" x="570" y="252" text-anchor="middle">JsonOutputParser</text>
  <text class="lccs-small" x="570" y="272" text-anchor="middle">PydanticOutputParser</text>
  <text class="lccs-small" x="570" y="292" text-anchor="middle">structured output</text>

  <!-- Component 4: Memory -->
  <rect x="700" y="175" width="190" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="lccs-tag" x="795" y="200" text-anchor="middle" fill="#ff9ec0">MEMORY</text>
  <text class="lccs-node" x="795" y="228" text-anchor="middle" fill="#ffaac8">ConversationBuffer</text>
  <text class="lccs-small" x="795" y="252" text-anchor="middle">SummaryMemory</text>
  <text class="lccs-small" x="795" y="272" text-anchor="middle">VectorStoreMemory</text>
  <text class="lccs-small" x="795" y="292" text-anchor="middle">Windows + Tokens</text>

  <!-- Component 5: Retrievers -->
  <rect x="910" y="175" width="240" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="lccs-tag" x="1030" y="200" text-anchor="middle" fill="#ff9ec0">RETRIEVERS</text>
  <text class="lccs-node" x="1030" y="228" text-anchor="middle" fill="#ffaac8">VectorStore</text>
  <text class="lccs-small" x="1030" y="252" text-anchor="middle">MultiQueryRetriever</text>
  <text class="lccs-small" x="1030" y="272" text-anchor="middle">ContextualCompression</text>
  <text class="lccs-small" x="1030" y="292" text-anchor="middle">Parent Document</text>

  <!-- Bottom row: Agents -->
  <rect x="50" y="370" width="380" height="150" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(125,245,242,0.5)" stroke-width="2" filter="url(#lccs-glow)"/>
  <text class="lccs-tag" x="240" y="398" text-anchor="middle" fill="#7df5f2">AGENTS</text>
  <text class="lccs-node" x="240" y="428" text-anchor="middle" fill="#7df5f2">AgentExecutor</text>
  <text class="lccs-small" x="240" y="453" text-anchor="middle">Tool calling loop</text>
  <text class="lccs-small" x="240" y="473" text-anchor="middle">OpenAI Functions / ReAct / ToolAgent</text>
  <text class="lccs-small" x="240" y="493" text-anchor="middle">stop_sequence + max_iterations</text>

  <!-- Tools component -->
  <rect x="470" y="370" width="300" height="150" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.45)" stroke-width="1.5"/>
  <text class="lccs-tag" x="620" y="398" text-anchor="middle" fill="#4ecbff">TOOLS</text>
  <text class="lccs-node" x="620" y="428" text-anchor="middle">@tool decorator</text>
  <text class="lccs-small" x="620" y="453" text-anchor="middle">DuckDuckGoSearch</text>
  <text class="lccs-small" x="620" y="473" text-anchor="middle">PythonREPLTool</text>
  <text class="lccs-small" x="620" y="493" text-anchor="middle">custom functions → StructuredTool</text>

  <!-- Chains / Runnables -->
  <rect x="800" y="370" width="350" height="150" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.45)" stroke-width="1.5"/>
  <text class="lccs-tag" x="975" y="398" text-anchor="middle" fill="#4ecbff">LCEL RUNNABLES</text>
  <text class="lccs-node" x="975" y="428" text-anchor="middle">RunnablePassthrough</text>
  <text class="lccs-small" x="975" y="453" text-anchor="middle">RunnableParallel — fan-out</text>
  <text class="lccs-small" x="975" y="473" text-anchor="middle">RunnableLambda — any function</text>
  <text class="lccs-small" x="975" y="493" text-anchor="middle">chain.batch() / chain.stream()</text>

  <text class="lccs-sub" x="50" y="580">All LCEL runnables share the same .invoke() / .stream() / .batch() interface.</text>
  <text class="lccs-sub" x="50" y="602">Compose with | — prompt | llm | parser is a valid chain.</text>
</svg>
