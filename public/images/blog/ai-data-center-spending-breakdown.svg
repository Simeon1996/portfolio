<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="dcs-title dcs-desc">
  <title id="dcs-title">Where the $650 Billion in 2026 Data Center Spend Actually Goes</title>
  <desc id="dcs-desc">A segmented bar totaling 2026 global data center spend of over $650 billion, split into four categories: GPU and accelerator hardware at roughly 42 percent, power and cooling infrastructure at roughly 27 percent, networking and interconnect at roughly 16 percent, and real estate and construction at roughly 15 percent. Below the bar, four cards expand on what each category actually pays for, with GPU and accelerator hardware highlighted as the single largest line item.</desc>
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="820">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="55%" stop-color="#111f33"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="pinkLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <linearGradient id="okLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="goldLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#ffcf5c"/>
      <stop offset="100%" stop-color="#ffe9a8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 16px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 12.5px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 11px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .badText { font: 700 11px 'Space Mono', monospace; fill: #ff9db9; letter-spacing: 1.4px; }
      .badge { font: 700 19px 'Space Grotesk', sans-serif; }
      .tagline { font: 600 13px 'Space Mono', monospace; fill: #cfe8f7; }
      .bigPct { font: 700 34px 'Space Grotesk', sans-serif; fill: #ffffff; }
      .pctUnit { font: 500 10.5px 'Space Mono', monospace; fill: #8fb3cc; letter-spacing: 1px; }
      .barLabel { font: 700 10px 'Space Mono', monospace; fill: #8fb3cc; letter-spacing: 1.5px; }
      .segLabel { font: 700 15px 'Space Grotesk', sans-serif; fill: #0a1625; text-anchor: middle; }
      .segPct { font: 700 13px 'Space Mono', monospace; fill: #0a1625; text-anchor: middle; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardHot { fill: rgba(43, 19, 42, 0.42); stroke: rgba(255, 119, 177, 0.42); stroke-width: 1.2; rx: 14; }
      .cardOk { fill: rgba(14, 34, 48, 0.9); stroke: rgba(126, 230, 240, 0.85); stroke-width: 1.6; rx: 14; }
      .cardGold { fill: rgba(43, 34, 14, 0.42); stroke: rgba(255, 207, 92, 0.42); stroke-width: 1.2; rx: 14; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400 M0 300 H1400 M0 440 H1400 M0 580 H1400 M0 700 H1400"/>
    <path d="M200 0 V820 M500 0 V820 M800 0 V820 M1100 0 V820"/>
  </g>

  <text class="title" x="76" y="80">Where the $650B Actually Goes</text>
  <text class="sub" x="76" y="112">2026 global data center spend, +31.7% year over year — four cost centers behind the number</text>

  <text class="barLabel" x="90" y="140">TOTAL 2026 DATA CENTER SPEND · $650B+</text>

  <g>
    <rect x="90" y="150" width="512" height="44" fill="url(#cyanLine)"/>
    <rect x="602" y="150" width="329" height="44" fill="url(#pinkLine)"/>
    <rect x="931" y="150" width="195" height="44" fill="url(#okLine)"/>
    <rect x="1126" y="150" width="184" height="44" fill="url(#goldLine)"/>
    <g fill="none" stroke="#0a1625" stroke-width="2">
      <path d="M602 150 V194"/>
      <path d="M931 150 V194"/>
      <path d="M1126 150 V194"/>
    </g>
    <text class="segLabel" x="346" y="171">GPU / ACCELERATORS</text>
    <text class="segPct" x="346" y="188">~42%</text>
    <text class="segLabel" x="766" y="171">POWER &amp; COOLING</text>
    <text class="segPct" x="766" y="188">~27%</text>
    <text class="segLabel" x="1028" y="171" style="font-size:13px;">NETWORK</text>
    <text class="segPct" x="1028" y="188">~16%</text>
    <text class="segLabel" x="1218" y="171" style="font-size:13px;">REAL ESTATE</text>
    <text class="segPct" x="1218" y="188">~15%</text>
  </g>

  <rect class="cardOk" x="90" y="210" width="280" height="430" filter="url(#glow)"/>
  <text class="badge" x="118" y="265" fill="#8ceeff">GPU / ACCELERATORS</text>
  <text class="tagline" x="118" y="295">The compute itself</text>
  <text class="bigPct" x="118" y="360">~42%</text>
  <text class="pctUnit" x="118" y="382">OF 2026 SPEND</text>
  <text class="stepText" x="118" y="425">Nvidia, AMD, and custom</text>
  <text class="stepText" x="118" y="447">silicon for training and</text>
  <text class="stepText" x="118" y="469">serving — the single</text>
  <text class="stepText" x="118" y="491">biggest line item, by far</text>
  <rect x="118" y="560" width="220" height="14" rx="4" fill="url(#cyanLine)"/>
  <text class="barLabel" x="118" y="592">LARGEST SHARE</text>

  <rect class="cardHot" x="402" y="210" width="280" height="430"/>
  <text class="badge" x="430" y="265" fill="#ff9db9">POWER &amp; COOLING</text>
  <text class="tagline" x="430" y="295">Feeding and cooling racks</text>
  <text class="bigPct" x="430" y="360">~27%</text>
  <text class="pctUnit" x="430" y="382">OF 2026 SPEND</text>
  <text class="stepText" x="430" y="425">AI racks draw multiples</text>
  <text class="stepText" x="430" y="447">of legacy server power —</text>
  <text class="stepText" x="430" y="469">new contracts, sometimes</text>
  <text class="stepText" x="430" y="491">new generation, liquid cooling</text>
  <rect x="430" y="560" width="141" height="14" rx="4" fill="url(#pinkLine)"/>
  <text class="barLabel" x="430" y="592">GROWING FASTEST</text>

  <rect class="card" x="714" y="210" width="280" height="430"/>
  <text class="badge" x="742" y="265" fill="#8effc0">NETWORKING</text>
  <text class="tagline" x="742" y="295">Moving data at scale</text>
  <text class="bigPct" x="742" y="360">~16%</text>
  <text class="pctUnit" x="742" y="382">OF 2026 SPEND</text>
  <text class="stepText" x="742" y="425">High-bandwidth fabric</text>
  <text class="stepText" x="742" y="447">between accelerators, and</text>
  <text class="stepText" x="742" y="469">links between data center</text>
  <text class="stepText" x="742" y="491">sites and regions</text>
  <rect x="742" y="560" width="84" height="14" rx="4" fill="url(#okLine)"/>
  <text class="barLabel" x="742" y="592">INTERCONNECT</text>

  <rect class="cardGold" x="1026" y="210" width="280" height="430"/>
  <text class="badge" x="1054" y="265" fill="#ffd479">REAL ESTATE</text>
  <text class="tagline" x="1054" y="295">The physical buildout</text>
  <text class="bigPct" x="1054" y="360">~15%</text>
  <text class="pctUnit" x="1054" y="382">OF 2026 SPEND</text>
  <text class="stepText" x="1054" y="425">Land, shells, permits —</text>
  <text class="stepText" x="1054" y="447">years of lead time per</text>
  <text class="stepText" x="1054" y="469">facility, now happening</text>
  <text class="stepText" x="1054" y="491">at unprecedented pace</text>
  <rect x="1054" y="560" width="79" height="14" rx="4" fill="url(#goldLine)"/>
  <text class="barLabel" x="1054" y="592">MULTI-YEAR LEAD TIME</text>

  <text class="sub" x="76" y="770">Illustrative split based on typical hyperscaler capex structure — compute and power dominate the bill.</text>
</svg>
