<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-labelledby="gpt5-title gpt5-desc">
  <title id="gpt5-title">7B vs GPT-5 Cost-Accuracy Matrix</title>
  <desc id="gpt5-desc">2x2 grid with axes Task Specificity (narrow to broad) and Model Size (small to large). Bottom-left is sweet spot for 7B fine-tuned.</desc>
  <defs>
    <linearGradient id="gpt5-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <style>
      .g5-title  { font: 700 30px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .g5-sub    { font: 500 13px 'Space Mono', monospace; fill: #9bc0d8; }
      .g5-axis   { font: 600 14px 'Space Grotesk', sans-serif; fill: #7ab0cc; }
      .g5-tick   { font: 500 12px 'Space Mono', monospace; fill: #5a90b0; }
      .g5-quad   { font: 700 16px 'Space Grotesk', sans-serif; }
      .g5-qdesc  { font: 500 12px 'Space Mono', monospace; fill: #7ab0cc; }
    </style>
  </defs>
  <rect width="800" height="720" fill="url(#gpt5-bg)"/>

  <text class="g5-title" x="50" y="58">7B Fine-Tuned vs GPT-5: When to Use What</text>
  <text class="g5-sub" x="50" y="86">Task specificity × model size — find your quadrant</text>

  <!-- Grid origin at (130, 130) size 540x480 -->
  <!-- Quadrant backgrounds -->
  <!-- Bottom-left: SWEET SPOT -->
  <rect x="130" y="370" width="270" height="240" rx="0" fill="rgba(20,70,30,0.35)" stroke="none"/>
  <!-- Bottom-right: OVERKILL -->
  <rect x="400" y="370" width="270" height="240" rx="0" fill="rgba(40,40,14,0.35)" stroke="none"/>
  <!-- Top-left: UNDERPOWERED -->
  <rect x="130" y="130" width="270" height="240" rx="0" fill="rgba(50,20,20,0.35)" stroke="none"/>
  <!-- Top-right: GPT-5 TERRITORY -->
  <rect x="400" y="130" width="270" height="240" rx="0" fill="rgba(20,30,70,0.35)" stroke="none"/>

  <!-- Grid lines -->
  <rect x="130" y="130" width="540" height="480" fill="none" stroke="rgba(78,203,255,0.3)" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="400" y2="610" stroke="rgba(78,203,255,0.3)" stroke-width="1.5"/>
  <line x1="130" y1="370" x2="670" y2="370" stroke="rgba(78,203,255,0.3)" stroke-width="1.5"/>

  <!-- Axis labels -->
  <!-- X axis: Task Specificity -->
  <text class="g5-axis" x="400" y="650" text-anchor="middle">Task Specificity</text>
  <text class="g5-tick" x="200" y="670" text-anchor="middle">narrow</text>
  <text class="g5-tick" x="600" y="670" text-anchor="middle">broad</text>
  <!-- Y axis: Model Size -->
  <text class="g5-axis" x="60" y="375" text-anchor="middle" transform="rotate(-90 60 375)">Model Size</text>
  <text class="g5-tick" x="112" y="600" text-anchor="middle">small</text>
  <text class="g5-tick" x="112" y="160" text-anchor="middle">large</text>

  <!-- Arrows on axes -->
  <path d="M130 610 H670" fill="none" stroke="rgba(78,203,255,0.4)" stroke-width="1.5"/>
  <polygon points="668,605 678,610 668,615" fill="rgba(78,203,255,0.4)"/>
  <path d="M130 610 V130" fill="none" stroke="rgba(78,203,255,0.4)" stroke-width="1.5"/>
  <polygon points="125,132 130,122 135,132" fill="rgba(78,203,255,0.4)"/>

  <!-- Quadrant labels -->
  <!-- Top-left: UNDERPOWERED -->
  <text class="g5-quad" x="265" y="220" text-anchor="middle" fill="#ff9090">Underpowered</text>
  <text class="g5-qdesc" x="265" y="244" text-anchor="middle">narrow task,</text>
  <text class="g5-qdesc" x="265" y="264" text-anchor="middle">large model wasted</text>
  <text class="g5-qdesc" x="265" y="284" text-anchor="middle">high cost, no gain</text>

  <!-- Top-right: GPT-5 TERRITORY -->
  <text class="g5-quad" x="535" y="220" text-anchor="middle" fill="#9b8fff">GPT-5 Territory</text>
  <text class="g5-qdesc" x="535" y="244" text-anchor="middle">broad task,</text>
  <text class="g5-qdesc" x="535" y="264" text-anchor="middle">large model justified</text>
  <text class="g5-qdesc" x="535" y="284" text-anchor="middle">complex reasoning needed</text>

  <!-- Bottom-left: SWEET SPOT -->
  <text class="g5-quad" x="265" y="450" text-anchor="middle" fill="#7dff90">Sweet Spot</text>
  <text style="font:600 11px 'Space Mono',monospace;fill:#50cc60;letter-spacing:1px;" x="265" y="472" text-anchor="middle">7B FINE-TUNED</text>
  <text class="g5-qdesc" x="265" y="496" text-anchor="middle">narrow task, small model</text>
  <text class="g5-qdesc" x="265" y="516" text-anchor="middle">fast, cheap, accurate</text>
  <text class="g5-qdesc" x="265" y="536" text-anchor="middle">edge deployable</text>

  <!-- Bottom-right: OVERKILL -->
  <text class="g5-quad" x="535" y="450" text-anchor="middle" fill="#ffc860">Overkill</text>
  <text class="g5-qdesc" x="535" y="474" text-anchor="middle">broad task,</text>
  <text class="g5-qdesc" x="535" y="494" text-anchor="middle">small model insufficient</text>
  <text class="g5-qdesc" x="535" y="514" text-anchor="middle">quality will degrade</text>

  <text class="g5-sub" x="50" y="698">Fine-tune on domain data. Eval on your task. GPT-5 only when 7B fails.</text>
</svg>
