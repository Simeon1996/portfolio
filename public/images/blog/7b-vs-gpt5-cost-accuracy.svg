<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="gpt5-title gpt5-desc">
  <title id="gpt5-title">7B vs GPT-5: Find Your Quadrant</title>
  <desc id="gpt5-desc">A two-by-two grid of model size versus task specificity showing sweet spot and overkill quadrants.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .qTitle { font: 700 26px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .qText { font: 500 14px 'Space Mono', monospace; fill: #9bc4dd; }
      .axis { font: 700 15px 'Space Mono', monospace; fill: #aad4ee; letter-spacing: 1.6px; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">7B vs GPT-5: Find Your Quadrant</text>
  <text class="sub" x="80" y="118">Match model capacity to task scope · the sweet spot is small + narrow</text>

  <rect x="240" y="210" width="520" height="260" rx="14" fill="rgba(49, 24, 40, 0.68)" stroke="rgba(255, 142, 180, 0.5)" stroke-width="1.3"/>
  <text class="qTitle" x="266" y="252">Underpowered</text>
  <text class="qText" x="266" y="286">Small model on a broad task</text>
  <text class="qText" x="266" y="310">Struggles with long tails, forgets constraints,</text>
  <text class="qText" x="266" y="332">fragile to distribution shift</text>
  <text x="266" y="430" style="font: 700 13px 'Space Mono', monospace; fill: #ffb4ce; letter-spacing: 1.4px;">SYMPTOM: hallucination + refusal</text>

  <rect x="800" y="210" width="520" height="260" rx="14" fill="rgba(20, 44, 70, 0.78)" stroke="rgba(126, 200, 240, 0.55)" stroke-width="1.3"/>
  <text class="qTitle" x="826" y="252">GPT-5 Territory</text>
  <text class="qText" x="826" y="286">Large model on a broad task</text>
  <text class="qText" x="826" y="310">Genuine generalist · best when scope is</text>
  <text class="qText" x="826" y="332">impossible to predict or bound</text>
  <text x="826" y="430" style="font: 700 13px 'Space Mono', monospace; fill: #bfe2ff; letter-spacing: 1.4px;">USE WHEN: scope is open-ended</text>

  <rect x="240" y="490" width="520" height="260" rx="14" fill="rgba(18, 44, 34, 0.82)" stroke="rgba(110, 255, 180, 0.7)" stroke-width="1.6" filter="url(#glow)"/>
  <text class="qTitle" x="266" y="532">Sweet Spot: 7B Fine-Tuned</text>
  <text class="qText" x="266" y="566">Small model on a narrow, well-defined task</text>
  <text class="qText" x="266" y="590">Fine-tune on your data, ship locally,</text>
  <text class="qText" x="266" y="612">predictable latency and cost</text>
  <rect x="266" y="690" width="200" height="28" rx="14" fill="rgba(60, 170, 130, 0.22)" stroke="rgba(110, 255, 210, 0.6)"/>
  <text x="284" y="710" class="okText">DEFAULT FOR MOST APPS</text>

  <rect x="800" y="490" width="520" height="260" rx="14" fill="rgba(48, 38, 18, 0.72)" stroke="rgba(255, 209, 120, 0.55)" stroke-width="1.3"/>
  <text class="qTitle" x="826" y="532">Overkill</text>
  <text class="qText" x="826" y="566">Large model on a narrow task</text>
  <text class="qText" x="826" y="590">Works, but pays 20-50× per call for</text>
  <text class="qText" x="826" y="612">capacity the task never uses</text>
  <text x="826" y="710" style="font: 700 13px 'Space Mono', monospace; fill: #ffd178; letter-spacing: 1.4px;">SMELL: cost per unit of quality</text>

  <g fill="none" stroke="rgba(170,212,238,0.35)" stroke-width="1.5" stroke-dasharray="4 6">
    <path d="M240 480 H1320"/>
    <path d="M780 210 V750"/>
  </g>

  <text class="axis" x="180" y="490" text-anchor="end">SMALL ←</text>
  <text class="axis" x="180" y="270" text-anchor="end">→ LARGE</text>
  <text class="axis" x="80" y="390" transform="rotate(-90 80 390)" text-anchor="middle">MODEL SIZE</text>

  <text class="axis" x="500" y="790" text-anchor="middle">← NARROW</text>
  <text class="axis" x="1060" y="790" text-anchor="middle">BROAD →</text>
  <text class="axis" x="780" y="790" text-anchor="middle">TASK SPECIFICITY</text>
</svg>
