<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="tf-title tf-desc">
  <title id="tf-title">Terraform Workflow Cheatsheet</title>
  <desc id="tf-desc">Five workflow steps write init plan apply destroy with state backend and provider registry underpinning the flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardPurple { fill: rgba(26, 19, 46, 0.82); stroke: rgba(168, 139, 240, 0.5); stroke-width: 1.2; rx: 14; }
      .cardCyan { fill: rgba(14, 34, 48, 0.85); stroke: rgba(126, 230, 240, 0.55); stroke-width: 1.2; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Terraform Workflow</text>
  <text class="sub" x="80" y="118">write → init → plan → apply → destroy · state + providers underpin every run</text>

  <g>
    <rect class="card" x="60" y="250" width="230" height="140"/>
    <text class="stepTitle" x="84" y="292">1. Write</text>
    <text class="stepText" x="84" y="318">.tf files declare</text>
    <text class="stepText" x="84" y="338">desired resources</text>
    <text class="stepText" x="84" y="362">HCL, modules, vars</text>

    <rect class="card" x="320" y="250" width="230" height="140"/>
    <text class="stepTitle" x="344" y="292">2. Init</text>
    <text class="stepText" x="344" y="318">Download providers,</text>
    <text class="stepText" x="344" y="338">initialise backend,</text>
    <text class="stepText" x="344" y="362">lock dependencies</text>

    <rect class="card" x="580" y="250" width="230" height="140"/>
    <text class="stepTitle" x="604" y="292">3. Plan</text>
    <text class="stepText" x="604" y="318">Dry-run diff of</text>
    <text class="stepText" x="604" y="338">desired vs actual,</text>
    <text class="stepText" x="604" y="362">reviewable output</text>

    <rect class="card" x="840" y="250" width="230" height="140"/>
    <text class="stepTitle" x="864" y="292">4. Apply</text>
    <text class="stepText" x="864" y="318">Execute plan,</text>
    <text class="stepText" x="864" y="338">write state,</text>
    <text class="stepText" x="864" y="362">produce outputs</text>

    <rect class="card" x="1100" y="250" width="230" height="140"/>
    <text class="stepTitle" x="1124" y="292">5. Destroy</text>
    <text class="stepText" x="1124" y="318">Reverse plan,</text>
    <text class="stepText" x="1124" y="338">tear down all</text>
    <text class="stepText" x="1124" y="362">managed resources</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M290 320 H320" stroke="url(#cyanLine)"/>
    <path d="M550 320 H580" stroke="url(#cyanLine)"/>
    <path d="M810 320 H840" stroke="url(#cyanLine)"/>
    <path d="M1070 320 H1100" stroke="url(#warn)"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="290" cy="320" r="4"/>
    <circle cx="320" cy="320" r="4"/>
    <circle cx="550" cy="320" r="4"/>
    <circle cx="580" cy="320" r="4"/>
    <circle cx="810" cy="320" r="4"/>
    <circle cx="840" cy="320" r="4"/>
    <circle cx="1070" cy="320" r="4"/>
    <circle cx="1100" cy="320" r="4"/>
  </g>

  <g fill="none" stroke-width="2" stroke-dasharray="6 6" stroke="rgba(168, 139, 240, 0.6)">
    <path d="M435 390 V520"/>
  </g>
  <g fill="none" stroke-width="2" stroke-dasharray="6 6" stroke="rgba(126, 230, 240, 0.6)">
    <path d="M955 390 V520"/>
  </g>

  <rect class="cardPurple" x="260" y="520" width="350" height="160"/>
  <text class="stepTitle" x="286" y="562">State Backend</text>
  <text class="stepText" x="286" y="590">Remote state (S3, GCS, Terraform</text>
  <text class="stepText" x="286" y="610">Cloud) with locking via DynamoDB</text>
  <text class="stepText" x="286" y="630">Source of truth between runs</text>
  <rect x="286" y="644" width="150" height="24" rx="12" fill="rgba(168,139,240,0.2)" stroke="rgba(168,139,240,0.5)"/>
  <text x="302" y="661" style="font: 700 11px 'Space Mono', monospace; fill: #d7c6ff; letter-spacing: 1.2px;">STATEFUL CORE</text>

  <rect class="cardCyan" x="790" y="520" width="350" height="160"/>
  <text class="stepTitle" x="816" y="562">Provider Registry</text>
  <text class="stepText" x="816" y="590">AWS, Azure, GCP, Kubernetes,</text>
  <text class="stepText" x="816" y="610">HTTP, local · pinned versions</text>
  <text class="stepText" x="816" y="630">Init downloads and caches these</text>
  <rect x="816" y="644" width="130" height="24" rx="12" fill="rgba(60,170,130,0.2)" stroke="rgba(110,255,210,0.5)"/>
  <text x="832" y="661" class="okText">PLUGIN LAYER</text>

  <text class="sub" x="80" y="760">Idempotent pipeline: plan first, apply with review, destroy to close the loop. Never edit state by hand.</text>
</svg>
