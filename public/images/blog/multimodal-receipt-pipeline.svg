<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="mrp-title mrp-desc">
  <title id="mrp-title">Multimodal Receipt Pipeline</title>
  <desc id="mrp-desc">Three inputs feed a multimodal LLM which emits three structured outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .colLabel { font: 700 14px 'Space Mono', monospace; fill: #aad4ee; letter-spacing: 1.6px; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardCenter { fill: rgba(14, 34, 48, 0.88); stroke: rgba(126, 230, 240, 0.8); stroke-width: 1.8; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Multimodal Receipt Pipeline</text>
  <text class="sub" x="80" y="118">Image + text + metadata in · structured data, report and anomalies out</text>

  <text class="colLabel" x="100" y="180">INPUTS</text>
  <text class="colLabel" x="1100" y="180">OUTPUTS</text>

  <rect class="card" x="80" y="220" width="300" height="120"/>
  <text class="stepTitle" x="106" y="262">Receipt Image</text>
  <text class="stepText" x="106" y="290">Vision branch: layout, logos,</text>
  <text class="stepText" x="106" y="310">totals, line items</text>

  <rect class="card" x="80" y="380" width="300" height="120"/>
  <text class="stepTitle" x="106" y="422">OCR / Text</text>
  <text class="stepText" x="106" y="450">Extracted text fallback,</text>
  <text class="stepText" x="106" y="470">disambiguates blurry scans</text>

  <rect class="card" x="80" y="540" width="300" height="120"/>
  <text class="stepTitle" x="106" y="582">User Metadata</text>
  <text class="stepText" x="106" y="610">Project code, traveller id,</text>
  <text class="stepText" x="106" y="630">policy tier</text>

  <rect class="cardCenter" x="520" y="340" width="360" height="180" filter="url(#glow)"/>
  <text class="stepTitle" x="546" y="384" style="font: 700 26px 'Space Grotesk', sans-serif; fill: #e9f6ff;">Multimodal LLM</text>
  <text class="stepText" x="546" y="416">Joint reasoning over image,</text>
  <text class="stepText" x="546" y="436">text and metadata</text>
  <text class="stepText" x="546" y="460">Emits validated, typed output</text>
  <rect x="546" y="476" width="140" height="26" rx="13" fill="rgba(60, 170, 130, 0.22)" stroke="rgba(110, 255, 210, 0.6)"/>
  <text x="566" y="494" class="okText">FUSION CORE</text>

  <rect class="card" x="1020" y="220" width="300" height="120"/>
  <text class="stepTitle" x="1046" y="262">Structured JSON</text>
  <text class="stepText" x="1046" y="290">Vendor, total, tax, currency,</text>
  <text class="stepText" x="1046" y="310">line items, category</text>

  <rect class="card" x="1020" y="380" width="300" height="120"/>
  <text class="stepTitle" x="1046" y="422">Expense Report</text>
  <text class="stepText" x="1046" y="450">Markdown summary, per-policy</text>
  <text class="stepText" x="1046" y="470">attribution, submission-ready</text>

  <rect class="card" x="1020" y="540" width="300" height="120"/>
  <text class="stepTitle" x="1046" y="582">Anomaly Flags</text>
  <text class="stepText" x="1046" y="610">Duplicate, out-of-policy,</text>
  <text class="stepText" x="1046" y="630">unusual amount</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M380 280 H450 V400 H520" stroke="url(#cyanLine)"/>
    <path d="M380 440 H520" stroke="url(#cyanLine)"/>
    <path d="M380 600 H450 V460 H520" stroke="url(#cyanLine)"/>
    <path d="M880 400 H950 V280 H1020" stroke="url(#ok)"/>
    <path d="M880 440 H1020" stroke="url(#ok)"/>
    <path d="M880 480 H950 V600 H1020" stroke="url(#ok)"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="380" cy="280" r="4"/>
    <circle cx="520" cy="400" r="4"/>
    <circle cx="380" cy="440" r="4"/>
    <circle cx="520" cy="440" r="4"/>
    <circle cx="380" cy="600" r="4"/>
    <circle cx="520" cy="460" r="4"/>
    <circle cx="880" cy="400" r="4"/>
    <circle cx="1020" cy="280" r="4"/>
    <circle cx="880" cy="440" r="4"/>
    <circle cx="1020" cy="440" r="4"/>
    <circle cx="880" cy="480" r="4"/>
    <circle cx="1020" cy="600" r="4"/>
  </g>

  <text class="sub" x="80" y="780">Multimodal isn't a buzzword · it's what lets the pipeline keep working when one input is degraded.</text>
</svg>
