<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" role="img" aria-labelledby="smgl-title smgl-desc">
  <title id="smgl-title">Small Model Graduation Ladder</title>
  <desc id="smgl-desc">Four-rung ladder from Gemma 2B at bottom to GPT-5/Claude Opus at top — only climb when eval forces you.</desc>
  <defs>
    <linearGradient id="smgl-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <style>
      .smgl-title { font: 700 32px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .smgl-sub   { font: 500 13px 'Space Mono', monospace; fill: #9bc0d8; }
      .smgl-rung  { font: 700 17px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .smgl-desc  { font: 500 12px 'Space Mono', monospace; fill: #7ab0cc; }
      .smgl-note  { font: 600 11px 'Space Mono', monospace; fill: #ff9ec0; letter-spacing: 1px; }
      .smgl-arrow { font: 700 14px 'Space Mono', monospace; fill: #ffc17d; }
    </style>
  </defs>
  <rect width="800" height="700" fill="url(#smgl-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="175" x2="800" y2="175"/><line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="525" x2="800" y2="525"/><line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
  </g>

  <text class="smgl-title" x="50" y="60">Small Model Graduation Ladder</text>
  <text class="smgl-sub" x="50" y="88">Start small. Climb only when your eval forces you to.</text>

  <!-- Ladder rails -->
  <line x1="120" y1="130" x2="120" y2="620" stroke="rgba(78,203,255,0.3)" stroke-width="3"/>
  <line x1="560" y1="130" x2="560" y2="620" stroke="rgba(78,203,255,0.3)" stroke-width="3"/>

  <!-- Rung 4 (top): GPT-5 / Claude Opus -->
  <rect x="120" y="130" width="440" height="100" rx="10" fill="rgba(80,14,80,0.8)" stroke="rgba(255,106,158,0.6)" stroke-width="2"/>
  <text class="smgl-rung" x="340" y="170" text-anchor="middle" fill="#ffaac8">GPT-5 / Claude Opus</text>
  <text class="smgl-desc" x="340" y="194" text-anchor="middle">last resort — justify the cost</text>
  <text class="smgl-desc" x="340" y="214" text-anchor="middle">broad reasoning, complex multi-step tasks</text>

  <!-- Rung 3: Llama 3 70B / DeepSeek-R1 -->
  <rect x="120" y="270" width="440" height="100" rx="10" fill="rgba(14,40,80,0.8)" stroke="rgba(78,203,255,0.55)" stroke-width="2"/>
  <text class="smgl-rung" x="340" y="310" text-anchor="middle">Llama 3 70B / DeepSeek-R1</text>
  <text class="smgl-desc" x="340" y="334" text-anchor="middle">graduate when mid-tier fails eval</text>
  <text class="smgl-desc" x="340" y="354" text-anchor="middle">strong reasoning, lower cost per token</text>

  <!-- Rung 2: Mistral 7B / Llama 3 8B -->
  <rect x="120" y="410" width="440" height="100" rx="10" fill="rgba(14,30,60,0.8)" stroke="rgba(78,203,255,0.45)" stroke-width="2"/>
  <text class="smgl-rung" x="340" y="450" text-anchor="middle">Mistral 7B / Llama 3 8B</text>
  <text class="smgl-desc" x="340" y="474" text-anchor="middle">graduate when small model fails eval</text>
  <text class="smgl-desc" x="340" y="494" text-anchor="middle">solid general tasks, runs locally</text>

  <!-- Rung 1 (bottom): Gemma 2B / Phi-3 Mini -->
  <rect x="120" y="550" width="440" height="90" rx="10" fill="rgba(14,30,47,0.9)" stroke="rgba(125,245,242,0.5)" stroke-width="2"/>
  <text class="smgl-rung" x="340" y="588" text-anchor="middle" fill="#7df5f2">Gemma 2B / Phi-3 Mini</text>
  <text class="smgl-desc" x="340" y="612" text-anchor="middle">default start — cheap, fast, edge-deployable</text>

  <!-- Right-side arrow label -->
  <text class="smgl-arrow" x="620" y="200" text-anchor="middle">only</text>
  <text class="smgl-arrow" x="620" y="220" text-anchor="middle">climb</text>
  <text class="smgl-arrow" x="620" y="240" text-anchor="middle">when</text>
  <text class="smgl-arrow" x="620" y="260" text-anchor="middle">eval</text>
  <text class="smgl-arrow" x="620" y="280" text-anchor="middle">forces</text>
  <text class="smgl-arrow" x="620" y="300" text-anchor="middle">you</text>
  <!-- Arrow pointing upward -->
  <path d="M 620 450 L 620 340" fill="none" stroke="#ffc17d" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="614,342 620,330 626,342" fill="#ffc17d"/>
  <text class="smgl-note" x="620" y="480" text-anchor="middle">EVAL-DRIVEN</text>
  <text class="smgl-note" x="620" y="500" text-anchor="middle">GRADUATION</text>

  <text class="smgl-sub" x="50" y="668">Premature scale-up is just wasted spend. Let your eval be the judge.</text>
</svg>
