<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="smgl-title smgl-desc">
  <title id="smgl-title">Small Model Graduation Ladder</title>
  <desc id="smgl-desc">Four stacked rungs from tiny local models up to frontier models, climb only when evaluation forces you.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 22px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 14px 'Space Mono', monospace; fill: #9bc4dd; }
      .noteText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Small Model Graduation Ladder</text>
  <text class="sub" x="80" y="118">Start tiny, cheap and local · climb only when an eval forces you up</text>

  <rect x="80" y="200" width="1100" height="120" rx="14" fill="rgba(49, 24, 40, 0.72)" stroke="rgba(255, 142, 180, 0.55)" stroke-width="1.4"/>
  <text class="stepTitle" x="106" y="242">GPT-5 / Claude Opus</text>
  <text class="stepText" x="106" y="272">Frontier reasoning · last resort</text>
  <text class="stepText" x="106" y="296">Reach for this only after smaller rungs fail an honest eval</text>
  <text x="1160" y="242" text-anchor="end" style="font: 700 13px 'Space Mono', monospace; fill: #ffb4ce; letter-spacing: 1.4px;">COST: HIGH</text>
  <text x="1160" y="270" text-anchor="end" class="noteText">$$$ per token</text>
  <text x="1160" y="292" text-anchor="end" class="noteText">hosted only</text>

  <rect x="80" y="345" width="1100" height="110" rx="14" fill="rgba(48, 38, 18, 0.78)" stroke="rgba(255, 209, 120, 0.55)" stroke-width="1.3"/>
  <text class="stepTitle" x="106" y="385">Llama 3 70B / DeepSeek-R1</text>
  <text class="stepText" x="106" y="414">Open-weight heavyweights · multi-GPU inference</text>
  <text class="stepText" x="106" y="436">Good when you need reasoning but not the absolute ceiling</text>
  <text x="1160" y="385" text-anchor="end" style="font: 700 13px 'Space Mono', monospace; fill: #ffd178; letter-spacing: 1.4px;">COST: MED-HIGH</text>
  <text x="1160" y="412" text-anchor="end" class="noteText">self-host feasible</text>

  <rect x="80" y="480" width="1100" height="110" rx="14" fill="rgba(14, 34, 48, 0.85)" stroke="rgba(126, 230, 240, 0.55)" stroke-width="1.3"/>
  <text class="stepTitle" x="106" y="520">Mistral 7B / Llama 3 8B</text>
  <text class="stepText" x="106" y="549">Fine-tunable, runs on a single consumer GPU</text>
  <text class="stepText" x="106" y="571">Often matches frontier on a narrow task after tuning</text>
  <text x="1160" y="520" text-anchor="end" style="font: 700 13px 'Space Mono', monospace; fill: #7df5f2; letter-spacing: 1.4px;">COST: LOW</text>
  <text x="1160" y="547" text-anchor="end" class="noteText">single GPU · fine-tune</text>

  <rect x="80" y="615" width="1100" height="110" rx="14" fill="rgba(18, 44, 34, 0.78)" stroke="rgba(110, 255, 180, 0.55)" stroke-width="1.3"/>
  <text class="stepTitle" x="106" y="655">Gemma 2B / Phi-3 Mini</text>
  <text class="stepText" x="106" y="684">Default starting point · runs on CPU or phone</text>
  <text class="stepText" x="106" y="706">Prove the workflow first, measure, then think about scaling</text>
  <text x="1160" y="655" text-anchor="end" class="okText">COST: MINIMAL</text>
  <text x="1160" y="682" text-anchor="end" class="noteText">CPU-friendly · default</text>

  <g transform="translate(1260,200)">
    <path d="M 0 520 V 0" fill="none" stroke="rgba(126,230,240,0.55)" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="12" y="520" style="font: 700 14px 'Space Mono', monospace; fill: #bfe2ff; letter-spacing: 1.2px;" transform="rotate(-90 12 520)">only climb when eval forces you ↑</text>
  </g>

  <text class="sub" x="80" y="780">Rule: pick the smallest model that passes your eval · upgrade only on measured failure, not vibes.</text>
</svg>
