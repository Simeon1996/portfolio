<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" role="img" aria-labelledby="mwv-title mwv-desc">
  <title id="mwv-title">The Zone AI Is Eating</title>
  <desc id="mwv-desc">Two overlapping circles showing paid work and meaningful work with an AI encroachment over the overlap.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="leftCircle">
      <circle cx="310" cy="300" r="160"/>
    </clipPath>
    <style>
      .title { font: 700 36px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 16px 'Space Mono', monospace; fill: #9dc1d8; }
      .lbl { font: 700 18px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .lblText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .zoneLbl { font: 700 22px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .aiLbl { font: 700 22px 'Space Grotesk', sans-serif; fill: #ffd1d1; }
    </style>
  </defs>

  <rect width="1000" height="700" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 150 H1000"/>
    <path d="M0 300 H1000"/>
    <path d="M0 450 H1000"/>
    <path d="M0 600 H1000"/>
    <path d="M200 0 V700"/>
    <path d="M500 0 V700"/>
    <path d="M800 0 V700"/>
  </g>

  <g opacity="0.14">
    <circle cx="150" cy="120" r="150" fill="#2f4f74"/>
    <circle cx="850" cy="620" r="180" fill="#2c4f6b"/>
  </g>

  <text class="title" x="60" y="80">The Zone AI Is Eating</text>
  <text class="sub" x="60" y="108">The overlap between paid work and meaningful work is shrinking faster than either circle</text>

  <circle cx="310" cy="300" r="160" fill="rgba(78, 203, 255, 0.12)" stroke="rgba(126, 230, 240, 0.7)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="510" cy="300" r="160" fill="rgba(168, 139, 240, 0.12)" stroke="rgba(178, 146, 240, 0.7)" stroke-width="2" filter="url(#glow)"/>

  <g clip-path="url(#leftCircle)">
    <circle cx="510" cy="300" r="160" fill="rgba(110, 255, 210, 0.22)"/>
  </g>

  <g clip-path="url(#leftCircle)">
    <circle cx="570" cy="300" r="110" fill="rgba(255, 106, 141, 0.45)"/>
  </g>
  <circle cx="570" cy="300" r="110" fill="rgba(255, 106, 141, 0.35)" clip-path="url(#leftCircle)"/>

  <text class="lbl" x="160" y="240">Work I was paid to do</text>
  <text class="lblText" x="160" y="262">commits, tickets, reviews</text>

  <text class="lbl" x="555" y="240">Work that felt meaningful</text>
  <text class="lblText" x="555" y="262">craft, learning, hard problems</text>

  <text class="zoneLbl" x="410" y="305" text-anchor="middle">The Zone</text>
  <text class="lblText" x="410" y="326" text-anchor="middle">paid + meaningful</text>

  <text class="aiLbl" x="600" y="305" text-anchor="middle">AI →</text>
  <text class="lblText" x="600" y="326" text-anchor="middle" style="fill:#ffb4ce;">encroaching</text>

  <rect x="60" y="560" width="880" height="100" rx="14" fill="rgba(14, 29, 46, 0.82)" stroke="rgba(120, 179, 216, 0.44)" stroke-width="1.2"/>
  <text class="lbl" x="86" y="598">What AI eats first</text>
  <text class="lblText" x="86" y="622">The overlap · easy-to-specify, mid-difficulty, legible work that both paid well</text>
  <text class="lblText" x="86" y="642">and felt like craft. What remains gets polarised: pure toil or pure exploration.</text>
</svg>
