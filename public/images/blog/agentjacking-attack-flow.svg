<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="ajk-title ajk-desc">
  <title id="ajk-title">The Agentjacking Attack Path — and the Fix</title>
  <desc id="ajk-desc">A flow diagram in two rows. Top row, left to right: an attacker crafts a fake error report, an error-tracking tool ingests it verbatim, a coding agent reads it as routine debugging data, and the model cannot tell the stack trace text from embedded instructions. Without a gate, this flows down into a "Compromised" outcome where the agent runs the attacker's shell command directly. A branch from the ingestion step instead routes down into a "Structured Field Extraction Gate" that strips the payload to only message, stack trace, and timestamp, leading to a safe outcome where the agent debugs normally and any shell command still requires human confirmation.</desc>
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="820">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="55%" stop-color="#111f33"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="pinkLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <linearGradient id="pinkLineV" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="820">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <linearGradient id="okLine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 16px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 12.5px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 11px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .badText { font: 700 11px 'Space Mono', monospace; fill: #ff9db9; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardHot { fill: rgba(43, 19, 42, 0.42); stroke: rgba(255, 119, 177, 0.42); stroke-width: 1.2; rx: 14; }
      .cardOk { fill: rgba(14, 34, 48, 0.9); stroke: rgba(126, 230, 240, 0.85); stroke-width: 1.6; rx: 14; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400 M0 300 H1400 M0 440 H1400 M0 580 H1400 M0 700 H1400"/>
    <path d="M200 0 V820 M500 0 V820 M800 0 V820 M1100 0 V820"/>
  </g>

  <text class="title" x="76" y="80">The Agentjacking Attack Path — and the Fix</text>
  <text class="sub" x="76" y="112">A fake error report becomes a command, unless you gate it first</text>

  <!-- Top row: the attack -->
  <rect class="card" x="90" y="180" width="250" height="130"/>
  <text class="stepTitle" x="114" y="222">1. Fake Error Report</text>
  <text class="stepText" x="114" y="250">Stack trace styled like a</text>
  <text class="stepText" x="114" y="268">real Sentry-style payload</text>

  <rect class="card" x="405" y="180" width="250" height="130"/>
  <text class="stepTitle" x="429" y="222">2. Tracker Ingests Raw</text>
  <text class="stepText" x="429" y="250">Stored verbatim — nobody</text>
  <text class="stepText" x="429" y="268">reviews the raw text</text>

  <rect class="card" x="720" y="180" width="250" height="130"/>
  <text class="stepTitle" x="744" y="222">3. Agent Reads It</text>
  <text class="stepText" x="744" y="250">Pulled into context</text>
  <text class="stepText" x="744" y="268">automatically, as usual</text>

  <rect class="cardHot" x="1035" y="180" width="250" height="130"/>
  <text class="stepTitle" x="1059" y="222">4. Text = Instructions</text>
  <text class="stepText" x="1059" y="250">Model can't tell stack</text>
  <text class="stepText" x="1059" y="268">trace from a command</text>

  <!-- Bottom row: compromise vs. the fix -->
  <rect class="cardHot" x="1035" y="480" width="250" height="130" filter="url(#glow)"/>
  <text class="stepTitle" x="1059" y="522">5. Compromised</text>
  <text class="stepText" x="1059" y="550">Agent runs the attacker's</text>
  <text class="stepText" x="1059" y="568">shell command directly</text>
  <text class="badText" x="1059" y="596">NO EXTRACTION GATE</text>

  <rect class="cardOk" x="720" y="480" width="250" height="130"/>
  <text class="stepTitle" x="744" y="516">The Fix: Extraction Gate</text>
  <text class="stepText" x="744" y="546">Strip to message, stack,</text>
  <text class="stepText" x="744" y="564">timestamp — discard the rest</text>

  <rect class="cardOk" x="350" y="480" width="280" height="130" filter="url(#glow)"/>
  <text class="stepTitle" x="376" y="522">Agent Debugs Safely</text>
  <text class="stepText" x="376" y="550">Only structured fields</text>
  <text class="stepText" x="376" y="568">ever reach the model</text>
  <text class="okText" x="376" y="596">HUMAN CONFIRMS SHELL CMDS</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M340 245 H405" stroke="url(#cyanLine)"/>
    <path d="M655 245 H720" stroke="url(#cyanLine)"/>
    <path d="M970 245 H1035" stroke="url(#cyanLine)"/>
    <path d="M1160 310 V480" stroke="url(#pinkLineV)"/>
    <path d="M530 310 V420 H845 V480" stroke="url(#okLine)"/>
    <path d="M720 545 H630" stroke="url(#okLine)"/>
  </g>

  <g fill="#8ceeff" opacity="0.9">
    <circle cx="340" cy="245" r="4"/>
    <circle cx="405" cy="245" r="4"/>
    <circle cx="655" cy="245" r="4"/>
    <circle cx="720" cy="245" r="4"/>
    <circle cx="970" cy="245" r="4"/>
    <circle cx="1035" cy="245" r="4"/>
  </g>
  <circle cx="1160" cy="310" r="4" fill="#ff93bb"/>
  <circle cx="1160" cy="480" r="4" fill="#ff93bb"/>
  <circle cx="530" cy="310" r="4" fill="#8effc0"/>
  <circle cx="845" cy="480" r="4" fill="#8effc0"/>
  <circle cx="720" cy="545" r="4" fill="#8effc0"/>
  <circle cx="630" cy="545" r="4" fill="#8effc0"/>

  <text class="badText" x="900" y="410">NO GATE = SHELL EXEC</text>
  <text class="okText" x="140" y="410">GATE INTERCEPTS THE RAW PAYLOAD</text>

  <text class="sub" x="76" y="770">The gate has to sit between the tracker and the model — sanitizing after the agent already read it is too late.</text>
</svg>
