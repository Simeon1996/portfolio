<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="aca-title aca-desc">
  <title id="aca-title">AI Coding Agent Architecture</title>
  <desc id="aca-desc">Orchestrator, tools, sandbox, memory, and eval harness in one diagram.</desc>
  <defs>
    <linearGradient id="aca-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="aca-cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="aca-pink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <filter id="aca-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .aca-title { font: 700 36px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .aca-sub   { font: 500 14px 'Space Mono', monospace; fill: #9bc0d8; }
      .aca-node  { font: 700 18px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .aca-small { font: 500 12px 'Space Mono', monospace; fill: #7ab0cc; }
      .aca-tag   { font: 600 11px 'Space Mono', monospace; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1200" height="680" fill="url(#aca-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="170" x2="1200" y2="170"/><line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="510" x2="1200" y2="510"/><line x1="200" y1="0" x2="200" y2="680"/>
    <line x1="600" y1="0" x2="600" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/>
  </g>

  <text class="aca-title" x="50" y="64">AI Coding Agent Architecture</text>
  <text class="aca-sub" x="50" y="94">Orchestrator at center — tools, sandbox, memory, and evals surrounding it</text>

  <!-- Center: Orchestrator -->
  <rect x="440" y="240" width="320" height="160" rx="14" fill="rgba(10,22,40,0.95)" stroke="rgba(78,203,255,0.7)" stroke-width="2" filter="url(#aca-glow)"/>
  <text class="aca-node" x="600" y="300" text-anchor="middle" fill="#7df5f2">Orchestrator</text>
  <text class="aca-small" x="600" y="326" text-anchor="middle">LLM reasoning loop</text>
  <text class="aca-small" x="600" y="346" text-anchor="middle">task planning + tool dispatch</text>
  <text class="aca-small" x="600" y="366" text-anchor="middle">context window management</text>
  <text class="aca-tag" x="600" y="390" text-anchor="middle" fill="#4ecbff">CORE LOOP</text>

  <!-- Tools (left top) -->
  <rect x="60" y="150" width="280" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(109,181,222,0.45)" stroke-width="1.5"/>
  <text class="aca-node" x="200" y="188">Tools</text>
  <text class="aca-small" x="200" y="212">read / write files</text>
  <text class="aca-small" x="200" y="232">run shell commands</text>
  <text class="aca-small" x="200" y="252">search &amp; grep codebase</text>
  <text class="aca-tag" x="80" y="274" fill="#4ecbff">TOOL SURFACE</text>

  <!-- Sandbox (left bottom) -->
  <rect x="60" y="360" width="280" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(109,181,222,0.45)" stroke-width="1.5"/>
  <text class="aca-node" x="200" y="398">Sandbox</text>
  <text class="aca-small" x="200" y="422">isolated execution env</text>
  <text class="aca-small" x="200" y="442">code runs safely</text>
  <text class="aca-small" x="200" y="462">containers / VMs</text>
  <text class="aca-tag" x="80" y="484" fill="#4ecbff">ISOLATION LAYER</text>

  <!-- Memory (right top) -->
  <rect x="860" y="150" width="280" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="aca-node" x="1000" y="188" fill="#ffaac8">Memory</text>
  <text class="aca-small" x="1000" y="212">short-term: context window</text>
  <text class="aca-small" x="1000" y="232">long-term: vector store</text>
  <text class="aca-small" x="1000" y="252">episodic: past sessions</text>
  <text class="aca-tag" x="880" y="274" fill="#ff9ec0">MEMORY LAYER</text>

  <!-- Eval Harness (right bottom) -->
  <rect x="860" y="360" width="280" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="aca-node" x="1000" y="398" fill="#ffaac8">Eval Harness</text>
  <text class="aca-small" x="1000" y="422">test suite execution</text>
  <text class="aca-small" x="1000" y="442">pass / fail signal</text>
  <text class="aca-small" x="1000" y="462">agent retry loop</text>
  <text class="aca-tag" x="880" y="484" fill="#ff9ec0">FEEDBACK SIGNAL</text>

  <!-- Bottom: Human / IDE -->
  <rect x="340" y="520" width="520" height="80" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(125,245,242,0.4)" stroke-width="1.5"/>
  <text class="aca-node" x="600" y="557" text-anchor="middle">Human / IDE Interface</text>
  <text class="aca-small" x="600" y="579" text-anchor="middle">task description, approval gates, diff review</text>

  <!-- Connecting arrows -->
  <g fill="none" stroke="url(#aca-cyan)" stroke-width="2" stroke-linecap="round">
    <path d="M340 295 H440"/><path d="M340 390 H440"/>
    <path d="M760 295 H860"/><path d="M760 390 H860"/>
    <path d="M600 400 L600 520"/>
  </g>

  <text class="aca-sub" x="50" y="640">Agent rewrites, tests, debugs, and iterates — eval harness closes the loop.</text>
</svg>
