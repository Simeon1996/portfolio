<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="aca-title aca-desc">
  <title id="aca-title">AI Coding Agent Architecture</title>
  <desc id="aca-desc">Orchestrator at the centre with tools memory sandbox eval harness and a human IDE interface at the bottom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardCenter { fill: rgba(14, 34, 48, 0.88); stroke: rgba(126, 230, 240, 0.8); stroke-width: 1.8; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">AI Coding Agent Architecture</text>
  <text class="sub" x="80" y="118">Orchestrator-centric · tools, memory, sandbox and eval harness wrap the model</text>

  <rect class="card" x="100" y="220" width="280" height="130"/>
  <text class="stepTitle" x="124" y="262">Tools</text>
  <text class="stepText" x="124" y="290">Read/write FS, run tests,</text>
  <text class="stepText" x="124" y="310">search code, call APIs</text>
  <text class="stepText" x="124" y="330">Typed and versioned</text>

  <rect class="card" x="1020" y="220" width="280" height="130"/>
  <text class="stepTitle" x="1044" y="262">Memory</text>
  <text class="stepText" x="1044" y="290">Session scratchpad, notes,</text>
  <text class="stepText" x="1044" y="310">task plans, prior attempts</text>
  <text class="stepText" x="1044" y="330">Vector + key-value recall</text>

  <rect class="card" x="100" y="460" width="280" height="130"/>
  <text class="stepTitle" x="124" y="502">Sandbox</text>
  <text class="stepText" x="124" y="530">Ephemeral VM or container</text>
  <text class="stepText" x="124" y="550">No prod creds, rate-limited</text>
  <text class="stepText" x="124" y="570">Crash-isolated execution</text>

  <rect class="card" x="1020" y="460" width="280" height="130"/>
  <text class="stepTitle" x="1044" y="502">Eval Harness</text>
  <text class="stepText" x="1044" y="530">Regression + behaviour tests,</text>
  <text class="stepText" x="1044" y="550">LLM-as-judge scoring,</text>
  <text class="stepText" x="1044" y="570">trace replay</text>

  <rect class="cardCenter" x="520" y="330" width="360" height="160" filter="url(#glow)"/>
  <text class="stepTitle" x="546" y="376" style="font: 700 26px 'Space Grotesk', sans-serif; fill: #e9f6ff;">Orchestrator</text>
  <text class="stepText" x="546" y="408">Plans tasks, selects tools,</text>
  <text class="stepText" x="546" y="428">retries on failure,</text>
  <text class="stepText" x="546" y="448">emits traces for review</text>
  <rect x="546" y="460" width="160" height="24" rx="12" fill="rgba(60, 170, 130, 0.22)" stroke="rgba(110, 255, 210, 0.6)"/>
  <text x="568" y="477" class="okText">AGENT LOOP CORE</text>

  <rect class="card" x="380" y="630" width="640" height="120"/>
  <text class="stepTitle" x="406" y="672">Human / IDE Interface</text>
  <text class="stepText" x="406" y="700">Chat panel, diff view, approve/reject actions, step replay</text>
  <text class="stepText" x="406" y="722">Authoritative feedback channel for correcting the loop</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M380 285 H450 V395 H520" stroke="url(#cyanLine)"/>
    <path d="M1020 285 H950 V395 H880" stroke="url(#cyanLine)"/>
    <path d="M380 525 H450 V425 H520" stroke="url(#cyanLine)"/>
    <path d="M1020 525 H950 V425 H880" stroke="url(#cyanLine)"/>
    <path d="M700 490 V630" stroke="url(#ok)"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="380" cy="285" r="4"/>
    <circle cx="520" cy="395" r="4"/>
    <circle cx="1020" cy="285" r="4"/>
    <circle cx="880" cy="395" r="4"/>
    <circle cx="380" cy="525" r="4"/>
    <circle cx="520" cy="425" r="4"/>
    <circle cx="1020" cy="525" r="4"/>
    <circle cx="880" cy="425" r="4"/>
    <circle cx="700" cy="490" r="4"/>
    <circle cx="700" cy="630" r="4"/>
  </g>

  <text class="sub" x="80" y="790">A coding agent is the loop around the model · the model is not the agent.</text>
</svg>
