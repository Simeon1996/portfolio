<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="abpg-title abpg-desc">
  <title id="abpg-title">AI Bubble Pressure Gauge Comparison</title>
  <desc id="abpg-desc">Two pressure gauges: Dot-com 2000 needle in the red danger zone labeled POP vs AI 2026 needle in the yellow moderate zone labeled LEAK.</desc>
  <defs>
    <linearGradient id="abpg-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <style>
      .abpg-title { font: 700 32px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .abpg-sub   { font: 500 13px 'Space Mono', monospace; fill: #9bc0d8; }
      .abpg-label { font: 700 18px 'Space Grotesk', sans-serif; }
      .abpg-zone  { font: 600 13px 'Space Mono', monospace; letter-spacing: 1px; }
      .abpg-big   { font: 700 28px 'Space Grotesk', sans-serif; }
      .abpg-caption { font: 500 13px 'Space Mono', monospace; fill: #7ab0cc; }
    </style>
  </defs>
  <rect width="900" height="560" fill="url(#abpg-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="140" x2="900" y2="140"/><line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="0" y1="420" x2="900" y2="420"/><line x1="450" y1="0" x2="450" y2="560"/>
  </g>

  <text class="abpg-title" x="50" y="60">Bubble Pressure: Then vs Now</text>
  <text class="abpg-sub" x="50" y="88">Dot-com 2000 vs AI 2026 — different readings on the same instrument</text>

  <!-- LEFT GAUGE: Dot-com 2000 -->
  <!-- Gauge arc background -->
  <path d="M 120 360 A 180 180 0 0 1 480 360" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>
  <!-- Red zone (270° to 360° = right side) -->
  <path d="M 120 360 A 180 180 0 0 1 245 196" fill="none" stroke="rgba(255,80,80,0.3)" stroke-width="40"/>
  <!-- Yellow zone -->
  <path d="M 245 196 A 180 180 0 0 1 355 158" fill="none" stroke="rgba(255,200,60,0.3)" stroke-width="40"/>
  <!-- Green zone -->
  <path d="M 355 158 A 180 180 0 0 1 480 360" fill="none" stroke="rgba(60,200,100,0.3)" stroke-width="40"/>

  <!-- Zone labels -->
  <text class="abpg-zone" x="128" y="415" fill="#ff6060">DANGER</text>
  <text class="abpg-zone" x="246" y="192" fill="#ffc840" text-anchor="middle">WARN</text>
  <text class="abpg-zone" x="430" y="415" text-anchor="end" fill="#60cc80">SAFE</text>

  <!-- Needle pointing to red zone (left) -->
  <line x1="300" y1="360" x2="165" y2="245" stroke="#ff4040" stroke-width="4" stroke-linecap="round"/>
  <circle cx="300" cy="360" r="10" fill="#2a3a50" stroke="#ff4040" stroke-width="2"/>

  <!-- POP label -->
  <text class="abpg-big" x="160" y="230" fill="#ff4040">POP</text>

  <!-- Gauge title -->
  <text class="abpg-label" x="300" y="420" text-anchor="middle" fill="#ffaaaa">Dot-com 2000</text>
  <text class="abpg-caption" x="300" y="445" text-anchor="middle">NASDAQ −78% peak to trough</text>
  <text class="abpg-caption" x="300" y="465" text-anchor="middle">pure speculation, no revenue</text>

  <!-- RIGHT GAUGE: AI 2026 -->
  <path d="M 420 360 A 180 180 0 0 1 780 360" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="40"/>
  <path d="M 420 360 A 180 180 0 0 1 545 196" fill="none" stroke="rgba(255,80,80,0.3)" stroke-width="40"/>
  <path d="M 545 196 A 180 180 0 0 1 655 158" fill="none" stroke="rgba(255,200,60,0.3)" stroke-width="40"/>
  <path d="M 655 158 A 180 180 0 0 1 780 360" fill="none" stroke="rgba(60,200,100,0.3)" stroke-width="40"/>

  <text class="abpg-zone" x="428" y="415" fill="#ff6060">DANGER</text>
  <text class="abpg-zone" x="546" y="192" fill="#ffc840" text-anchor="middle">WARN</text>
  <text class="abpg-zone" x="830" y="415" text-anchor="end" fill="#60cc80">SAFE</text>

  <!-- Needle pointing to yellow/moderate zone -->
  <line x1="600" y1="360" x2="593" y2="180" stroke="#ffc840" stroke-width="4" stroke-linecap="round"/>
  <circle cx="600" cy="360" r="10" fill="#2a3a50" stroke="#ffc840" stroke-width="2"/>

  <!-- LEAK label -->
  <text class="abpg-big" x="575" y="170" fill="#ffc840" text-anchor="middle">LEAK</text>

  <text class="abpg-label" x="600" y="420" text-anchor="middle" fill="#ffd880">AI 2026</text>
  <text class="abpg-caption" x="600" y="445" text-anchor="middle">real revenue, real products</text>
  <text class="abpg-caption" x="600" y="465" text-anchor="middle">valuation multiples still stretched</text>

  <text class="abpg-sub" x="50" y="528">Same instrument. Different pressure. Different outcome.</text>
</svg>
