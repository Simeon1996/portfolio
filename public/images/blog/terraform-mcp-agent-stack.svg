<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="tms-title tms-desc">
  <title id="tms-title">Terraform plus MCP plus AI Agent Stack</title>
  <desc id="tms-desc">Three stacked layers Terraform MCP Server AI Agent with a human approval gate on the right.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 22px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 14px 'Space Mono', monospace; fill: #9bc4dd; }
      .warnText { font: 700 12px 'Space Mono', monospace; fill: #ffb4ce; letter-spacing: 1.4px; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Terraform + MCP + AI Agent Stack</text>
  <text class="sub" x="80" y="118">Three-layer stack · human approval is the safety valve for any destructive write</text>

  <rect x="80" y="530" width="1080" height="130" rx="14" fill="rgba(40, 48, 62, 0.82)" stroke="rgba(170, 185, 200, 0.5)" stroke-width="1.2"/>
  <text class="stepTitle" x="110" y="570">Terraform</text>
  <text class="stepText" x="110" y="598">Declarative IaC engine · plan, apply, destroy, state</text>
  <text class="stepText" x="110" y="620">Provider plugins reach AWS, GCP, Azure, Kubernetes and more</text>
  <rect x="110" y="634" width="140" height="22" rx="11" fill="rgba(170,185,200,0.2)" stroke="rgba(170,185,200,0.4)"/>
  <text x="126" y="650" style="font: 700 11px 'Space Mono', monospace; fill: #dfe6ef; letter-spacing: 1.2px;">EXECUTION LAYER</text>

  <rect x="80" y="370" width="1080" height="130" rx="14" fill="rgba(20, 52, 88, 0.82)" stroke="rgba(126, 200, 240, 0.55)" stroke-width="1.2"/>
  <text class="stepTitle" x="110" y="410">MCP Server</text>
  <text class="stepText" x="110" y="438">Exposes terraform plan / apply / state as typed tool calls</text>
  <text class="stepText" x="110" y="460">Enforces scopes, redaction, and structured error contracts</text>
  <rect x="110" y="474" width="160" height="22" rx="11" fill="rgba(90,160,220,0.22)" stroke="rgba(126,200,240,0.55)"/>
  <text x="126" y="490" style="font: 700 11px 'Space Mono', monospace; fill: #bfe2ff; letter-spacing: 1.2px;">INTEGRATION LAYER</text>

  <rect x="80" y="210" width="1080" height="130" rx="14" fill="rgba(36, 22, 60, 0.82)" stroke="rgba(178, 146, 240, 0.55)" stroke-width="1.2"/>
  <text class="stepTitle" x="110" y="250">AI Agent</text>
  <text class="stepText" x="110" y="278">Reasons over tickets, diffs, and state to propose changes</text>
  <text class="stepText" x="110" y="300">Calls MCP tools · reads reports freely, gates writes on humans</text>
  <rect x="110" y="314" width="140" height="22" rx="11" fill="rgba(168,139,240,0.22)" stroke="rgba(178,146,240,0.55)"/>
  <text x="126" y="330" style="font: 700 11px 'Space Mono', monospace; fill: #dfd0ff; letter-spacing: 1.2px;">REASONING LAYER</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M620 340 V370" stroke="url(#cyanLine)"/>
    <path d="M620 500 V530" stroke="url(#cyanLine)"/>
  </g>
  <g fill="#96ffe5">
    <circle cx="620" cy="340" r="4"/>
    <circle cx="620" cy="370" r="4"/>
    <circle cx="620" cy="500" r="4"/>
    <circle cx="620" cy="530" r="4"/>
  </g>

  <g fill="none" stroke-width="2.5" stroke-dasharray="8 6" stroke="rgba(255, 142, 180, 0.8)">
    <path d="M1220 210 V660"/>
  </g>

  <text x="1240" y="240" style="font: 700 15px 'Space Grotesk', sans-serif; fill: #ffd1e0;">Human approval</text>
  <text x="1240" y="262" style="font: 700 15px 'Space Grotesk', sans-serif; fill: #ffd1e0;">required</text>

  <g fill="none" stroke-width="2" stroke="rgba(255, 142, 180, 0.9)">
    <path d="M1210 435 H1230"/>
  </g>
  <text x="1240" y="370" style="font: 700 13px 'Space Mono', monospace; fill: #ffb4ce; letter-spacing: 1.2px;">MODIFY / APPLY</text>
  <text x="1240" y="392" style="font: 500 12px 'Space Mono', monospace; fill: #ffb4ce;">gated · blocks here</text>

  <text x="1240" y="486" style="font: 700 13px 'Space Mono', monospace; fill: #8cffce; letter-spacing: 1.2px;">READ / REPORT</text>
  <text x="1240" y="508" style="font: 500 12px 'Space Mono', monospace; fill: #8cffce;">autonomous · passes</text>

  <text class="sub" x="80" y="760">Read flows freely; writes stop at the dashed line until a reviewer acknowledges the plan.</text>
</svg>
