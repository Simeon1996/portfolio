<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="mcp-tcpip-title mcp-tcpip-desc">
  <title id="mcp-tcpip-title">MCP as the TCP/IP of AI Agents</title>
  <desc id="mcp-tcpip-desc">Two parallel three-layer stacks showing TCP/IP HTTP Web Apps next to MCP Agent Protocol AI Agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 22px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .colLabel { font: 700 14px 'Space Mono', monospace; fill: #aad4ee; letter-spacing: 1.6px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">MCP as the TCP/IP of AI Agents</text>
  <text class="sub" x="80" y="118">Familiar layered architecture · every networked web app has an agentic analogue now</text>

  <text class="colLabel" x="180" y="188">CLASSICAL WEB STACK</text>
  <text class="colLabel" x="930" y="188">AI AGENT STACK</text>

  <g>
    <rect class="card" x="120" y="220" width="420" height="130"/>
    <text class="stepTitle" x="148" y="264">Web Apps</text>
    <text class="stepText" x="148" y="294">User-facing product surface</text>
    <text class="stepText" x="148" y="316">HTML, JS, REST endpoints</text>

    <rect class="card" x="120" y="380" width="420" height="130"/>
    <text class="stepTitle" x="148" y="424">HTTP</text>
    <text class="stepText" x="148" y="454">Request/response semantics</text>
    <text class="stepText" x="148" y="476">Methods, headers, status codes</text>

    <rect class="card" x="120" y="540" width="420" height="130"/>
    <text class="stepTitle" x="148" y="584">TCP / IP</text>
    <text class="stepText" x="148" y="614">Addressable reliable transport</text>
    <text class="stepText" x="148" y="636">Packets, ports, connections</text>
  </g>

  <g>
    <rect class="card" x="860" y="220" width="420" height="130"/>
    <text class="stepTitle" x="888" y="264">AI Agents</text>
    <text class="stepText" x="888" y="294">User-facing agent surface</text>
    <text class="stepText" x="888" y="316">Plans, reasoning, task memory</text>

    <rect class="card" x="860" y="380" width="420" height="130"/>
    <text class="stepTitle" x="888" y="424">Agent Protocol</text>
    <text class="stepText" x="888" y="454">Task/goal semantics over tools</text>
    <text class="stepText" x="888" y="476">Invocations, events, state turns</text>

    <rect class="card" x="860" y="540" width="420" height="130"/>
    <text class="stepTitle" x="888" y="584">MCP</text>
    <text class="stepText" x="888" y="614">Addressable reliable tool plane</text>
    <text class="stepText" x="888" y="636">Typed calls, resources, prompts</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="2.5" stroke-dasharray="8 6" stroke="url(#cyanLine)" filter="url(#glow)">
    <path d="M540 285 H860"/>
    <path d="M540 445 H860"/>
    <path d="M540 605 H860"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="540" cy="285" r="4"/>
    <circle cx="860" cy="285" r="4"/>
    <circle cx="540" cy="445" r="4"/>
    <circle cx="860" cy="445" r="4"/>
    <circle cx="540" cy="605" r="4"/>
    <circle cx="860" cy="605" r="4"/>
  </g>

  <text x="700" y="460" text-anchor="middle" style="font: 700 82px 'Space Grotesk', sans-serif; fill: rgba(200, 236, 255, 0.55);">≡</text>

  <text class="sub" x="80" y="760">MCP is to agents what TCP/IP was to the web: a boring, portable substrate that lets everything above it compose.</text>
</svg>
