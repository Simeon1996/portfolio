<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="deg-title deg-desc">
  <title id="deg-title">DeepSeek: Off the Cost-Performance Curve</title>
  <desc id="deg-desc">Scatter of frontier models across training cost versus benchmark score with DeepSeek as an outlier above the trend line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .axis { font: 700 13px 'Space Mono', monospace; fill: #9dc1d8; letter-spacing: 1.4px; }
      .tick { font: 500 12px 'Space Mono', monospace; fill: #8baabe; }
      .pt { font: 700 14px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .note { font: 500 13px 'Space Mono', monospace; fill: #ffd178; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">DeepSeek: Off the Cost-Performance Curve</text>
  <text class="sub" x="80" y="118">Frontier models crowd a line · DeepSeek-R1 sits visibly above it</text>

  <g stroke="rgba(157, 193, 216, 0.45)" stroke-width="1.5" fill="none">
    <path d="M140 180 V680"/>
    <path d="M140 680 H1260"/>
  </g>

  <g stroke="rgba(157, 193, 216, 0.2)" stroke-width="1" fill="none" stroke-dasharray="4 6">
    <path d="M140 230 H1260"/>
    <path d="M140 330 H1260"/>
    <path d="M140 430 H1260"/>
    <path d="M140 530 H1260"/>
    <path d="M140 630 H1260"/>
    <path d="M280 180 V680"/>
    <path d="M480 180 V680"/>
    <path d="M700 180 V680"/>
    <path d="M920 180 V680"/>
    <path d="M1120 180 V680"/>
  </g>

  <text class="tick" x="130" y="234" text-anchor="end">92</text>
  <text class="tick" x="130" y="334" text-anchor="end">86</text>
  <text class="tick" x="130" y="434" text-anchor="end">80</text>
  <text class="tick" x="130" y="534" text-anchor="end">75</text>
  <text class="tick" x="130" y="634" text-anchor="end">70</text>

  <text class="tick" x="140" y="704" text-anchor="middle">$1M</text>
  <text class="tick" x="280" y="704" text-anchor="middle">$5M</text>
  <text class="tick" x="480" y="704" text-anchor="middle">$20M</text>
  <text class="tick" x="700" y="704" text-anchor="middle">$60M</text>
  <text class="tick" x="920" y="704" text-anchor="middle">$120M</text>
  <text class="tick" x="1120" y="704" text-anchor="middle">$200M</text>

  <text class="axis" x="60" y="420" transform="rotate(-90 60 420)" text-anchor="middle">BENCHMARK SCORE</text>
  <text class="axis" x="700" y="760" text-anchor="middle">TRAINING COST (LOG SCALE)</text>

  <path d="M180 620 L 1200 230" fill="none" stroke="rgba(126, 230, 240, 0.55)" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1200" y="215" text-anchor="end" style="font: 500 12px 'Space Mono', monospace; fill: #7df5f2;">expected frontier curve</text>

  <g filter="url(#glow)">
    <circle cx="200" cy="430" r="9" fill="#7df5f2"/>
    <text class="pt" x="215" y="416">Mistral</text>

    <circle cx="370" cy="370" r="10" fill="#7df5f2"/>
    <text class="pt" x="390" y="358">Llama 3 70B</text>

    <circle cx="560" cy="210" r="11" fill="#7df5f2"/>
    <text class="pt" x="580" y="198">Claude 3 Opus</text>

    <circle cx="680" cy="185" r="12" fill="#7df5f2"/>
    <text class="pt" x="700" y="175">GPT-4</text>

    <circle cx="250" cy="195" r="18" fill="#ffc96a" stroke="#ffd178" stroke-width="3"/>
    <text class="pt" x="280" y="200" style="fill: #ffd178;">DeepSeek-R1</text>
  </g>

  <g fill="none" stroke="rgba(255, 209, 120, 0.75)" stroke-width="2" stroke-dasharray="6 6">
    <path d="M520 120 H300 V180"/>
  </g>
  <circle cx="300" cy="180" r="4" fill="#ffd178"/>
  <circle cx="520" cy="120" r="4" fill="#ffd178"/>
  <text class="note" x="530" y="118">15–17× cheaper, same performance</text>

  <text class="sub" x="80" y="790">The curve says frontier scores require frontier spend · DeepSeek says not necessarily.</text>
</svg>
