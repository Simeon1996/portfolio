<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="cca-title cca-desc">
  <title id="cca-title">Claude Code Architecture</title>
  <desc id="cca-desc">REPL at the center with slash commands CLAUDE.md hooks MCP servers and shell prefix around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardCenter { fill: rgba(14, 34, 48, 0.88); stroke: rgba(126, 230, 240, 0.8); stroke-width: 1.8; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Claude Code Architecture</text>
  <text class="sub" x="80" y="118">A minimalist REPL surrounded by extension points · every knob is explicit and inspectable</text>

  <rect class="card" x="100" y="200" width="300" height="120"/>
  <text class="stepTitle" x="124" y="242">Slash Commands</text>
  <text class="stepText" x="124" y="270">/plan, /review, custom</text>
  <text class="stepText" x="124" y="290">skills under .claude/</text>

  <rect class="card" x="1000" y="200" width="300" height="120"/>
  <text class="stepTitle" x="1024" y="242">CLAUDE.md</text>
  <text class="stepText" x="1024" y="270">Project + user instructions</text>
  <text class="stepText" x="1024" y="290">auto-loaded into context</text>

  <rect class="card" x="60" y="400" width="280" height="120"/>
  <text class="stepTitle" x="84" y="442">Hooks</text>
  <text class="stepText" x="84" y="470">Pre/post-tool interceptors</text>
  <text class="stepText" x="84" y="490">configured in settings.json</text>

  <rect class="card" x="1060" y="400" width="280" height="120"/>
  <text class="stepTitle" x="1084" y="442">MCP Servers</text>
  <text class="stepText" x="1084" y="470">External typed tools</text>
  <text class="stepText" x="1084" y="490">added per-project or globally</text>

  <rect class="card" x="540" y="620" width="320" height="120"/>
  <text class="stepTitle" x="564" y="662">! Shell Prefix</text>
  <text class="stepText" x="564" y="690">Run bash inline and feed</text>
  <text class="stepText" x="564" y="710">its output back into the model</text>

  <rect class="cardCenter" x="540" y="360" width="320" height="200" filter="url(#glow)"/>
  <text class="stepTitle" x="566" y="410" style="font: 700 28px 'Space Grotesk', sans-serif; fill: #e9f6ff;">REPL</text>
  <text class="stepText" x="566" y="444">Read - Eval - Print - Loop</text>
  <text class="stepText" x="566" y="466">Turn-based tool calls,</text>
  <text class="stepText" x="566" y="486">streaming output,</text>
  <text class="stepText" x="566" y="506">transcript-driven memory</text>
  <rect x="566" y="520" width="170" height="26" rx="13" fill="rgba(60, 170, 130, 0.22)" stroke="rgba(110, 255, 210, 0.6)"/>
  <text x="584" y="538" class="okText">AGENT LOOP CORE</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M400 260 H470 V400 H540" stroke="url(#cyanLine)"/>
    <path d="M1000 260 H930 V400 H860" stroke="url(#cyanLine)"/>
    <path d="M340 460 H540" stroke="url(#cyanLine)"/>
    <path d="M1060 460 H860" stroke="url(#cyanLine)"/>
    <path d="M700 620 V560" stroke="url(#ok)"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="400" cy="260" r="4"/>
    <circle cx="540" cy="400" r="4"/>
    <circle cx="1000" cy="260" r="4"/>
    <circle cx="860" cy="400" r="4"/>
    <circle cx="340" cy="460" r="4"/>
    <circle cx="540" cy="460" r="4"/>
    <circle cx="1060" cy="460" r="4"/>
    <circle cx="860" cy="460" r="4"/>
    <circle cx="700" cy="620" r="4"/>
    <circle cx="700" cy="560" r="4"/>
  </g>

  <text class="sub" x="80" y="790">No hidden state · every extension point is a file you can read, edit, and version-control.</text>
</svg>
