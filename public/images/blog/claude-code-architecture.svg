<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="cca-title cca-desc">
  <title id="cca-title">Claude Code Architecture</title>
  <desc id="cca-desc">The REPL at center, with arrows to slash commands, CLAUDE.md, hooks pipeline, MCP servers, and the shell prefix.</desc>
  <defs>
    <linearGradient id="cca-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cca-cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="cca-pink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <filter id="cca-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .cca-title { font: 700 34px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .cca-sub   { font: 500 14px 'Space Mono', monospace; fill: #9bc0d8; }
      .cca-node  { font: 700 17px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .cca-small { font: 500 12px 'Space Mono', monospace; fill: #7ab0cc; }
      .cca-tag   { font: 600 11px 'Space Mono', monospace; letter-spacing: 1.5px; }
    </style>
  </defs>
  <rect width="1100" height="620" fill="url(#cca-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="155" x2="1100" y2="155"/><line x1="0" y1="310" x2="1100" y2="310"/>
    <line x1="0" y1="465" x2="1100" y2="465"/><line x1="275" y1="0" x2="275" y2="620"/>
    <line x1="550" y1="0" x2="550" y2="620"/><line x1="825" y1="0" x2="825" y2="620"/>
  </g>

  <text class="cca-title" x="50" y="62">Claude Code Architecture</text>
  <text class="cca-sub" x="50" y="90">REPL at center — five surfaces extending outward</text>

  <!-- Center: REPL -->
  <rect x="390" y="230" width="240" height="140" rx="14" fill="rgba(10,22,40,0.95)" stroke="rgba(125,245,242,0.8)" stroke-width="2.5" filter="url(#cca-glow)"/>
  <text class="cca-node" x="510" y="285" text-anchor="middle" fill="#7df5f2">REPL</text>
  <text class="cca-small" x="510" y="310" text-anchor="middle">interactive loop</text>
  <text class="cca-small" x="510" y="330" text-anchor="middle">conversation + tools</text>
  <text class="cca-small" x="510" y="350" text-anchor="middle">context accumulation</text>

  <!-- Slash Commands (top left) -->
  <rect x="60" y="130" width="220" height="100" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.5)" stroke-width="1.5"/>
  <text class="cca-node" x="170" y="167">/commands</text>
  <text class="cca-small" x="170" y="190">/compact, /clear, /help</text>
  <text class="cca-small" x="170" y="210">/memory, custom skills</text>

  <!-- CLAUDE.md (top right) -->
  <rect x="740" y="130" width="240" height="100" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(78,203,255,0.5)" stroke-width="1.5"/>
  <text class="cca-node" x="860" y="167">CLAUDE.md</text>
  <text class="cca-small" x="860" y="190">project instructions</text>
  <text class="cca-small" x="860" y="210">loaded at session start</text>

  <!-- Hooks Pipeline (left) -->
  <rect x="60" y="350" width="220" height="120" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="cca-node" x="170" y="388" fill="#ffaac8">Hooks</text>
  <text class="cca-small" x="170" y="412">pre/post tool events</text>
  <text class="cca-small" x="170" y="432">shell scripts triggered</text>
  <text class="cca-small" x="170" y="452">settings.json config</text>

  <!-- MCP Servers (right) -->
  <rect x="740" y="350" width="240" height="120" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(255,106,158,0.45)" stroke-width="1.5"/>
  <text class="cca-node" x="860" y="388" fill="#ffaac8">MCP Servers</text>
  <text class="cca-small" x="860" y="412">external tool providers</text>
  <text class="cca-small" x="860" y="432">databases, APIs, files</text>
  <text class="cca-small" x="860" y="452">hot-loaded at startup</text>

  <!-- Shell Prefix (bottom center) -->
  <rect x="340" y="510" width="300" height="80" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(125,245,242,0.4)" stroke-width="1.5"/>
  <text class="cca-node" x="490" y="548" text-anchor="middle">! Shell Prefix</text>
  <text class="cca-small" x="490" y="570" text-anchor="middle">run commands in-session</text>

  <!-- Arrows from REPL to each component -->
  <g fill="none" stroke="url(#cca-cyan)" stroke-width="2" stroke-linecap="round">
    <path d="M420 255 L280 230"/><path d="M600 255 L760 230"/>
    <path d="M420 360 L280 390"/><path d="M600 360 L760 390"/>
    <path d="M490 370 L490 510"/>
  </g>

  <text class="cca-sub" x="50" y="590">All surfaces feed back into the same REPL loop — context persists across them.</text>
</svg>
