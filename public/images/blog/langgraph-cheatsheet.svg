<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-labelledby="lgcs-title lgcs-desc">
  <title id="lgcs-title">LangGraph Cheatsheet</title>
  <desc id="lgcs-desc">LangGraph graph anatomy — StateGraph with nodes, conditional edges, checkpointer, and END terminal.</desc>
  <defs>
    <linearGradient id="lgcs-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="lgcs-cyan" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="lgcs-pink" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff6a9e"/>
      <stop offset="100%" stop-color="#ffc17d"/>
    </linearGradient>
    <filter id="lgcs-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lgcs-title { font: 700 34px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .lgcs-sub   { font: 500 14px 'Space Mono', monospace; fill: #9bc0d8; }
      .lgcs-node  { font: 700 16px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .lgcs-small { font: 500 11px 'Space Mono', monospace; fill: #7ab0cc; }
      .lgcs-tag   { font: 600 11px 'Space Mono', monospace; letter-spacing: 1.5px; }
      .lgcs-code  { font: 600 12px 'Space Mono', monospace; fill: #7df5f2; }
    </style>
  </defs>
  <rect width="1100" height="640" fill="url(#lgcs-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="160" x2="1100" y2="160"/><line x1="0" y1="320" x2="1100" y2="320"/>
    <line x1="0" y1="480" x2="1100" y2="480"/><line x1="275" y1="0" x2="275" y2="640"/>
    <line x1="550" y1="0" x2="550" y2="640"/><line x1="825" y1="0" x2="825" y2="640"/>
  </g>

  <text class="lgcs-title" x="50" y="62">LangGraph Graph Anatomy</text>
  <text class="lgcs-sub" x="50" y="90">StateGraph → nodes → edges → checkpointer → END</text>

  <!-- StateGraph wrapper -->
  <rect x="50" y="130" width="730" height="440" rx="16" fill="rgba(8,18,35,0.6)" stroke="rgba(78,203,255,0.25)" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text class="lgcs-tag" x="415" y="156" text-anchor="middle" fill="#3a9fcc">STATE GRAPH</text>

  <!-- START node -->
  <circle cx="150" cy="300" r="44" fill="rgba(14,30,47,0.9)" stroke="rgba(125,245,242,0.7)" stroke-width="2"/>
  <text class="lgcs-node" x="150" y="295" text-anchor="middle" fill="#7df5f2">START</text>
  <text class="lgcs-small" x="150" y="315" text-anchor="middle">entry point</text>

  <!-- Node A -->
  <rect x="240" y="200" width="160" height="90" rx="10" fill="rgba(14,30,47,0.9)" stroke="rgba(78,203,255,0.55)" stroke-width="2"/>
  <text class="lgcs-node" x="320" y="235" text-anchor="middle">Agent Node</text>
  <text class="lgcs-small" x="320" y="257" text-anchor="middle">LLM call</text>
  <text class="lgcs-small" x="320" y="275" text-anchor="middle">state mutation</text>

  <!-- Node B: Tool Node -->
  <rect x="240" y="340" width="160" height="90" rx="10" fill="rgba(14,30,47,0.9)" stroke="rgba(78,203,255,0.55)" stroke-width="2"/>
  <text class="lgcs-node" x="320" y="375" text-anchor="middle">Tool Node</text>
  <text class="lgcs-small" x="320" y="397" text-anchor="middle">tool execution</text>
  <text class="lgcs-small" x="320" y="415" text-anchor="middle">result injection</text>

  <!-- Conditional edge diamond -->
  <polygon points="490,300 540,260 590,300 540,340" fill="rgba(14,22,40,0.9)" stroke="rgba(255,106,158,0.6)" stroke-width="2"/>
  <text class="lgcs-small" x="540" y="296" text-anchor="middle" fill="#ffaac8">route?</text>
  <text class="lgcs-small" x="540" y="314" text-anchor="middle" fill="#ffaac8">cond edge</text>

  <!-- END node -->
  <circle cx="690" cy="245" r="44" fill="rgba(14,30,47,0.9)" stroke="rgba(255,106,158,0.6)" stroke-width="2"/>
  <text class="lgcs-node" x="690" y="240" text-anchor="middle" fill="#ffaac8">END</text>
  <text class="lgcs-small" x="690" y="260" text-anchor="middle">terminal</text>

  <!-- Loop back arrow -->
  <path d="M590 290 Q630 290 630 390 Q630 440 490 430 Q380 430 320 430" fill="none" stroke="rgba(78,203,255,0.4)" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="322,424 312,430 322,436" fill="rgba(78,203,255,0.4)"/>
  <text class="lgcs-small" x="560" y="460">loop back</text>

  <!-- Arrows -->
  <g fill="none" stroke="url(#lgcs-cyan)" stroke-width="2" stroke-linecap="round">
    <path d="M194 280 L240 255"/><path d="M194 320 L240 365"/>
    <path d="M400 245 L490 275"/><path d="M400 385 L490 315"/>
    <path d="M590 270 L646 258"/>
  </g>

  <!-- Checkpointer (right side) -->
  <rect x="820" y="180" width="230" height="120" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(155,107,255,0.5)" stroke-width="1.5"/>
  <text class="lgcs-node" x="935" y="218" text-anchor="middle" fill="#c17df5">Checkpointer</text>
  <text class="lgcs-small" x="935" y="242" text-anchor="middle">saves graph state</text>
  <text class="lgcs-small" x="935" y="262" text-anchor="middle">enables resume</text>
  <text class="lgcs-small" x="935" y="282" text-anchor="middle">human-in-the-loop</text>

  <!-- State schema (right bottom) -->
  <rect x="820" y="340" width="230" height="130" rx="10" fill="rgba(14,30,47,0.85)" stroke="rgba(109,181,222,0.45)" stroke-width="1.5"/>
  <text class="lgcs-node" x="935" y="378" text-anchor="middle">State Schema</text>
  <text class="lgcs-code" x="840" y="404">TypedDict fields</text>
  <text class="lgcs-code" x="840" y="424">messages: list</text>
  <text class="lgcs-code" x="840" y="444">next: str</text>
  <text class="lgcs-small" x="935" y="462" text-anchor="middle">shared across nodes</text>

  <!-- Connector to checkpointer -->
  <path d="M780 260 L820 240" fill="none" stroke="rgba(155,107,255,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M780 320 L820 380" fill="none" stroke="rgba(109,181,222,0.4)" stroke-width="1.5" stroke-dasharray="5,3"/>

  <text class="lgcs-sub" x="50" y="608">Add .compile(checkpointer=...) to persist state across interruptions.</text>
</svg>
