<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="lgcs-title lgcs-desc">
  <title id="lgcs-title">LangGraph Graph Anatomy</title>
  <desc id="lgcs-desc">A graph showing start agent node conditional edge tool node and end with state schema and checkpointer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">LangGraph Graph Anatomy</text>
  <text class="sub" x="80" y="118">Nodes, edges, state · conditional routing and tool loops make the agent</text>

  <circle cx="150" cy="320" r="60" fill="rgba(14, 34, 48, 0.9)" stroke="rgba(126, 230, 240, 0.7)" stroke-width="1.6" filter="url(#glow)"/>
  <text x="150" y="314" text-anchor="middle" style="font: 700 18px 'Space Grotesk', sans-serif; fill: #e9f6ff;">START</text>
  <text x="150" y="336" text-anchor="middle" style="font: 500 12px 'Space Mono', monospace; fill: #9bc4dd;">entry</text>

  <rect class="card" x="310" y="240" width="240" height="160"/>
  <text class="stepTitle" x="334" y="282">Agent Node</text>
  <text class="stepText" x="334" y="310">LLM call with tools,</text>
  <text class="stepText" x="334" y="330">reads/writes state,</text>
  <text class="stepText" x="334" y="350">returns partial update</text>
  <rect x="334" y="362" width="130" height="22" rx="11" fill="rgba(60,170,130,0.22)" stroke="rgba(110,255,210,0.5)"/>
  <text x="350" y="378" class="okText">STATEFUL STEP</text>

  <g transform="translate(760, 320) rotate(45)">
    <rect x="-80" y="-80" width="160" height="160" rx="6" fill="rgba(14, 29, 46, 0.82)" stroke="rgba(120, 179, 216, 0.55)" stroke-width="1.3"/>
  </g>
  <text x="760" y="296" text-anchor="middle" style="font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff;">Conditional</text>
  <text x="760" y="320" text-anchor="middle" style="font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff;">Edge</text>
  <text x="760" y="346" text-anchor="middle" style="font: 500 12px 'Space Mono', monospace; fill: #9bc4dd;">route by state</text>

  <circle cx="1210" cy="320" r="60" fill="rgba(49, 24, 40, 0.82)" stroke="rgba(255, 142, 180, 0.6)" stroke-width="1.5" filter="url(#glow)"/>
  <text x="1210" y="314" text-anchor="middle" style="font: 700 18px 'Space Grotesk', sans-serif; fill: #ffe0ec;">END</text>
  <text x="1210" y="336" text-anchor="middle" style="font: 500 12px 'Space Mono', monospace; fill: #ffb4ce;">finish</text>

  <rect class="card" x="640" y="500" width="240" height="140"/>
  <text class="stepTitle" x="664" y="542">Tool Node</text>
  <text class="stepText" x="664" y="570">Invokes external tools,</text>
  <text class="stepText" x="664" y="590">emits observations back</text>
  <text class="stepText" x="664" y="610">into agent state</text>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M210 320 H310" stroke="url(#cyanLine)"/>
    <path d="M550 320 H640" stroke="url(#cyanLine)"/>
    <path d="M880 320 H1150" stroke="url(#ok)"/>
    <path d="M760 420 V500" stroke="url(#warn)"/>
    <path d="M640 570 H430 V400" stroke="url(#warn)"/>
  </g>

  <g fill="#96ffe5">
    <circle cx="210" cy="320" r="4"/>
    <circle cx="310" cy="320" r="4"/>
    <circle cx="550" cy="320" r="4"/>
    <circle cx="640" cy="320" r="4"/>
    <circle cx="880" cy="320" r="4"/>
    <circle cx="1150" cy="320" r="4"/>
  </g>
  <g fill="#ffd178">
    <circle cx="760" cy="420" r="4"/>
    <circle cx="760" cy="500" r="4"/>
    <circle cx="640" cy="570" r="4"/>
    <circle cx="430" cy="400" r="4"/>
  </g>

  <text x="900" y="540" style="font: 500 12px 'Space Mono', monospace; fill: #ffd178;">loops back on tool_calls</text>

  <g fill="none" stroke-width="2" stroke-dasharray="6 6" stroke="rgba(178, 146, 240, 0.6)">
    <path d="M210 400 V700"/>
    <path d="M1150 400 V700"/>
  </g>

  <rect x="80" y="680" width="360" height="100" rx="14" fill="rgba(26, 19, 46, 0.82)" stroke="rgba(168, 139, 240, 0.55)" stroke-width="1.2"/>
  <text class="stepTitle" x="106" y="718">State Schema</text>
  <text class="stepText" x="106" y="744">Typed dict / pydantic model</text>
  <text class="stepText" x="106" y="764">threaded through every node</text>

  <rect x="1000" y="680" width="360" height="100" rx="14" fill="rgba(26, 19, 46, 0.82)" stroke="rgba(168, 139, 240, 0.55)" stroke-width="1.2"/>
  <text class="stepTitle" x="1026" y="718">Checkpointer</text>
  <text class="stepText" x="1026" y="744">Persists state per step · SQLite,</text>
  <text class="stepText" x="1026" y="764">Postgres, Redis adapters</text>
</svg>
