<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="atb-title atb-desc">
  <title id="atb-title">Agent Trust Budget</title>
  <desc id="atb-desc">Untrusted inputs on the left feed into a model that consults a policy gate before using trusted tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ef2a5"/>
      <stop offset="100%" stop-color="#78ffe2"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .stepTitle { font: 700 17px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .stepText { font: 500 13px 'Space Mono', monospace; fill: #9bc4dd; }
      .colLabel { font: 700 14px 'Space Mono', monospace; fill: #aad4ee; letter-spacing: 1.6px; }
      .card { fill: rgba(14, 29, 46, 0.82); stroke: rgba(120, 179, 216, 0.44); stroke-width: 1.2; rx: 14; }
      .cardWarn { fill: rgba(49, 24, 40, 0.72); stroke: rgba(255, 142, 180, 0.5); stroke-width: 1.2; rx: 14; }
      .cardOk { fill: rgba(18, 44, 34, 0.78); stroke: rgba(110, 255, 180, 0.5); stroke-width: 1.2; rx: 14; }
      .cardCenter { fill: rgba(14, 34, 48, 0.88); stroke: rgba(126, 230, 240, 0.7); stroke-width: 1.6; rx: 14; }
      .warnText { font: 700 12px 'Space Mono', monospace; fill: #ffb4ce; letter-spacing: 1.4px; }
      .okText { font: 700 12px 'Space Mono', monospace; fill: #6affc7; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Agent Trust Budget</text>
  <text class="sub" x="80" y="118">Every token entering the model carries a trust level · privileged tools are budget-gated</text>

  <text class="colLabel" x="100" y="200">UNTRUSTED SOURCES</text>
  <text class="colLabel" x="1100" y="200">TRUSTED SURFACE</text>

  <g>
    <rect class="cardWarn" x="80" y="230" width="280" height="110"/>
    <text class="stepTitle" x="104" y="270">Prompt Injection</text>
    <text class="stepText" x="104" y="296">Hidden instructions inside</text>
    <text class="stepText" x="104" y="316">fetched content · adversarial</text>

    <rect class="cardWarn" x="80" y="370" width="280" height="110"/>
    <text class="stepTitle" x="104" y="410">Web Content</text>
    <text class="stepText" x="104" y="436">Scraped pages, search results,</text>
    <text class="stepText" x="104" y="456">third-party API responses</text>

    <rect class="cardWarn" x="80" y="510" width="280" height="110"/>
    <text class="stepTitle" x="104" y="550">User Messages</text>
    <text class="stepText" x="104" y="576">Chat turns from unauthenticated</text>
    <text class="stepText" x="104" y="596">or low-privilege callers</text>
  </g>

  <g>
    <rect class="cardCenter" x="500" y="320" width="400" height="200" filter="url(#glow)"/>
    <text class="stepTitle" x="526" y="366" style="font: 700 26px 'Space Grotesk', sans-serif; fill: #e9f6ff;">Model</text>
    <text class="stepText" x="526" y="396">Evaluates trust budget before</text>
    <text class="stepText" x="526" y="416">calling privileged tools</text>
    <text class="stepText" x="526" y="440">Tainted inputs cannot reach</text>
    <text class="stepText" x="526" y="460">high-risk actions directly</text>
    <rect x="526" y="476" width="170" height="30" rx="15" fill="rgba(60, 170, 130, 0.22)" stroke="rgba(110, 255, 210, 0.6)"/>
    <text x="548" y="496" class="okText">POLICY GATE</text>
  </g>

  <g>
    <rect class="cardOk" x="1040" y="230" width="280" height="110"/>
    <text class="stepTitle" x="1064" y="270">System Prompt</text>
    <text class="stepText" x="1064" y="296">Authored by developers,</text>
    <text class="stepText" x="1064" y="316">versioned, signed</text>

    <rect class="cardOk" x="1040" y="370" width="280" height="110"/>
    <text class="stepTitle" x="1064" y="410">Verified Tools</text>
    <text class="stepText" x="1064" y="436">Typed MCP calls with</text>
    <text class="stepText" x="1064" y="456">audited side-effects</text>

    <rect class="cardOk" x="1040" y="510" width="280" height="110"/>
    <text class="stepTitle" x="1064" y="550">Human Approval</text>
    <text class="stepText" x="1064" y="576">Required for any write that</text>
    <text class="stepText" x="1064" y="596">exceeds the trust budget</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-width="3" filter="url(#glow)">
    <path d="M360 285 H500" stroke="url(#warn)"/>
    <path d="M360 425 H500" stroke="url(#warn)"/>
    <path d="M360 565 H500" stroke="url(#warn)"/>
    <path d="M900 350 H1040" stroke="url(#ok)"/>
    <path d="M900 425 H1040" stroke="url(#ok)"/>
    <path d="M900 500 H1040" stroke="url(#ok)"/>
  </g>

  <g fill="#ffb4ce">
    <circle cx="360" cy="285" r="4"/>
    <circle cx="500" cy="285" r="4"/>
    <circle cx="360" cy="425" r="4"/>
    <circle cx="500" cy="425" r="4"/>
    <circle cx="360" cy="565" r="4"/>
    <circle cx="500" cy="565" r="4"/>
  </g>
  <g fill="#96ffe5">
    <circle cx="900" cy="350" r="4"/>
    <circle cx="1040" cy="350" r="4"/>
    <circle cx="900" cy="425" r="4"/>
    <circle cx="1040" cy="425" r="4"/>
    <circle cx="900" cy="500" r="4"/>
    <circle cx="1040" cy="500" r="4"/>
  </g>

  <text class="sub" x="80" y="760">Rule of thumb: data from an untrusted source must never authorise an action against a trusted system.</text>
</svg>
