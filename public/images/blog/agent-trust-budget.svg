<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="atb-title atb-desc">
  <title id="atb-title">Agent Trust Budget Flow</title>
  <desc id="atb-desc">Trust spenders on the left in red, the model neutral in the center, trust earners on the right in green, with tainted data paths intercepted before reaching privileged tools.</desc>
  <defs>
    <linearGradient id="atb-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="atb-red" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#b02a2a"/>
    </linearGradient>
    <linearGradient id="atb-green" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1a6b3a"/>
      <stop offset="100%" stop-color="#2a8b4a"/>
    </linearGradient>
    <filter id="atb-glow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .atb-title { font: 700 34px 'Space Grotesk', sans-serif; fill: #e8f6ff; }
      .atb-sub   { font: 500 14px 'Space Mono', monospace; fill: #9bc0d8; }
      .atb-head  { font: 700 14px 'Space Mono', monospace; letter-spacing: 1.5px; }
      .atb-node  { font: 700 16px 'Space Grotesk', sans-serif; fill: #dbf4ff; }
      .atb-desc  { font: 500 12px 'Space Mono', monospace; fill: #7ab0cc; }
      .atb-badge { font: 600 11px 'Space Mono', monospace; letter-spacing: 1px; }
    </style>
  </defs>
  <rect width="1200" height="580" fill="url(#atb-bg)"/>
  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="300" y1="0" x2="300" y2="580"/>
    <line x1="600" y1="0" x2="600" y2="580"/><line x1="900" y1="0" x2="900" y2="580"/>
  </g>

  <text class="atb-title" x="50" y="60">Agent Trust Budget</text>
  <text class="atb-sub" x="50" y="88">Every token arriving from outside the model boundary is a potential trust drain</text>

  <!-- Column labels -->
  <text class="atb-head" x="150" y="128" text-anchor="middle" fill="#ff7070">TRUST SPENDERS</text>
  <text class="atb-head" x="600" y="128" text-anchor="middle" fill="#9bc0d8">MODEL</text>
  <text class="atb-head" x="1020" y="128" text-anchor="middle" fill="#70ff90">TRUST EARNERS</text>

  <!-- Trust Spenders (left) -->
  <rect x="40" y="155" width="220" height="70" rx="8" fill="url(#atb-red)" opacity="0.85"/>
  <text class="atb-node" x="150" y="187" text-anchor="middle" fill="#ffaaaa">Prompt Injection</text>
  <text class="atb-desc" x="150" y="207" text-anchor="middle">malicious tool output</text>

  <rect x="40" y="255" width="220" height="70" rx="8" fill="url(#atb-red)" opacity="0.85"/>
  <text class="atb-node" x="150" y="287" text-anchor="middle" fill="#ffaaaa">Web Content</text>
  <text class="atb-desc" x="150" y="307" text-anchor="middle">untrusted retrieval</text>

  <rect x="40" y="355" width="220" height="70" rx="8" fill="url(#atb-red)" opacity="0.85"/>
  <text class="atb-node" x="150" y="387" text-anchor="middle" fill="#ffaaaa">User Messages</text>
  <text class="atb-desc" x="150" y="407" text-anchor="middle">unverified claims</text>

  <rect x="40" y="455" width="220" height="70" rx="8" fill="url(#atb-red)" opacity="0.7"/>
  <text class="atb-node" x="150" y="487" text-anchor="middle" fill="#ffaaaa">Tool Responses</text>
  <text class="atb-desc" x="150" y="507" text-anchor="middle">third-party APIs</text>

  <!-- Model (center) -->
  <rect x="470" y="200" width="260" height="180" rx="14" fill="rgba(14,30,47,0.9)" stroke="rgba(78,203,255,0.6)" stroke-width="2"/>
  <text class="atb-node" x="600" y="252" text-anchor="middle" fill="#e8f6ff">Model</text>
  <text class="atb-desc" x="600" y="278" text-anchor="middle">neutral reasoning surface</text>
  <text class="atb-desc" x="600" y="298" text-anchor="middle">evaluates trust budget</text>
  <text class="atb-desc" x="600" y="318" text-anchor="middle">before privileged tools</text>
  <text class="atb-badge" x="600" y="348" text-anchor="middle" fill="#4ecbff">INTERCEPT TAINTED PATHS</text>
  <rect x="490" y="355" width="220" height="24" rx="5" fill="rgba(78,203,255,0.15)" stroke="rgba(78,203,255,0.4)" stroke-width="1"/>
  <text style="font:600 11px 'Space Mono',monospace;fill:#7df5f2;" x="600" y="371" text-anchor="middle">policy gate</text>

  <!-- Trust Earners (right) -->
  <rect x="940" y="155" width="220" height="70" rx="8" fill="url(#atb-green)" opacity="0.85"/>
  <text class="atb-node" x="1050" y="187" text-anchor="middle" fill="#aaffbb">System Prompt</text>
  <text class="atb-desc" x="1050" y="207" text-anchor="middle">operator-controlled</text>

  <rect x="940" y="255" width="220" height="70" rx="8" fill="url(#atb-green)" opacity="0.85"/>
  <text class="atb-node" x="1050" y="287" text-anchor="middle" fill="#aaffbb">Verified Tools</text>
  <text class="atb-desc" x="1050" y="307" text-anchor="middle">known, signed endpoints</text>

  <rect x="940" y="355" width="220" height="70" rx="8" fill="url(#atb-green)" opacity="0.85"/>
  <text class="atb-node" x="1050" y="387" text-anchor="middle" fill="#aaffbb">Human Approval</text>
  <text class="atb-desc" x="1050" y="407" text-anchor="middle">explicit confirmation</text>

  <rect x="940" y="455" width="220" height="70" rx="8" fill="url(#atb-green)" opacity="0.7"/>
  <text class="atb-node" x="1050" y="487" text-anchor="middle" fill="#aaffbb">Read-only Context</text>
  <text class="atb-desc" x="1050" y="507" text-anchor="middle">low-risk retrieval</text>

  <!-- Arrows: spenders → model -->
  <g fill="none" stroke="#ff7070" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.7">
    <path d="M260 190 H470"/><path d="M260 290 H470"/><path d="M260 390 H470"/><path d="M260 490 L440 380"/>
  </g>
  <!-- Arrows: model → earners -->
  <g fill="none" stroke="#70ff90" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.7">
    <path d="M730 250 H940"/><path d="M730 310 H940"/><path d="M730 350 H940"/>
  </g>

  <text class="atb-sub" x="50" y="548">Trust budget = how much privilege the model grants to each data source before acting.</text>
</svg>
