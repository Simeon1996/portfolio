<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="peas-title peas-desc">
  <title id="peas-title">Prompt Engineer to Agent Architect: Skill Shift</title>
  <desc id="peas-desc">Horizontal bar chart comparing proficiency demands across eight skills between 2024 prompt engineers and 2026 agent architects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1625"/>
      <stop offset="100%" stop-color="#1a2f45"/>
    </linearGradient>
    <linearGradient id="cyanBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ecbff"/>
      <stop offset="100%" stop-color="#7df5f2"/>
    </linearGradient>
    <linearGradient id="pinkBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff7cae"/>
      <stop offset="100%" stop-color="#ffd178"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 40px 'Space Grotesk', sans-serif; fill: #e9f6ff; }
      .sub { font: 500 17px 'Space Mono', monospace; fill: #9dc1d8; }
      .colCyan { font: 700 22px 'Space Grotesk', sans-serif; fill: #7df5f2; }
      .colPink { font: 700 22px 'Space Grotesk', sans-serif; fill: #ff9ec8; }
      .skill { font: 700 15px 'Space Grotesk', sans-serif; fill: #e3f5ff; }
      .hint { font: 500 12px 'Space Mono', monospace; fill: #9bc4dd; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <g opacity="0.07" stroke="#5fa2d0" stroke-width="1">
    <path d="M0 160 H1400"/>
    <path d="M0 280 H1400"/>
    <path d="M0 400 H1400"/>
    <path d="M0 520 H1400"/>
    <path d="M0 640 H1400"/>
    <path d="M0 740 H1400"/>
    <path d="M200 0 V820"/>
    <path d="M500 0 V820"/>
    <path d="M800 0 V820"/>
    <path d="M1100 0 V820"/>
  </g>

  <g opacity="0.14">
    <circle cx="220" cy="150" r="180" fill="#2f4f74"/>
    <circle cx="1180" cy="700" r="220" fill="#2c4f6b"/>
  </g>

  <text class="title" x="80" y="88">Prompt Engineer → Agent Architect: Skill Shift</text>
  <text class="sub" x="80" y="118">What got you hired in 2024 is not what matters in 2026</text>

  <text class="colCyan" x="350" y="180" text-anchor="middle">Prompt Engineer (2024)</text>
  <text class="colPink" x="1050" y="180" text-anchor="middle">Agent Architect (2026)</text>

  <text x="700" y="180" text-anchor="middle" class="skill">SKILL</text>

  <g fill="none" stroke="rgba(157, 193, 216, 0.22)" stroke-width="1">
    <path d="M700 195 V760"/>
  </g>

  <g>
    <text class="skill" x="700" y="240" text-anchor="middle">Prompt Craft</text>
    <rect x="500" y="222" width="200" height="26" rx="4" fill="url(#cyanBar)" filter="url(#glow)"/>
    <rect x="700" y="222" width="80" height="26" rx="4" fill="url(#pinkBar)"/>
  </g>
  <g>
    <text class="skill" x="700" y="292" text-anchor="middle">Few-shot Design</text>
    <rect x="520" y="274" width="180" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="274" width="50" height="26" rx="4" fill="url(#pinkBar)"/>
  </g>
  <g>
    <text class="skill" x="700" y="344" text-anchor="middle">Output Formatting</text>
    <rect x="540" y="326" width="160" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="326" width="40" height="26" rx="4" fill="url(#pinkBar)"/>
  </g>
  <g>
    <text class="skill" x="700" y="396" text-anchor="middle">Model Selection</text>
    <rect x="580" y="378" width="120" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="378" width="100" height="26" rx="4" fill="url(#pinkBar)"/>
  </g>
  <g>
    <text class="skill" x="700" y="448" text-anchor="middle">Eval Architecture</text>
    <rect x="660" y="430" width="40" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="430" width="200" height="26" rx="4" fill="url(#pinkBar)" filter="url(#glow)"/>
  </g>
  <g>
    <text class="skill" x="700" y="500" text-anchor="middle">Observability</text>
    <rect x="670" y="482" width="30" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="482" width="190" height="26" rx="4" fill="url(#pinkBar)" filter="url(#glow)"/>
  </g>
  <g>
    <text class="skill" x="700" y="552" text-anchor="middle">State Management</text>
    <rect x="670" y="534" width="30" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="534" width="180" height="26" rx="4" fill="url(#pinkBar)"/>
  </g>
  <g>
    <text class="skill" x="700" y="604" text-anchor="middle">Failure Mode Design</text>
    <rect x="660" y="586" width="40" height="26" rx="4" fill="url(#cyanBar)"/>
    <rect x="700" y="586" width="185" height="26" rx="4" fill="url(#pinkBar)" filter="url(#glow)"/>
  </g>

  <text class="hint" x="350" y="680" text-anchor="middle">high leverage: input-side craft</text>
  <text class="hint" x="1050" y="680" text-anchor="middle">high leverage: system-side rigor</text>

  <text class="sub" x="80" y="770">The skills invert · the prompt is now a small part of a much bigger engineering surface.</text>
</svg>
